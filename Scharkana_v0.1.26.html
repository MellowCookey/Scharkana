    // ── Charakter-Auswahl ────────────────────────────────────────────────────
    function wrapText(text, maxWidth, font) {
      ctx.font = font;
      const words = text.split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line); line = word;
        } else { line = test; }
      }
      if (line) lines.push(line);
      return lines;
    }

    function drawCharacterCard(charIdx, offset, cx, cy, hideChosen = false) {
      const ch  = CHARACTERS[charIdx];
      const img = charImages[charIdx];
      const CARD_W = 260, CARD_H = 430;
      const configs = [
        { scale: 0.55, opacity: 0.40, yOff: 80 }, // ±2
        { scale: 0.76, opacity: 0.70, yOff: 36 }, // ±1
        { scale: 1.00, opacity: 1.00, yOff:  0 }, // 0
      ];
      const absOff = Math.min(Math.abs(offset), 2);
      const cfg    = configs[2 - absOff];
      const xPos   = cx + offset * 310;
      const yPos   = cy + cfg.yOff;
      const w      = CARD_W * cfg.scale;
      const h      = CARD_H * cfg.scale;
      const r      = 10 * cfg.scale; // Eckenradius
      const fs     = cfg.scale;
      const pad       = 12 * fs;
      const imgH      = h * 0.40; // Profilbild-Bereich (oben)
      const spriteAreaH = h * 0.22; // Sprite-Bereich (darunter)

      ctx.save();
      ctx.globalAlpha = cfg.opacity;
      ctx.translate(xPos, yPos);

      // Glüh-Schatten Mittelkarte
      if (offset === 0) { ctx.shadowColor = ch.color; ctx.shadowBlur = 28; }

      // Kartenhintergrund
      const bgGrad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
      bgGrad.addColorStop(0, ch.colorDark);
      bgGrad.addColorStop(1, '#080814');
      ctx.fillStyle   = bgGrad;
      ctx.strokeStyle = ch.color;
      ctx.lineWidth   = offset === 0 ? 2 : 1;
      ctx.beginPath();
      ctx.roundRect(-w / 2, -h / 2, w, h, r);
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;

      // ── Profilbild (oberer Bereich, geclippt) ──────────────────────────
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(-w / 2, -h / 2, w, imgH, [r, r, 0, 0]);
      ctx.clip();

      if (img.complete && img.naturalWidth > 0) {
        const ia = img.naturalWidth / img.naturalHeight;
        const ca = w / imgH;
        let dw, dh, dx, dy;
        if (ia > ca) { dh = imgH; dw = dh * ia; dx = -dw / 2; dy = -h / 2; }
        else         { dw = w;   dh = dw / ia; dx = -w / 2;  dy = -h / 2; }
        ctx.drawImage(img, dx, dy, dw, dh);
      } else {
        ctx.fillStyle = ch.colorDark;
        ctx.fillRect(-w / 2, -h / 2, w, imgH);
      }

      // Verlauf-Overlay am unteren Bildrand (weicher Übergang)
      const fadeGrad = ctx.createLinearGradient(0, -h / 2 + imgH - imgH * 0.40, 0, -h / 2 + imgH);
      fadeGrad.addColorStop(0, 'rgba(0,0,0,0)');
      fadeGrad.addColorStop(1, '#080814');
      ctx.fillStyle = fadeGrad;
      ctx.fillRect(-w / 2, -h / 2 + imgH - imgH * 0.40, w, imgH * 0.40);

      ctx.restore();

      // ── Pixel-Art Sprite (zwischen Profilbild und Text) ────────────────
      const sc = spriteCanvases[charIdx];
      const spriteTop = -h / 2 + imgH;
      const maxSdH = spriteAreaH * 0.90;
      const maxSdW = w * 0.52;
      let sdH = maxSdH;
      let sdW = sc.width / sc.height * sdH;
      if (sdW > maxSdW) { sdW = maxSdW; sdH = sc.height / sc.width * sdW; }
      const sdX = -sdW / 2;
      const sdY = spriteTop + (spriteAreaH - sdH) / 2;
      // Subtiler Hintergrund für den Sprite-Bereich
      ctx.save();
      ctx.fillStyle = ch.colorDark + '55';
      ctx.fillRect(-w / 2, spriteTop, w, spriteAreaH);
      // Trennlinie oben
      ctx.strokeStyle = ch.color + '44';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + pad, spriteTop); ctx.lineTo(w / 2 - pad, spriteTop); ctx.stroke();
      // Trennlinie unten
      ctx.beginPath();
      ctx.moveTo(-w / 2 + pad, spriteTop + spriteAreaH); ctx.lineTo(w / 2 - pad, spriteTop + spriteAreaH); ctx.stroke();
      // Sprite zeichnen (pixelig / crisp)
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sc, sdX, sdY, sdW, sdH);
      ctx.restore();

      // ── Text-Bereich ───────────────────────────────────────────────────
      const textTop = -h / 2 + imgH + spriteAreaH;

      // Name
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `bold ${Math.round(17 * fs)}px "Exo 2",sans-serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';
      ctx.shadowColor  = ch.color; ctx.shadowBlur = 8;
      ctx.fillText(ch.name, 0, textTop + pad * 0.4);
      ctx.shadowBlur = 0;

      // Rasse
      ctx.fillStyle = ch.colorLight;
      ctx.font      = `italic ${Math.round(11 * fs)}px "Exo 2",sans-serif`;
      ctx.fillText(ch.race, 0, textTop + pad * 0.4 + Math.round(20 * fs));

      // Trennlinie
      const ly1 = textTop + pad * 0.4 + Math.round(36 * fs);
      ctx.strokeStyle = ch.color + '77'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-w / 2 + pad, ly1); ctx.lineTo(w / 2 - pad, ly1); ctx.stroke();

      // Element-Badge
      const badgeY = ly1 + Math.round(7 * fs);
      const badgeH = Math.round(22 * fs);
      ctx.fillStyle   = ch.color + '40';
      ctx.strokeStyle = ch.color + 'aa';
      ctx.beginPath();
      ctx.roundRect(-w / 2 + pad, badgeY, w - pad * 2, badgeH, 4 * fs);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle    = ch.colorLight;
      ctx.font         = `bold ${Math.round(10 * fs)}px "Exo 2",sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.fillText(ch.element, 0, badgeY + badgeH / 2);

      // Eigenschaften
      ctx.fillStyle    = '#9999aa';
      ctx.font         = `italic ${Math.round(10 * fs)}px "Exo 2",sans-serif`;
      ctx.textBaseline = 'top';
      ctx.fillText(ch.traits, 0, badgeY + badgeH + Math.round(8 * fs));

      // Zitat — nur Mittelkarte
      if (offset === 0) {
        const ly2 = h / 2 - Math.round(62 * fs);
        ctx.strokeStyle = ch.color + '44';
        ctx.beginPath();
        ctx.moveTo(-w / 2 + pad, ly2); ctx.lineTo(w / 2 - pad, ly2); ctx.stroke();
        const ql = wrapText(`"${ch.quote}"`, w - pad * 2, `italic ${Math.round(10 * fs)}px "Exo 2",sans-serif`);
        ctx.fillStyle = '#c0c0d4'; ctx.font = `italic ${Math.round(10 * fs)}px "Exo 2",sans-serif`;
        ql.forEach((line, i) => ctx.fillText(line, 0, ly2 + 6 + i * Math.round(14 * fs)));
      }

      // Bereits-gewählt-Overlay
      if (!hideChosen && selectedCharacters.includes(charIdx)) {
        ctx.fillStyle = 'rgba(0,0,0,0.68)';
        ctx.beginPath();
        ctx.roundRect(-w / 2, -h / 2, w, h, r);
        ctx.fill();
        ctx.fillStyle = '#9999aa'; ctx.font = `bold italic ${Math.round(14 * fs)}px "Exo 2",sans-serif`;
        ctx.textBaseline = 'middle';
        ctx.fillText('Bereits gewählt', 0, 0);
      }

      ctx.restore();
    }

    function nextFreeCharIdx(fromIdx, dir = 1) {
      for (let i = 1; i < 6; i++) {
        const idx = ((fromIdx + dir * i) % 6 + 6) % 6;
        if (!selectedCharacters.includes(idx)) return idx;
      }
      return fromIdx;
    }

    function drawCharacterSelect() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;

      // Hintergrund
      const grad = ctx.createRadialGradient(cx, cy, 80, cx, cy, 750);
      grad.addColorStop(0, '#1e1040');
      grad.addColorStop(1, '#0a0a1a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Farbstreifen oben vom aktiven Charakter
      const activeCh = CHARACTERS[carouselIndex];
      const topGrad  = ctx.createLinearGradient(0, 0, canvas.width, 0);
      topGrad.addColorStop(0, 'transparent');
      topGrad.addColorStop(0.5, activeCh.color + '33');
      topGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = topGrad;
      ctx.fillRect(0, 0, canvas.width, 6);

      // Titel
      ctx.save();
      ctx.fillStyle    = '#c8e0ff';
      ctx.font         = 'bold italic 26px "Exo 2",sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = '#6040c0';
      ctx.shadowBlur   = 16;
      ctx.fillText(`Spieler ${charSelectingPlayer} – Charakter wählen`, cx, 60);
      ctx.shadowBlur   = 0;

      // Fortschritt (welche Spieler schon gewählt haben)
      for (let i = 0; i < playerCount; i++) {
        const dotX = cx + (i - (playerCount - 1) / 2) * 24;
        ctx.beginPath();
        ctx.arc(dotX, 96, 6, 0, Math.PI * 2);
        ctx.fillStyle   = i < charSelectingPlayer - 1 ? '#9b5de5' :
                          i === charSelectingPlayer - 1 ? '#e8d8ff' : '#333355';
        ctx.fill();
      }
      ctx.restore();

      // Karten: erst hinten, dann vorne zeichnen
      const drawOrder = [-2, 2, -1, 1, 0];
      drawOrder.forEach(offset => {
        const idx = ((carouselIndex + offset) % 6 + 6) % 6;
        drawCharacterCard(idx, offset, cx, cy + 30);
      });

      // Pfeil-Buttons links/rechts neben der Mittelkarte
      const cardCenterY = cy + 30;
      const arrowW = 50, arrowH = 50;

      const lax = cx - 195, lay = cardCenterY - arrowH / 2;
      ctx.save();
      ctx.fillStyle = 'rgba(20,20,50,0.85)';
      ctx.strokeStyle = '#3a3a6a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(lax, lay, arrowW, arrowH, 8); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#c8e0ff'; ctx.font = 'bold 28px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('‹', lax + arrowW / 2, lay + arrowH / 2);
      ctx.restore();

      const rax = cx + 145, ray = cardCenterY - arrowH / 2;
      ctx.save();
      ctx.fillStyle = 'rgba(20,20,50,0.85)';
      ctx.strokeStyle = '#3a3a6a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(rax, ray, arrowW, arrowH, 8); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#c8e0ff'; ctx.font = 'bold 28px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('›', rax + arrowW / 2, ray + arrowH / 2);
      ctx.restore();

      // Bestätigungs-Button unterhalb der Mittelkarte
      const isChosen = selectedCharacters.includes(carouselIndex);
      const cbX = cx - 100, cbY = cy + 255, cbW = 200, cbH = 48;
      ctx.save();
      ctx.fillStyle   = isChosen ? 'rgba(30,15,50,0.45)' : 'rgba(70,40,160,0.70)';
      ctx.strokeStyle = isChosen ? '#443355'              : '#9b5de5';
      ctx.lineWidth   = 2;
      ctx.shadowColor = isChosen ? 'transparent' : '#7b3fd0';
      ctx.shadowBlur  = isChosen ? 0              : 14;
      ctx.beginPath(); ctx.roundRect(cbX, cbY, cbW, cbH, 8); ctx.fill(); ctx.stroke();
      ctx.shadowBlur   = 0;
      ctx.fillStyle    = isChosen ? '#554466' : '#e8d8ff';
      ctx.font         = 'bold italic 18px "Exo 2",sans-serif';
      ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(isChosen ? 'Bereits gewählt' : 'Auswählen  ↵', cx, cbY + cbH / 2);
      ctx.restore();

      // Steuerung
      ctx.save();
      ctx.fillStyle    = '#8899bb';
      ctx.font         = '13px "Exo 2",sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Klick  oder  ← →  wechseln       Enter  Auswählen       Esc  zurück', cx, canvas.height - 36);
      ctx.restore();
    }

    // ── Siegesbildschirm ─────────────────────────────────────────────────────
    function drawVictoryScreen() {
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // ── In-Game Spielanleitung-Popup ────────────────────────────────────────
    function drawInGameMenu() {
      const BW = 860, BH = 840;
      const BX = (canvas.width  - BW) / 2;
      const BY = (canvas.height - BH) / 2;
      const PAD = 48, TW = BW - PAD * 2, LH = 21;

      // Abdunklung
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Box
      ctx.fillStyle   = 'rgba(5,8,18,0.98)';
      ctx.strokeStyle = '#3a6aaa';
      ctx.lineWidth   = 1.5;
      ctx.shadowColor = '#1a4080'; ctx.shadowBlur = 24;
      ctx.beginPath(); ctx.roundRect(BX, BY, BW, BH, 12); ctx.fill(); ctx.stroke();
      ctx.shadowBlur  = 0;

      // Deko-Linie oben
      const dg = ctx.createLinearGradient(BX, 0, BX + BW, 0);
      dg.addColorStop(0, 'transparent'); dg.addColorStop(0.5, '#4a9de5'); dg.addColorStop(1, 'transparent');
      ctx.fillStyle = dg; ctx.fillRect(BX + 1, BY + 1, BW - 2, 2);

      // Schließen-Button (×)
      const cBtnS = 28;
      const cBtnX = BX + BW - cBtnS - 10, cBtnY = BY + 10;
      ctx.fillStyle   = 'rgba(40,40,80,0.9)';
      ctx.strokeStyle = '#445588';
      ctx.lineWidth   = 1;
      ctx.beginPath(); ctx.roundRect(cBtnX, cBtnY, cBtnS, cBtnS, 5); ctx.fill(); ctx.stroke();
      ctx.fillStyle    = '#8899bb';
      ctx.font         = 'bold 18px "Exo 2",sans-serif';
      ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('×', cBtnX + cBtnS / 2, cBtnY + cBtnS / 2);
      inGameMenuCloseBtn = { x: cBtnX, y: cBtnY, w: cBtnS, h: cBtnS };

      // Seiten-Inhalt
      const page = HANDBUCH_PAGES[inGameMenuPage - 1];
      let y = BY + PAD;

      for (const item of page) {
        if (item.t === 'gap') { y += 10; continue; }
        let font, color, lineH, lines, indent = 0, center = false;
        switch (item.t) {
          case 'title':   font = 'bold 24px "Exo 2",sans-serif';           color = '#c8e8ff'; lineH = 36; center = true;  lines = [item.s]; break;
          case 'sub':     font = 'italic 13px "Exo 2",sans-serif';      color = '#6688aa'; lineH = 26; center = true;  lines = [item.s]; break;
          case 'chapter': font = 'bold 13px "Exo 2",sans-serif';           color = '#4aaae5'; lineH = 28; lines = [item.s]; break;
          case 'heading': font = 'bold italic 18px "Exo 2",sans-serif'; color = '#90c8e8'; lineH = 24; lines = wrapText(item.s, TW, font); break;
          case 'body':    font = '14px "Exo 2",sans-serif';             color = '#a0b8cc'; lineH = LH; lines = wrapText(item.s, TW, font); break;
          default: continue;
        }
        for (const line of lines) {
          ctx.save();
          ctx.fillStyle    = color;
          ctx.font         = font;
          ctx.textAlign    = center ? 'center' : 'left';
          ctx.textBaseline = 'top';
          ctx.shadowColor  = '#3a8de5'; ctx.shadowBlur = item.t === 'title' ? 12 : 0;
          ctx.fillText(line, center ? BX + BW / 2 : BX + PAD + indent, y);
          ctx.restore();
          y += lineH;
        }
      }

      // Navigation unten
      const totalPages = HANDBUCH_PAGES.length;
      ctx.save();
      ctx.fillStyle    = '#8899bb'; ctx.font = '13px "Exo 2",sans-serif';
      ctx.textAlign    = 'center'; ctx.textBaseline = 'bottom';
      const hint = inGameMenuPage < totalPages
        ? '[ → ]  Nächste Seite       [ ← ]  Vorherige       [ Esc ]  Schließen'
        : '[ ← ]  Vorherige       [ Esc ]  Schließen';
      ctx.fillText(hint, canvas.width / 2, BY + BH - 14);
      ctx.fillStyle = '#5a8ab0'; ctx.textAlign = 'right';
      ctx.fillText(`Seite ${inGameMenuPage} / ${totalPages}`, BX + BW - PAD, BY + BH - 14);
      ctx.restore();

      // Navigations-Buttons links / rechts
      const navBtnW = 36, navBtnH = 36;
      const navY = BY + BH / 2 - navBtnH / 2;
      inGameMenuNavBtns = [];
      if (inGameMenuPage > 1) {
        const nx = BX - navBtnW - 6;
        ctx.save();
        ctx.fillStyle = 'rgba(30,40,70,0.88)'; ctx.strokeStyle = '#445588'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(nx, navY, navBtnW, navBtnH, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#8899bb'; ctx.font = 'bold 18px "Exo 2",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('‹', nx + navBtnW / 2, navY + navBtnH / 2);
        ctx.restore();
        inGameMenuNavBtns.push({ x: nx, y: navY, w: navBtnW, h: navBtnH, dir: -1 });
      }
      if (inGameMenuPage < totalPages) {
        const nx = BX + BW + 6;
        ctx.save();
        ctx.fillStyle = 'rgba(30,40,70,0.88)'; ctx.strokeStyle = '#445588'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(nx, navY, navBtnW, navBtnH, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#8899bb'; ctx.font = 'bold 18px "Exo 2",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('›', nx + navBtnW / 2, navY + navBtnH / 2);
        ctx.restore();
        inGameMenuNavBtns.push({ x: nx, y: navY, w: navBtnW, h: navBtnH, dir: 1 });
      }
    }
    let inGameMenuCloseBtn  = null;
    let inGameMenuNavBtns   = [];

    // ── Haupt-Render ─────────────────────────────────────────────────────────
    function render() {
      if (screen === 'menu' && !menuAnimId) startMenuAnim();
      if (screen === 'victory')              drawVictoryScreen();
      else if (screen === 'menu')            drawMenu();
      else if (screen === 'modeSelect')      drawModeSelect();
      else if (screen === 'playerSelect')    drawPlayerSelect();
      else if (screen === 'characterSelect') drawCharacterSelect();
      else if (screen === 'geschichte')      drawGeschichte();
      else if (screen === 'handbuch')        drawHandbuch();
      else if (screen === 'charaktere')      drawCharaktere();
      else {
        drawGame();
        // ── Statusleiste unten rechts: ⚠  💾  Version ──────────────────────
        {
          const cy2   = canvas.height - 20;
          const btnH  = 30, btnR = 6;
          ctx.font = '14px "Exo 2",sans-serif';

          // Versionsnummer (kein Klick)
          ctx.save();
          ctx.font         = 'italic 14px "Exo 2",sans-serif';
          ctx.fillStyle    = '#9988bb';
          ctx.textAlign    = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText('Version 0.1.26', canvas.width - 14, cy2);
          ctx.restore();
          const verW = ctx.measureText('Version 0.1.26') === undefined ? 100 :
            (() => { ctx.font = 'italic 14px "Exo 2",sans-serif'; return ctx.measureText('Version 0.1.26').width; })();

          // 💾 Speichern-Button
          const sbW   = 44, sbX = canvas.width - 14 - verW - 10 - sbW;
          const sbY   = cy2 - btnH / 2;
          const canSave = gamePhase === 'spielphase';
          ctx.save();
          ctx.fillStyle   = saveBtnHover && canSave ? 'rgba(40,20,80,.95)' : 'rgba(18,8,36,.75)';
          ctx.strokeStyle = saveBtnHover && canSave ? '#9b5de5' : '#3a2868';
          ctx.lineWidth   = 1.5;
          ctx.shadowColor = saveBtnHover && canSave ? '#9b5de5' : 'transparent';
          ctx.shadowBlur  = saveBtnHover && canSave ? 10 : 0;
          ctx.beginPath(); ctx.roundRect(sbX, sbY, sbW, btnH, btnR); ctx.fill(); ctx.stroke();
          ctx.shadowBlur  = 0;
          ctx.fillStyle   = canSave ? (saveBtnHover ? '#e8d8ff' : '#bb99dd') : '#554466';
          ctx.font        = '18px sans-serif';
          ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('💾', sbX + sbW / 2, cy2);
          if (saveBtnHover && canSave) {
            const tip = 'Spielstand speichern';
            ctx.font = '12px "Exo 2",sans-serif';
            const tw = ctx.measureText(tip).width + 16;
            const tx = Math.min(sbX + sbW / 2 - tw / 2, canvas.width - tw - 4);
            const ty = sbY - 26;
            ctx.fillStyle = 'rgba(10,8,24,.97)'; ctx.strokeStyle = '#5a3a90'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(tx, ty, tw, 20, 4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#c8a0f0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(tip, tx + tw / 2, ty + 10);
          }
          ctx.restore();

          // ⚠ Bugreport-Button
          const brW   = 44, brX = sbX - 8 - brW;
          const brY   = cy2 - btnH / 2;
          ctx.save();
          ctx.fillStyle   = brBtnHover ? 'rgba(60,30,100,.95)' : 'rgba(18,8,36,.75)';
          ctx.strokeStyle = brBtnHover ? '#ffcc00' : '#3a2868';
          ctx.lineWidth   = 1.5;
          ctx.shadowColor = brBtnHover ? '#ffcc00' : 'transparent';
          ctx.shadowBlur  = brBtnHover ? 10 : 0;
          ctx.beginPath(); ctx.roundRect(brX, brY, brW, btnH, btnR); ctx.fill(); ctx.stroke();
          ctx.shadowBlur  = 0;
          ctx.fillStyle   = brBtnHover ? '#ffe066' : '#ffcc00';
          ctx.font        = '18px sans-serif';
          ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('⚠', brX + brW / 2, cy2);
          if (brBtnHover) {
            const tip = 'Problem melden';
            ctx.font = '12px "Exo 2",sans-serif';
            const tw = ctx.measureText(tip).width + 16;
            const tx = Math.min(brX + brW / 2 - tw / 2, canvas.width - tw - 4);
            const ty = brY - 26;
            ctx.fillStyle = 'rgba(10,8,24,.97)'; ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(tx, ty, tw, 20, 4); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#ffe066'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(tip, tx + tw / 2, ty + 10);
          }
          ctx.restore();
        }
        // Fade-Overlay während des Sieges-Übergangs
        if (victoryFadeStart !== null) {
          const t = Math.min((performance.now() - victoryFadeStart) / 5000, 1);
          ctx.fillStyle = `rgba(0,0,0,${t})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }
      if (inGameMenuOpen) drawInGameMenu();
      if (popup) drawPopup();
      if (regelHinweisPopup) drawRegelHinweisPopup();
      if (movinaRevivePrompt)  drawMovinaRevivePrompt();
      if (nadorBuschReplaceMode && !nadorBuschReplaceMode.selecting) drawNadorReplacePrompt();
      if (nadorRegenPrompt)    drawNadorRegenPrompt();
      if (nadorReaktivPrompt)  drawNadorReaktivPrompt();
      if (tarrakAbilityPrompt) drawFireInfusionPrompt();
    }

    // ── Tastatureingabe ──────────────────────────────────────────────────────
    function returnToMenu() {
      if (victoryFadeRafId !== null) { cancelAnimationFrame(victoryFadeRafId); victoryFadeRafId = null; }
      victoryWinnerIdx = null; victoryFadeStart = null;
      screen = 'menu'; render();
    }

    function handleMenuSelect(item) {
      if (item === 'Start') {
        screen = 'modeSelect'; render();
      } else if (item === 'Spiel mit Code laden') {
        document.getElementById('loadCodeInput').value = '';
        document.getElementById('loadCodeError').textContent = '';
        const ov = document.getElementById('loadCodeOverlay');
        ov.style.display = 'flex';
        setTimeout(() => document.getElementById('loadCodeInput').focus(), 50);
      } else if (item === 'Spielanleitung') {
        screen = 'handbuch'; render();
        if (window.openHandbuchOverlay) window.openHandbuchOverlay();
      } else if (item === 'Geschichte') {
        screen = 'geschichte'; render();
        if (window.openGeschOverlay) window.openGeschOverlay();
      } else if (item === 'Charaktere') {
        charakterePage = 1; charaktereTab = 'lore'; screen = 'charaktere'; render();
        document.getElementById('charCloseBtn').style.display = 'block';
      } else if (item === 'Exit') {
        window.close();
      } else {
        showPopup(`„${item}" ist noch nicht verfügbar.`);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (popup) return;

      if (inGameMenuOpen) {
        if (e.key === 'Escape') {
          if (window.closeHandbuchOverlay) window.closeHandbuchOverlay();
          else { inGameMenuOpen = false; render(); }
        }
        return;
      }

      if (screen === 'victory') {
        if (e.key === 'Enter' || e.key === 'Escape') returnToMenu();
        return;
      }

      if (screen === 'menu') {
        if (e.key === 'ArrowUp') {
          menuIndex = (menuIndex - 1 + MENU_ITEMS.length) % MENU_ITEMS.length;
          render();
        } else if (e.key === 'ArrowDown') {
          menuIndex = (menuIndex + 1) % MENU_ITEMS.length;
          render();
        } else if (e.key === 'Enter') {
          handleMenuSelect(MENU_ITEMS[menuIndex]);
        }
        return;
      }

      if (screen === 'handbuch') {
        if (e.key === 'Escape') {
          if (window.closeHandbuchOverlay) window.closeHandbuchOverlay();
          else { screen = 'menu'; render(); }
        }
        return;
      }

      if (screen === 'charaktere') {
        if (e.key === 'Enter' || e.key === 'Escape') {
          screen = 'menu'; render();
          document.getElementById('charCloseBtn').style.display = 'none';
        }
        return;
      }

      if (screen === 'geschichte') {
        if (e.key === 'Escape') {
          if (window.closeGeschOverlay) window.closeGeschOverlay();
          else { screen = 'menu'; render(); }
        }
        return;
      }

      if (screen === 'modeSelect') {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          modeHover = modeHover === 0 ? 1 : 0; render();
        } else if (e.key === '1') {
          useAbilities = false; screen = 'playerSelect'; render();
        } else if (e.key === '2') {
          useAbilities = true;  screen = 'playerSelect'; render();
        } else if (e.key === 'Enter') {
          if (modeHover >= 0) {
            useAbilities = modeHover === 1; screen = 'playerSelect'; render();
          } else {
            useAbilities = false; screen = 'playerSelect'; render();
          }
        } else if (e.key === 'Escape') {
          screen = 'menu'; render();
        }
        return;
      }

      if (screen === 'playerSelect') {
        if (e.key === 'ArrowLeft') {
          playerCount = Math.max(2, playerCount - 1); render();
        } else if (e.key === 'ArrowRight') {
          playerCount = Math.min(6, playerCount + 1); render();
        } else if (e.key >= '2' && e.key <= '6') {
          playerCount = parseInt(e.key); render();
        } else if (e.key === 'Enter') {
          // Spielerauswahl abgeschlossen → Charakterauswahl
          carouselIndex       = 0;
          charSelectingPlayer = 1;
          selectedCharacters  = [];
          screen = 'characterSelect';
          render();
        } else if (e.key === 'Escape') {
          screen = 'modeSelect'; render();
        }
        return;
      }

      if (screen === 'characterSelect') {
        if (e.key === 'ArrowLeft') {
          carouselIndex = nextFreeCharIdx(carouselIndex, -1); render();
        } else if (e.key === 'ArrowRight') {
          carouselIndex = nextFreeCharIdx(carouselIndex, 1); render();
        } else if (e.key === 'Enter') {
          if (selectedCharacters.includes(carouselIndex)) return;
          selectedCharacters.push(carouselIndex);
          if (charSelectingPlayer < playerCount) {
            charSelectingPlayer++;
            carouselIndex = nextFreeCharIdx(carouselIndex, 1);
            render();
          } else {
            initGame();
            screen = 'game';
            render();
          }
        } else if (e.key === 'Escape') {
          screen = 'playerSelect'; render();
        }
        return;
      }

      // ── Spielphase-Tasteneingabe ─────────────────────────────────────────
      if (gamePhase === 'spielphase') {
        // Feuerinfusion-Prompt: J/N oder Enter/Escape
        if (tarrakAbilityPrompt) {
          if (e.key === 'Enter' || e.key === 'j' || e.key === 'J') { resolveFireInfusionPrompt(true);  return; }
          if (e.key === 'Escape'|| e.key === 'n' || e.key === 'N') { resolveFireInfusionPrompt(false); return; }
          return;
        }
        // Mine-Info-Popup: Esc oder Enter schließt
        if (mineInfoPopup) {
          if (e.key === 'Escape' || e.key === 'Enter') { mineInfoPopup = null; render(); }
          return;
        }
        // Ressourcen-Popup: nur Enter erlaubt
        if (spielResourcePopup) {
          if (e.key === 'Enter') { closeResourcePopup(); }
          return;
        }
        if (nadorReaktivSelect) {
          if (e.key === 'Escape') { nadorReaktivSelect = null; spielLog = '🌿 Auswahl abgebrochen.'; advanceToNextPlayerAnimated(); }
          return;
        }
        if (nadorBuschMode) {
          if (e.key === 'Escape') { nadorBuschMode = null; spielLog = '🌿 Beschwörung abgebrochen.'; render(); }
          return;
        }
        if (nadorBuschReplaceMode) {
          if (e.key === 'Escape') { nadorBuschReplaceMode = null; spielLog = '🌿 Beschwörung abgebrochen.'; render(); }
          return;
        }
        if (thorgrimBlitzMode) {
          if (e.key === 'Escape') { thorgrimBlitzMode = null; spielLog = '⚡ Donnerblitz abgebrochen.'; render(); }
          return;
        }
        if (mondsprungMode) {
          if (e.key === 'Escape') { mondsprungMode = null; spielLog = '🌙 Mondsprung abgebrochen.'; render(); }
          return;
        }
        // Gebäude-Auswahlmodus: Zahlen 1-N wählen, Escape abbrechen
        if (spielBuildingMode) {
          if (e.key === 'Escape') {
            spielBuildingMode = null; spielLog = 'Auswahl abgebrochen.'; render();
          } else {
            const n = parseInt(e.key);
            if (n >= 1) {
              // Map typed number to the n-th free candidate (skipping used ones)
              const freeCands = spielBuildingMode.candidates.map((c, i) => ({ ...c, i })).filter(c => !c.used);
              if (n <= freeCands.length) {
                confirmBuildingSelection(freeCands[n - 1].i);
                render();
              }
            }
          }
          return;
        }
        if (e.key === 'l' || e.key === 'L') {
          spielCampMenuOpen = !spielCampMenuOpen;
          if (spielCampMenuOpen) { spielSelectedIdx = null; spielReachable = new Map(); spielLog = 'Lager geöffnet.'; }
          else                   { spielLog = 'Lager geschlossen.'; }
          render();
        } else if (e.key === 'b' || e.key === 'B') {
          undoSpielAction();
        } else if (e.key === 'Escape') {
          spielSelectedIdx = null; spielReachable = new Map(); spielCampMenuOpen = false;
          spielLog = 'Auswahl aufgehoben.'; render();
        }
        return;
      }

      // ── Bauphase-Spieleingabe ────────────────────────────────────────────
      if (regelHinweisPopup) {
        if (e.key === 'Escape' || e.key === 'Enter') { regelHinweisPopup = null; render(); }
        return;
      }
      if (blockFlash) return;
      const cp = curPlayer();
      if (cp.moves === 0) return;
      const n = parseInt(e.key);

      if (n === 7) {
        if (cp.moves <= 2) {
          const minDist = cp.moves === 2 ? 2 : 3;
          if (bauZuNahFuerSkip(minDist)) {
            showRegelHinweis(cp.moves);
            render(); return;
          }
        }
        cp.moves--;
        advanceTurn();
        render();
        return;
      }
      if (n >= 1 && n <= 6) {
        const { dq, dr } = DIRS[n - 1];
        const nq = cp.q + dq, nr = cp.r + dr;
        const nk = key(nq, nr);
        if (hexMap.get(nk) === 'blocked' || isBlockedByPlayer(nq, nr)) { flashBlocked(nq, nr); render(); return; }
        if (hexMap.get(nk) === 'sealed') return;
        if (hexDist(nq, nr) > 10) { flashBlocked(nq, nr); spielLog = 'Spielfeldgrenze erreicht!'; render(); return; }
        // Abstandsregel: letzten 2 Züge prüfen (kein Fallback bei moves ≤ 2)
        if (bauDistanzStatus(nq, nr) === 'blocked' && (cp.moves > 2 ? !bauAllNeighborsBlocked() : true)) {
          flashBlocked(nq, nr);
          spielLog = 'Zu nah an einem Mitspieler!';
          render(); return;
        }
        const fromQk = cp.q, fromRk = cp.r;
        const animCharIdxk = cp.charIdx;
        cp.q = nq; cp.r = nr;
        if (!hexMap.has(nk)) hexMap.set(nk, 'visited');
        cp.moves--;
        checkEnclosed();
        advanceTurn();
        startMoveAnim(fromQk, fromRk, nq, nr, (x, y) => {
          drawSpriteOnBoard(x - SIZE * 0.30, y + SIZE * 0.08, animCharIdxk, 0.54);
        });
      }
    });

    function drawPhaseTransitionOverlay() {
      if (spielPhaseStep !== 1 && spielPhaseStep !== 2) return;
      const ch  = CHARACTERS[players[currentPlayerIdx].charIdx];
      const col = ch.colorLight;
      const p   = players[currentPlayerIdx];

        const by = canvas.height - 258 - bh - 12;
        ctx.save();
        ctx.fillStyle   = 'rgba(10,30,14,0.95)';
        ctx.strokeStyle = col; ctx.lineWidth = 2;
        ctx.shadowColor = col; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill(); ctx.stroke();
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = col; ctx.font = 'bold 14px "Exo 2",sans-serif';

        ctx.fillText('▶  Weiter zur Hauptphase  [Leertaste]', bx + bw / 2, by + bh / 2);

      // ── Gain-Overlay im aktiven Spieler-Panel ─────────────────────────────

      const panY   = canvas.height - panH - 10;

      if (phase1Toast) {
        const elapsed = performance.now() - phase1Toast.startTime;

                : elapsed < 1150 ? 1
                : Math.max(0, 1 - (elapsed - 1150) / 350);
        if (a > 0) {
          ctx.save();
          ctx.globalAlpha = a;
          const items = [
            { label: `+${phase1Toast.gold} Gold`,    color: '#ffdd44' },
            { label: `+${phase1Toast.trank} Tränke`, color: '#44ddcc' },

          items.forEach((g, i) => {
            ctx.fillStyle   = g.color;
            ctx.font        = 'bold 15px "Exo 2",sans-serif';
            ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = g.color; ctx.shadowBlur = 10;
            ctx.fillText(g.label, toastX + toastW / 2, toastY + 16 + i * 22);
          });
          ctx.shadowBlur = 0;
          ctx.restore();
          render(); // für Animation weiter rendern
        }

      // ── Phase-2-Gewinnanzeige im Charakterpanel ───────────────────────────
      if (spielPhaseStep === 2) {
        const gains = [];
        for (const r of spielPhase2Result) gains.push({ label: r.label, color: '#88ffaa' });
        if (spielPhase2Result.length === 0) gains.push({ label: 'Kein Abbau', color: '#666688' });
        ctx.save();
        gains.forEach((g, i) => {
          const gy = panY + 118 + i * 20;
          ctx.fillStyle = 'rgba(0,0,0,0.55)';
          ctx.beginPath(); ctx.roundRect(tx - 4, gy - 9, tw + 8, 18, 4); ctx.fill();
          ctx.fillStyle = g.color; ctx.font = 'bold 12px "Exo 2",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.shadowColor = g.color; ctx.shadowBlur = 8;
          ctx.fillText(g.label, tx + tw / 2, gy);
          ctx.shadowBlur = 0;

    function getAbbauPreview(pIdx) {
      const rows = [];
      for (const b of spielBuildings) {
        // Alle Gebäude prüfen – unabhängig vom Erbauer
        const schls = spielUnits.filter(u => u.q === b.q && u.r === b.r && u.ownerIdx === pIdx && u.type === 'S');
        const schl  = schls.find(u => u.hasGem) || schls[0] || null;
        if (b.type === 'mine') {
          const top = b.stack ? b.stack[0] : 'G';
          if (schl) rows.push({ text: top === 'G' ? '⛏  Mine  →  +1 Gold' : '⛏  Mine  →  +1 Edelstein', ok: true });
          else      rows.push({ text: '⛏  Mine  –  kein Schleicher', ok: false });
        } else {
          if (schl) rows.push({ text: schl.hasGem ? '◎  Brunnen  →  +5 MP' : '◎  Brunnen  →  +1 Trank', ok: true });
          else      rows.push({ text: '◎  Brunnen  –  kein Schleicher', ok: false });
        }
      }
      if (rows.length === 0) rows.push({ text: 'Keine Gebäude vorhanden', ok: false });
      return rows;
    }

    function drawPhase1InfoPanel() {
      const p       = players[currentPlayerIdx];
      const ch      = CHARACTERS[p.charIdx];
      const col     = ch.colorLight;
      const pad     = 12, boxW = 230, lineH = 16, secGap = 6;
      const boxX    = canvas.width - 246;
      const boxY    = 16 + 30 + 8;
      const maxTextW = boxW - pad * 2 - 6;

      function wrapText11(text) {
        ctx.font = '11px "Exo 2",sans-serif';
        const words = text.split(' '), result = [];
        let cur = '';
        for (const w of words) {
          const t = cur ? cur + ' ' + w : w;
          if (ctx.measureText(t).width <= maxTextW) cur = t;
          else { if (cur) result.push(cur); cur = w; }
        }
        if (cur) result.push(cur);
        return result;
      }

      // Daten
      const unitCount = spielUnits.filter(u => u.ownerIdx === currentPlayerIdx).length;
      const tier      = unitCount <= 3 ? 0 : unitCount <= 5 ? 1 : 2;
      const tierCfg   = [
        { col: '#44dd88', label: 'Maximales Einkommen', income: '+3 Gold · +3 Tränke' },
        { col: '#ffcc00', label: 'Normales Einkommen',  income: '+2 Gold · +2 Tränke' },
        { col: '#ff4444', label: 'Niedriges Einkommen', income: '+1 Gold · +1 Trank'  },

      const abbauRows = spielBuildings

          if (b.type === 'mine')
            return { text: has ? '⛏  Mine  →  Abbau aktiv' : '⛏  Mine  –  kein Schleicher', ok: has };
          return { text: has ? '◎  Brunnen  →  Abbau aktiv' : '◎  Brunnen  –  kein Schleicher', ok: has };
        });

      const explLines = wrapText11('Du erhältst Einkommen und deine Schleicher an Gebäuden erzielen Abbauertrag.');
      const abbauDisplayRows = abbauRows.length ? abbauRows : [{ text: 'Keine Gebäude vorhanden', ok: false }];

      const boxH = pad
        + 20 + 4          // "Hinweis" + Trennlinie
        + 18 + 4          // Subtitle
        + explLines.length * lineH + secGap
        + 14 + lineH + lineH + 20 + secGap   // Grundversorgung: header + einheiten + einkommen + badge
        + 14 + abbauDisplayRows.length * lineH  // Abbauertrag header + rows
        + pad;

      infoPanelBottom = boxY + boxH + 8;
      ctx.save();
      ctx.fillStyle   = 'rgba(8,8,24,0.90)';
      ctx.strokeStyle = col + '88'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 8); ctx.fill(); ctx.stroke();

      let cy = boxY + pad;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';

      // "Hinweis"-Titel
      ctx.fillStyle = col; ctx.font = 'bold 13px "Exo 2",sans-serif';
      ctx.fillText('Hinweis', boxX + pad, cy); cy += 20;
      ctx.strokeStyle = col + '33'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(boxX + pad, cy); ctx.lineTo(boxX + boxW - pad, cy); ctx.stroke();
      cy += 4;

      // Subtitle
      ctx.fillStyle = col + 'cc'; ctx.font = 'bold 11px "Exo 2",sans-serif';
      ctx.fillText('Phase 1 · Ressourcenphase', boxX + pad, cy); cy += 18 + 4;

      // Erklärung
      ctx.fillStyle = '#8899bb'; ctx.font = '11px "Exo 2",sans-serif';
      for (const l of explLines) { ctx.fillText(l, boxX + pad, cy); cy += lineH; }
      cy += secGap;

      // Grundversorgung
      ctx.fillStyle = '#aac0d8'; ctx.font = 'bold 11px "Exo 2",sans-serif';
      ctx.fillText('Grundversorgung', boxX + pad, cy); cy += 14;
      ctx.fillStyle = '#ccccee'; ctx.font = '11px "Exo 2",sans-serif';
      ctx.fillText(`Einheiten: ${unitCount}`, boxX + pad + 6, cy); cy += lineH;
      ctx.fillStyle = tierCfg.col;
      ctx.fillText(tierCfg.income, boxX + pad + 6, cy); cy += lineH + 2;

      // Einkommensbadge
      const bw = boxW - pad * 2;
      ctx.fillStyle   = tier === 0 ? 'rgba(20,70,40,0.5)' : tier === 1 ? 'rgba(70,50,10,0.5)' : 'rgba(70,15,15,0.5)';
      ctx.strokeStyle = tierCfg.col + '77'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(boxX + pad, cy, bw, 18, 4); ctx.fill(); ctx.stroke();
      ctx.fillStyle = tierCfg.col; ctx.font = 'bold 12px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(tierCfg.label, boxX + pad + bw / 2, cy + 9);
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      cy += 20 + secGap;

      // Abbauertrag
      ctx.fillStyle = '#aac0d8'; ctx.font = 'bold 11px "Exo 2",sans-serif';
      ctx.fillText('Abbauertrag', boxX + pad, cy); cy += 14;
      for (const row of abbauDisplayRows) {
        ctx.fillStyle = row.ok ? '#88ddaa' : '#667788';
        ctx.font = '11px "Exo 2",sans-serif';

    function drawPhaseInfoPanel(subtitle, blocks) {
      // blocks: [{ text, col, bold, gap }]
      // Automatischer Zeilenumbruch pro Block
      const ch  = CHARACTERS[players[currentPlayerIdx].charIdx];
      const col = ch.colorLight;
      const pad = 12, boxW = 230;
      const boxX = canvas.width - 246;
      const boxY = 16 + 30 + 8;
      const lineH = 16, maxTextW = boxW - pad * 2 - 6;

      // Text in Zeilen umbrechen
      function wrapLine(text, font) {
        if (!text) return [''];
        ctx.font = font;
        const words = text.split(' ');
        const result = [];
        let current = '';
        for (const w of words) {
          const test = current ? current + ' ' + w : w;
          if (ctx.measureText(test).width <= maxTextW) { current = test; }
          else { if (current) result.push(current); current = w; }
        }
        if (current) result.push(current);
        return result.length ? result : [''];
      }

      // Alle Zeilen vorberechnen für Höhe
      const rendered = [];
      for (const b of blocks) {
        if (b.gap) { rendered.push({ text: '', col: '', bold: false, gap: true }); continue; }
        const font = (b.bold ? 'bold ' : '') + '11px "Exo 2",sans-serif';
        const wrapped = wrapLine(b.text, font);
        for (const line of wrapped) rendered.push({ text: line, col: b.col || '#8899bb', bold: !!b.bold });
      }

      const boxH = pad + 20 + 6   // "Hinweis" + Trennlinie
        + 18 + 4                   // Subtitle
        + 4 + rendered.length * lineH
        + pad;

      infoPanelBottom = boxY + boxH + 8;
      ctx.save();
      ctx.fillStyle   = 'rgba(8,8,24,0.90)';
      ctx.strokeStyle = col + '88'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 8); ctx.fill(); ctx.stroke();

      let cy = boxY + pad;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';

      // Titel "Hinweis"
      ctx.fillStyle = col; ctx.font = 'bold 13px "Exo 2",sans-serif';
      ctx.fillText('Hinweis', boxX + pad, cy); cy += 20;
      ctx.strokeStyle = col + '33'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(boxX + pad, cy); ctx.lineTo(boxX + boxW - pad, cy); ctx.stroke();
      cy += 4;

      // Subtitle (Phase-Name)
      ctx.fillStyle = col + 'cc'; ctx.font = 'bold 11px "Exo 2",sans-serif';
      ctx.fillText(subtitle, boxX + pad, cy); cy += 18 + 4;

      // Inhaltszeilen
      for (const row of rendered) {
        if (row.gap) { cy += lineH / 2; continue; }
        ctx.fillStyle = row.col;
        ctx.font = row.bold ? 'bold 11px "Exo 2",sans-serif' : '11px "Exo 2",sans-serif';
        ctx.fillText(row.text, boxX + pad, cy);
        cy += lineH;
      }

      ctx.restore();
    }

    function drawSpielPhasePanel() {
      const ch  = CHARACTERS[players[currentPlayerIdx].charIdx];
      const col = ch.colorLight;
      const pw  = 264, px = 16, py = 16;
      const rowH = 17, secGap = 8, subHdrH = 16, btnH = 26, pad = 10;

      // Zustände
      const ressourcenState = spielPhaseStep <= 2 ? 'active' : 'done';
      const grundState  = (spielPhaseStep === 1 && !spielResourcePopup) ? 'active' : 'done';
      const abbauState  = spielResourcePopup ? 'done' : spielPhaseStep === 1 ? 'pending' : spielPhaseStep === 2 ? 'active' : 'done';
      const hauptState  = spielPhaseStep < 3 ? 'pending' : spielPhaseStep === 3 ? 'active' : 'done';
      const beuteState  = spielPhaseStep === 4 ? 'active' : 'pending';

      // Höhe dynamisch berechnen
      const abbauPreview = abbauState === 'pending' ? getAbbauPreview(currentPlayerIdx) : [];
      const abbauRows = abbauState === 'pending' ? Math.max(1, abbauPreview.length) : Math.max(1, spielPhase2Result.length);
      const hauptRows = hauptState === 'pending' ? 1 : 1 + Math.max(1, spielPhase3Log.length) + 1;
      const wW = spielTurnKills.filter(t => t === 'W').length;
      const wK = spielTurnKills.filter(t => t === 'WD').length;
      const sK = spielTurnKills.filter(t => t === 'S').length;
      const beuteRows = (wW > 0 || wK > 0 || sK > 0) ? (wW > 0 ? 1 : 0) + (wK > 0 ? 1 : 0) + (sK > 0 ? 1 : 0) + 1 : 1;

      const beuteGesamt = beuteState === 'active' && (wW > 0 || wK > 0 || sK > 0) ? 46 : 0;

      // "Einnahmen gesamt"-Block: wird gezeichnet wenn Phase1-Ergebnis + Abbau fertig
      const einnahmenGesamtRows = (spielPhase1Result && abbauState === 'done')
        ? 2
          + (spielPhase2Result.some(r => r.label.includes('Edelstein'))   ? 1 : 0)
          + (spielPhase2Result.some(r => r.label.includes('Machtpunkte')) ? 1 : 0)
        : 0;
      const einnahmenGesamtH = einnahmenGesamtRows > 0
        ? 4 + 6 + 14 + einnahmenGesamtRows * 20 + 2   // gap+sep+title+rows+trail
        : 0;

      let totalH = pad
        + 22 + 6                                          // Rundenzähler (22) + Trennlinie (6)
        + 20 + subHdrH + rowH * 2 + 38                   // Phase 1 Header + Grundversorgung + Badge (38)
        + subHdrH + abbauRows * rowH                      // Abbauertrag
        + einnahmenGesamtH + secGap                       // Einnahmen gesamt + Abstand
        + 20 + hauptRows * rowH + secGap                  // Phase 2 Header + Zeilen + Abstand
        + 20 + beuteRows * rowH + beuteGesamt             // Phase 3 Header + Zeilen + Beute gesamt
        + pad;

      // ── Rückgängig-Button als Höhenlimit ─────────────────────────────────
      const ubStackH = 248 + Math.max(0, players.length - 1) * 50;
      const ubBtnTopY = canvas.height - ubStackH - 10 - 28 - 6;
      const maxPanelH = ubBtnTopY - py - 8;

      // Log kürzen wenn Panel zu groß wäre
      let logToShow  = spielPhase3Log;
      let logTrimmed = false;
      if (hauptState !== 'pending' && spielPhase3Log.length > 0 && totalH > maxPanelH) {
        const overheadH  = totalH - spielPhase3Log.length * rowH;
        const maxLogRows = Math.max(1, Math.floor((maxPanelH - overheadH) / rowH));
        if (maxLogRows < spielPhase3Log.length) {
          const showCount = Math.max(0, maxLogRows - 1); // 1 Zeile für "…"
          logToShow   = showCount > 0 ? spielPhase3Log.slice(-showCount) : [];
          logTrimmed  = true;
          totalH      = overheadH + maxLogRows * rowH;
        }
      }

      ctx.save();
      ctx.fillStyle   = 'rgba(6,8,22,0.93)';
      ctx.strokeStyle = col + '55'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.roundRect(px, py, pw, totalH, 8); ctx.fill(); ctx.stroke();

      let cy = py + pad;

      const drawPhaseHeader = (num, title, state) => {
        const hCol = state === 'active' ? col : state === 'done' ? '#556' : '#445';
        const icon = state === 'active' ? '▶' : state === 'done' ? '✓' : '·';
        ctx.fillStyle = hCol; ctx.font = `bold 11px "Exo 2",sans-serif`;
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(`${icon} Phase ${num} · ${title}`, px + pad, cy);
        if (state === 'active') {
          ctx.strokeStyle = col + '44'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(px + pad, cy + 14); ctx.lineTo(px + pw - pad, cy + 14); ctx.stroke();
        }
        cy += 20;
      };

      const drawSubHeader = (title, state) => {
        const hCol = state === 'active' ? '#aac8dd' : state === 'done' ? '#4a5560' : '#3a4450';
        const icon = state === 'active' ? '›' : state === 'done' ? '✓' : '·';
        ctx.fillStyle = hCol; ctx.font = `bold 10px "Exo 2",sans-serif`;
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(`  ${icon} ${title}`, px + pad + 8, cy);
        cy += subHdrH;
      };

      const drawRow = (label, value, state, highlight, customColor) => {
        const tCol = customColor ? customColor
                   : highlight   ? '#aaffcc'
                   : state === 'active' ? '#cccfe8'
                   : state === 'done'   ? '#8899aa'
                   : '#7a8fa0';
        const vCol = customColor ? customColor
                   : state === 'active' ? '#ffdd66' : '#667788';
        ctx.font = '11px "Exo 2",sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillStyle = tCol;
        ctx.fillText(label, px + pad + 10, cy);
        if (value !== '') {
          ctx.fillStyle = vCol; ctx.textAlign = 'right';
          ctx.fillText(value, px + pw - pad, cy);
        }
        ctx.textAlign = 'left';
        cy += rowH;
      };

      const drawIncomeBadge = (unitCount) => {
        const tier = unitCount <= 3 ? 0 : unitCount <= 5 ? 1 : 2;
        const cfg = [
          { bg: 'rgba(20,80,40,0.55)',  border: '#44cc77', text: '#55ee88', icon: '◆', label: 'Maximales Einkommen', detail: '+3 Gold · +3 Tränke' },
          { bg: 'rgba(80,50,10,0.55)',  border: '#cc8833', text: '#ffaa44', icon: '◇', label: 'Normales Einkommen',  detail: '+2 Gold · +2 Tränke' },
          { bg: 'rgba(80,15,15,0.55)',  border: '#cc3333', text: '#ff5555', icon: '▽', label: 'Niedriges Einkommen', detail: '+1 Gold · +1 Trank'  },

        ctx.fillStyle = cfg.text;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = 'bold 12px "Exo 2",sans-serif';
        ctx.fillText(`${cfg.icon}  ${cfg.label}`, bx + bw / 2, cy + 10);
        ctx.font = '11px "Exo 2",sans-serif';
        ctx.fillText(cfg.detail, bx + bw / 2, cy + 24);
        ctx.textAlign = 'left';
        cy += bh + 4;
      };

      const drawPhaseBtn = (label, action) => {
        cy += 4;
        const bx = px + pad, bw = pw - pad * 2;
        ctx.fillStyle   = 'rgba(255,255,255,0.05)';
        ctx.strokeStyle = col + '99'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.roundRect(bx, cy, bw, btnH, 5); ctx.fill(); ctx.stroke();
        ctx.fillStyle = col; ctx.font = 'bold 12px "Exo 2",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(label, bx + bw / 2, cy + btnH / 2);
        spielActionBtns.push({ x: bx, y: cy, w: bw, h: btnH, action });
        cy += btnH + 2;
      };

      // ── Rundenzähler ────────────────────────────────────────────────────
      ctx.fillStyle = 'rgba(10,12,30,0.7)';
      ctx.beginPath(); ctx.roundRect(px + pad, cy, pw - pad * 2, 18, 4); ctx.fill();
      ctx.fillStyle = col; ctx.font = 'bold 12px "Exo 2",sans-serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(`⟳  Runde ${spielRunde}`, px + pad + 6, cy + 9);
      ctx.fillStyle = '#8899aa'; ctx.font = '12px "Exo 2",sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(`Spieler ${currentPlayerIdx + 1}`, px + pw - pad - 6, cy + 9);
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      cy += 22;
      ctx.strokeStyle = '#2a3a55'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px + pad, cy); ctx.lineTo(px + pw - pad, cy); ctx.stroke();
      cy += 6;

      // ── Phase 1: Ressourcenphase ─────────────────────────────────────────
      drawPhaseHeader(1, 'Ressourcenphase', ressourcenState);

      drawSubHeader('Grundversorgung', grundState);
      const liveUnitCount = spielUnits.filter(u => u.ownerIdx === currentPlayerIdx).length;
      const displayCount  = spielPhase1Result ? spielPhase1Result.unitCount : liveUnitCount;
      drawRow(`Einheiten: ${displayCount}`, '', grundState);
      drawRow(spielPhase1Result ? `+${spielPhase1Result.gold} Gold · +${spielPhase1Result.trank} Tränke` : '–', '', grundState);
      drawIncomeBadge(displayCount);

      drawSubHeader('Abbauertrag', abbauState);

        for (const r of abbauPreview) drawRow(r.text, '', 'pending', r.ok);
      } else if (spielPhase2Result.length === 0) {
        drawRow('Kein Abbau', '', abbauState);
      } else {
        for (const r of spielPhase2Result) drawRow(`${r.icon}  ${r.label}`, '', abbauState, true);
      }

      // ── Gesamtübersicht (wenn Phase 1 + Abbau abgeschlossen) ────────────────
      if (spielPhase1Result && abbauState === 'done') {
        // Summen berechnen
        let totalGold   = spielPhase1Result.gold;
        let totalTrank  = spielPhase1Result.trank;
        let totalGems   = 0;
        let totalMP     = 0;
        for (const r of spielPhase2Result) {
          if (r.label.includes('+1 Gold'))          totalGold++;
          if (r.label.includes('+1 Trank'))         totalTrank++;
          if (r.label.includes('Edelstein abgebaut')) totalGems++;
          if (r.label.includes('Machtpunkte'))      totalMP += 5;
        }

        cy += 4;
        // Trennlinie + Titel
        ctx.strokeStyle = col + '44'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(px + pad, cy); ctx.lineTo(px + pw - pad, cy); ctx.stroke();

        ctx.fillStyle = col; ctx.font = 'bold 11px "Exo 2",sans-serif';

        ctx.fillText('Einnahmen gesamt', px + pad, cy);
        cy += 14;

          { icon: '🧪', label: 'Tränke',  val: `+${totalTrank}`, col: '#44ddcc' },
        ];
        if (totalGems > 0)  sumRows.push({ icon: '💎', label: 'Edelsteine', val: `+${totalGems}`, col: '#88eeff' });
        if (totalMP  > 0)   sumRows.push({ icon: '🔮', label: 'Machtpunkte', val: `+${totalMP}`,  col: '#bb88ff' });

        for (const row of sumRows) {
          const rh = 18, rx = px + pad, rw = pw - pad * 2;

          ctx.beginPath(); ctx.roundRect(rx, cy, rw, rh, 3); ctx.fill();

          ctx.textAlign = 'left';  ctx.textBaseline = 'middle';
          ctx.fillText(`${row.icon}  ${row.label}`, rx + 6, cy + rh / 2);
          ctx.fillStyle = row.col; ctx.font = 'bold 11px "Exo 2",sans-serif';
          ctx.textAlign = 'right';
          ctx.fillText(row.val, rx + rw - 6, cy + rh / 2);
          cy += rh + 2;
        }
        cy += 2;
        ctx.textAlign = 'left';
      }

      cy += secGap;

      // ── Phase 2: Hauptphase ──────────────────────────────────────────────
      drawPhaseHeader(2, 'Hauptphase', hauptState);
      if (hauptState === 'pending') {
        drawRow('Noch nicht begonnen', '', 'pending');
      } else {
        drawRow(`Start: ${spielPhase3StartGold} Gold · ${spielPhase3StartTrank} Tränke`, '', hauptState);
        if (spielPhase3Log.length === 0) {
          drawRow('Keine Aktionen', '', hauptState);
        } else {
          if (logTrimmed) drawRow('…', '', hauptState);
          for (const entry of logToShow) drawRow(entry.label, entry.detail, hauptState);
        }
        const curGold = players[currentPlayerIdx].gold;
        const curTrank = players[currentPlayerIdx].nachtrank;
        drawRow(`Aktuell: ${curGold} Gold · ${curTrank} Tränke`, '', hauptState);
      }

      cy += secGap;

      // ── Phase 3: Beutephase ──────────────────────────────────────────────
      drawPhaseHeader(3, 'Beutephase', beuteState);
      if (wW === 0 && wK === 0 && sK === 0) {
        drawRow('Keine Beute', '', beuteState);
      } else {
        if (wW > 0) drawRow(`◈ W getötet ×${wW}`,    `+${wW * 2} Gold`, beuteState);
        if (wK > 0) drawRow(`◈ W degradiert ×${wK}`, `+${wK} Gold`,     beuteState);
        if (sK > 0) drawRow(`◇ S getötet ×${sK}`,    `+${sK} Gold`,     beuteState);
        drawRow(`Erwartete Beute: +${wW * 2 + wK + sK} Gold`, '', beuteState);
      }

      // ── Beute gesamt (wenn Beutephase aktiv und Kills vorhanden) ─────────
      if (beuteState === 'active' && (wK > 0 || sK > 0)) {
        cy += 4;
        ctx.strokeStyle = col + '44'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(px + pad, cy); ctx.lineTo(px + pw - pad, cy); ctx.stroke();
        cy += 6;
        ctx.fillStyle = col; ctx.font = 'bold 11px "Exo 2",sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('Einnahmen aus Kämpfen', px + pad, cy);
        cy += 14;
        const rh = 18, rx = px + pad, rw = pw - pad * 2;
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.beginPath(); ctx.roundRect(rx, cy, rw, rh, 3); ctx.fill();
        ctx.fillStyle = '#aabbcc'; ctx.font = '11px "Exo 2",sans-serif';

        ctx.textAlign = 'left';

    function drawResourcePopup() {
      if (!spielResourcePopup) return;
      const { lines, startTime } = spielResourcePopup;
      const elapsed   = (Date.now() - startTime) / 1000;
      const remaining = Math.max(0, 5 - elapsed);
      const ch  = CHARACTERS[players[currentPlayerIdx].charIdx];
      const col = ch.colorLight;

      const pw = 400, lineH = 22, pad = 22;
      const contentH = lines.reduce((h, l) => h + (l.text === '' ? lineH / 2 : lineH), 0);
      const ph = pad * 2 + contentH + 40;
      const px = canvas.width  / 2 - pw / 2;
      const py = canvas.height / 2 - ph / 2;

      ctx.save();
      // Abdunkelung
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Panel
      ctx.fillStyle   = 'rgba(6,10,30,0.97)';
      ctx.strokeStyle = col; ctx.lineWidth = 2;
      ctx.shadowColor = col; ctx.shadowBlur = 24;
      ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 12); ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;

      let cy = py + pad;
      for (const line of lines) {
        if (line.text === '') { cy += lineH / 2; continue; }
        ctx.fillStyle    = line.color;
        ctx.font         = line.bold ? 'bold 13px "Exo 2",sans-serif' : '12px "Exo 2",sans-serif';
        ctx.textAlign    = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(line.text, px + pw / 2, cy);
        cy += lineH;
      }

      // Fortschrittsbalken
      const barW = pw - pad * 2, barH = 6;
      const bx = px + pad, by = cy + 10;
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.roundRect(bx, by, barW, barH, 3); ctx.fill();
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.roundRect(bx, by, barW * (remaining / 5), barH, 3); ctx.fill();

      // Hinweis
      ctx.fillStyle = '#667788'; ctx.font = '12px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(`[Enter] schließen  ·  automatisch in ${Math.ceil(remaining)}s`, px + pw / 2, by + barH + 8);
      ctx.restore();
    }

      players[currentPlayerIdx].gold -= 2;
      const { type, unitQ, unitR } = spielBuildingMode;
      const adj = spielBuildingMode.candidates[idx];
      if (type === 'mine') {
        spielBuildings.push({ q: unitQ, r: unitR, type: 'mine', ownerIdx: currentPlayerIdx,
          stack: makeMineStack(), adjBQ: adj.q, adjBR: adj.r });
        spielPhase3Log.push({ label: '⛏ Mine gebaut', detail: '−2 Gold' });
        spielLog = 'Mine gebaut. −2 Gold.';
      } else {
        spielBuildings.push({ q: unitQ, r: unitR, type: 'well', ownerIdx: currentPlayerIdx,
          adjBQ: adj.q, adjBR: adj.r });
        spielPhase3Log.push({ label: '◎ Brunnen gebaut', detail: '−2 Gold' });
        spielLog = 'Brunnen gebaut. −2 Gold.';

    function isHamburgerClick(mx, my) {
      // Exakt dieselbe Position wie beim Zeichnen (beide Phasen identisch)
      const MB_W = 130, MB_X = canvas.width - 10 - 130;
      const BTN_Y = 12, BTN_H = 32;
      return mx >= MB_X && mx <= MB_X + MB_W && my >= BTN_Y && my <= BTN_Y + BTN_H;
    }

    function handleInGameMenuClick(mx, my) {
      if (!inGameMenuOpen) return false;
      // Schließen-Button
      const cb = inGameMenuCloseBtn;
      if (cb && mx >= cb.x && mx <= cb.x + cb.w && my >= cb.y && my <= cb.y + cb.h) {
        inGameMenuOpen = false; render(); return true;
      }
      // Navigations-Pfeile
      for (const btn of inGameMenuNavBtns) {
        if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          inGameMenuPage = Math.max(1, Math.min(HANDBUCH_PAGES.length, inGameMenuPage + btn.dir));
          render(); return true;
        }
      }
      // Klick außerhalb der Box schließt
      const BW = 860, BH = 840;
      const BX = (canvas.width - BW) / 2, BY = (canvas.height - BH) / 2;
      if (mx < BX || mx > BX + BW || my < BY || my > BY + BH) {
        inGameMenuOpen = false; render();
      }
      return true;
    }

    // ── Nadoris: Busch-Ruine anklicken ──────────────────────────────────────
    function handleBuschRuineClick(bdIdx, bq, br) {
      if (!useAbilities) { spielLog = '💀 Dornenbusch-Ruine (Fähigkeiten deaktiviert).'; return; }
      const p = players[currentPlayerIdx];
      if (p.charIdx !== 2) { spielLog = '💀 Dornenbusch-Ruine – nur Nadoris kann sie regenerieren.'; return; }
      // Bestätigungsdialog öffnen
      nadorRegenPrompt = { bdIdx, bq, br };
      spielLog = '🌿 Dornenbusch regenerieren?';
      return;
    }

    function executeNadorRegen(bdIdx, bq, br) {
      const p = players[currentPlayerIdx];
      const enemies = spielUnits
        .map((u, i) => ({ u, i }))
        .filter(({ u }) => u.q === bq && u.r === br && u.ownerIdx !== currentPlayerIdx && u.type !== 'BD');

      saveSpielState();
      p.nachtrank -= 1;

      if (enemies.length === 0) {
        // No enemies: just regenerate
        spielUnits[bdIdx].type = 'B';
        spielPhase3Log.push({ label: '🌿 Dornenbusch', detail: 'regeneriert (1 Trank)' });
        spielLog = '🌿 Dornenbusch regeneriert!';
        return;
      }

      // Enemy on field: Busch attacks (1 ATK), enemy counter-attacks (1 ATK) → Bush bleibt Ruine
      const enemy = enemies[0].u;
      const eIdx  = enemies[0].i;
      const droppedGems = [];
      let msg = '🌿 Busch greift an! ';

      if (enemy.type === 'W') {
        // Busch (1 ATK) trifft W → W→S. W schlägt zurück (1 ATK) → Busch→Ruine bleibt.
        spielUnits[eIdx].type = 'S';
        spielTurnKills.push('WD');
        msg += 'Feindlicher Wächter → Schleicher. Dornenbusch bleibt Ruine.';
      } else {
        // Busch (1 ATK) trifft S → S stirbt. S schlägt zurück (1 ATK) → Busch bleibt Ruine.
        if (enemy.hasGem) droppedGems.push({ q: enemy.q, r: enemy.r });
        spielTurnKills.push('S');
        trackMovinaTod(enemy);
        spielUnits.splice(eIdx, 1);
        msg += 'Feindlicher Schleicher stirbt. Dornenbusch bleibt Ruine.';
      }

      droppedGems.forEach(g => {
        const free = spielUnits.findIndex(u => u.ownerIdx === currentPlayerIdx && u.q === g.q && u.r === g.r);
        if (free >= 0) spielUnits[free].hasGem = true;
      });

      spielPhase3Log.push({ label: '🌿 Dornenbusch → Ruine', detail: `Angriff (1 Trank)` });
      spielLog = msg + ` (${p.nachtrank} Tränke übrig – erneut klicken zum Wiederholen)`;
    }

    // ── Allgemeiner Klick-Handler: Menü + Versionsnummer ────────────────────
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;

      // Menü-Einträge per Maus wählbar machen
      if (screen === 'menu') {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const startY = cy - 120, itemH = 64;
        for (let i = 0; i < MENU_ITEMS.length; i++) {
          const iy = startY + i * itemH;
          if (mx >= cx - 160 && mx <= cx + 160 && my >= iy - 22 && my <= iy + 22) {
            menuIndex = i;
            render();
            handleMenuSelect(MENU_ITEMS[i]);
            return;
          }
        }
        return;
      }

      // Moduswahl per Maus
      if (screen === 'modeSelect') {
        const { cx: cx2, cardW: cardW2, cardH: cardH2, gap: gap2, cardY: cardY2 } = _modeCardGeom();
        const totalW2 = cardW2 * 2 + gap2;
        for (let i = 0; i < 2; i++) {
          const bx2 = cx2 - totalW2 / 2 + i * (cardW2 + gap2);
          if (mx >= bx2 && mx <= bx2 + cardW2 && my >= cardY2 && my <= cardY2 + cardH2) {
            useAbilities = i === 1; screen = 'playerSelect'; render(); return;
          }
        }
        return;
      }

      // Charaktere Tab-Buttons per Maus
      if (screen === 'charaktere') {
        for (const btn of charTabBtnRects) {
          if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
            charaktereTab = btn.tab; render(); return;
          }
        }
        return;
      }

      // Spielerauswahl per Maus
      if (screen === 'playerSelect') {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const options = [2, 3, 4, 5, 6];
        const btnW = 90, btnH = 90, gap = 24;
        const totalW = options.length * btnW + (options.length - 1) * gap;
        const startX = cx - totalW / 2;
        const btnY = cy - 40;
        for (let i = 0; i < options.length; i++) {
          const bx = startX + i * (btnW + gap);
          if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
            playerCount = options[i]; render();
            return;
          }
        }
        const sbW = 200, sbH = 52, sbX = cx - 100, sbY = cy + 100;
        if (mx >= sbX && mx <= sbX + sbW && my >= sbY && my <= sbY + sbH) {
          carouselIndex = 0; charSelectingPlayer = 1; selectedCharacters = [];
          screen = 'characterSelect'; render();
        }
        return;
      }

      // Charakterauswahl per Maus
      if (screen === 'characterSelect') {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const cardCenterY = cy + 30;
        const arrowW = 50, arrowH = 50;
        // Linker Pfeil
        const lax = cx - 195, lay = cardCenterY - arrowH / 2;
        if (mx >= lax && mx <= lax + arrowW && my >= lay && my <= lay + arrowH) {
          carouselIndex = nextFreeCharIdx(carouselIndex, -1); render(); return;
        }
        // Rechter Pfeil
        const rax = cx + 145, ray = cardCenterY - arrowH / 2;
        if (mx >= rax && mx <= rax + arrowW && my >= ray && my <= ray + arrowH) {
          carouselIndex = nextFreeCharIdx(carouselIndex, 1); render(); return;
        }
        // Bestätigungs-Button
        const cbX = cx - 100, cbY = cy + 255, cbW = 200, cbH = 48;
        if (mx >= cbX && mx <= cbX + cbW && my >= cbY && my <= cbY + cbH) {
          if (selectedCharacters.includes(carouselIndex)) return;
          selectedCharacters.push(carouselIndex);
          if (charSelectingPlayer < playerCount) {
            charSelectingPlayer++;
            carouselIndex = nextFreeCharIdx(carouselIndex, 1);
            render();
          } else {
            initGame(); screen = 'game'; render();
          }
          return;
        }
        return;
      }

      // ── Statusleiste-Buttons unten rechts ───────────────────────────────
      {
        ctx.font = 'italic 14px "Exo 2",sans-serif';
        const verW = ctx.measureText('Version 0.1.26').width;
        const cy2  = canvas.height - 20, btnH = 30;
        const sbW  = 44, sbX = canvas.width - 14 - verW - 10 - sbW, sbY = cy2 - btnH / 2;
        const brW  = 44, brX = sbX - 8 - brW,                       brY = cy2 - btnH / 2;
        // ⚠ Bugreport
        if (mx >= brX && mx <= brX + brW && my >= brY && my <= brY + btnH) {
          let url = 'bugreport.html';
          try { if (gamePhase === 'spielphase') url += '?code=' + encodeURIComponent(encodeGameState()); } catch(e) {}
          window.open(url, '_blank');
          return;
        }
        // 💾 Speichern
        if (gamePhase === 'spielphase' && mx >= sbX && mx <= sbX + sbW && my >= sbY && my <= sbY + btnH) {
          const code = encodeGameState();
          document.getElementById('saveCodeText').value = code;
          document.getElementById('saveCodeOverlay').style.display = 'flex';
          setTimeout(() => { document.getElementById('saveCodeText').select(); }, 50);
          return;
        }
      }
    });

    // ── Bauphase: Mausklick ──────────────────────────────────────────────────
    canvas.addEventListener('click', e => {
      if (screen === 'victory') { returnToMenu(); return; }
      if (gamePhase !== 'bauphase') return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (isHamburgerClick(mx, my)) { if (inGameMenuOpen) { inGameMenuOpen = false; if (window.closeHandbuchOverlay) window.closeHandbuchOverlay(); else render(); } else { inGameMenuOpen = true; render(); if (window.openHandbuchOverlay) window.openHandbuchOverlay(() => { inGameMenuOpen = false; render(); }); } return; }
      if (handleInGameMenuClick(mx, my)) return;

        const b = regelHinweisPopup.btnRect;
