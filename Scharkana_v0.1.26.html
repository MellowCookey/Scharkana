          regelHinweisPopup = null; render();
        }
        return;
      }
      if (blockFlash) return;

      // Info-Fenster Button: Hier bleiben
      for (const btn of spielActionBtns) {
        if (btn.action === 'bauSkip' &&
            mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          const cp2 = curPlayer();
          if (cp2.moves > 0) {
            if (cp2.moves <= 2) {
              const minDist = cp2.moves === 2 ? 2 : 3;
              if (bauZuNahFuerSkip(minDist)) {
                showRegelHinweis(cp2.moves);
                render(); return;
              }
            }
            cp2.moves--; advanceTurn(); render();
          }
          return;
        }
      }

      // Klick auf Nachbarfeld → bewegen
      const cp2 = curPlayer();
      if (cp2.moves === 0) return;
      const { q: cq, r: cr } = pixelToHex(mx, my);
      const isAdj = DIRS.some(({ dq, dr }) => cp2.q + dq === cq && cp2.r + dr === cr);
      if (!isAdj) return;
      const nk = `${cq},${cr}`;
      if (hexMap.get(nk) === 'blocked' || isBlockedByPlayer(cq, cr)) { flashBlocked(cq, cr); render(); return; }
      if (hexMap.get(nk) === 'sealed') return;
      if (hexDist(cq, cr) > 10) { flashBlocked(cq, cr); spielLog = 'Spielfeldgrenze erreicht!'; render(); return; }
      // Abstandsregel: letzten 2 Züge prüfen (kein Fallback bei moves ≤ 2)
      if (bauDistanzStatus(cq, cr) === 'blocked' && (cp2.moves > 2 ? !bauAllNeighborsBlocked() : true)) {
        flashBlocked(cq, cr);
        spielLog = 'Zu nah an einem Mitspieler! Wähle ein weiter entferntes Feld.';
        render(); return;
      }
      const fromQ2 = cp2.q, fromR2 = cp2.r;
      const animCharIdx2 = cp2.charIdx;
      cp2.q = cq; cp2.r = cr;
      if (!hexMap.has(nk)) hexMap.set(nk, 'visited');
      cp2.moves--;
      checkEnclosed();
      advanceTurn();
      startMoveAnim(fromQ2, fromR2, cq, cr, (x, y) => {
        drawSpriteOnBoard(x - SIZE * 0.30, y + SIZE * 0.08, animCharIdx2, 0.54);
      });
    });

    // ── Spielphase: Mausklick ────────────────────────────────────────────────
    canvas.addEventListener('click', e => {
      if (gamePhase !== 'spielphase') return;
      if (spielResourcePopup) return; // Popup blockiert alle Klicks
      const rect = canvas.getBoundingClientRect();
      const mx   = e.clientX - rect.left;
      const my   = e.clientY - rect.top;
      if (isHamburgerClick(mx, my)) { if (inGameMenuOpen) { inGameMenuOpen = false; if (window.closeHandbuchOverlay) window.closeHandbuchOverlay(); else render(); } else { inGameMenuOpen = true; render(); if (window.openHandbuchOverlay) window.openHandbuchOverlay(() => { inGameMenuOpen = false; render(); }); } return; }
      if (handleInGameMenuClick(mx, my)) return;

      // ── Dornenbusch-Ersetzen-Prompt: Ja / Nein ───────────────────────────
      if (nadorBuschReplaceMode && !nadorBuschReplaceMode.selecting) {
        for (const btn of spielActionBtns) {
          if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
            if (btn.action === 'nadorReplaceYes') {
              nadorBuschReplaceMode.selecting = true;
              spielLog = '🌿 Wähle den Dornenbusch, der vernichtet werden soll.';
              render(); return;
            }
            if (btn.action === 'nadorReplaceNo') {
              nadorBuschReplaceMode = null;
              spielLog = '🌿 Beschwörung abgebrochen.';
              render(); return;
            }
          }
        }
        return;
      }

      // ── Dornenbusch-Ersetzen: Busch auswählen ────────────────────────────
      if (nadorBuschReplaceMode?.selecting) {
        const fx = (mx - canvas.width  / 2) / SIZE;
        const fy = (my - canvas.height / 2) / SIZE;
        const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
        const fr = 2 / 3 * fy;
        const s  = -fq - fr;
        let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
        const dq0 = Math.abs(rq - fq), dr0 = Math.abs(rr - fr), ds0 = Math.abs(rs - s);
        if (dq0 > dr0 && dq0 > ds0) rq = -rr - rs;
        else if (dr0 > ds0)           rr = -rq - rs;
        const clickedKey = key(rq, rr);
        if (nadorBuschReplaceMode.eligibleBushKeys.includes(clickedKey)) {
          saveSpielState();
          const removeIdx = spielUnits.findIndex(
            u => u.type === 'B' && key(u.q, u.r) === clickedKey && u.ownerIdx === nadorBuschReplaceMode.nadorPIdx
          );
          if (removeIdx !== -1) {
            spielUnits.splice(removeIdx, 1);
            if (spielSelectedIdx === removeIdx) spielSelectedIdx = null;
            else if (spielSelectedIdx !== null && spielSelectedIdx > removeIdx) spielSelectedIdx--;
          }
          spielUnits.push({ q: nadorBuschReplaceMode.newQ, r: nadorBuschReplaceMode.newR, type: 'B', ownerIdx: nadorBuschReplaceMode.nadorPIdx });
          spielPhase3Log.push({ label: '🌿 Dornenbusch', detail: 'neu + ersetzt' });
          spielLog = '🌿 Dornenbusch gesetzt – alter Busch vernichtet!';
          nadorBuschReplaceMode = null;
        } else {
          nadorBuschReplaceMode = null;
          spielLog = '🌿 Beschwörung abgebrochen.';
        }
        render(); return;
      }

      // ── Feuerinfusion-Prompt: Ja / Nein ──────────────────────────────────
      if (tarrakAbilityPrompt) {
        const { btnW, btnH, btnY, btn1X, btn2X } = _firePromptGeom();
        if (mx >= btn1X && mx <= btn1X + btnW && my >= btnY && my <= btnY + btnH) {
          resolveFireInfusionPrompt(true);  return;
        }
        if (mx >= btn2X && mx <= btn2X + btnW && my >= btnY && my <= btnY + btnH) {
          resolveFireInfusionPrompt(false); return;
        }
        return;
      }

      // ── Phasenschritt 1/2: nur Weiter-Button erlaubt ────────────────────
      if (spielPhaseStep === 1 || spielPhaseStep === 2) {
        for (const btn of spielActionBtns) {
          if (btn.action === 'nextPhase' &&
              mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
            confirmPhaseStep(); render();
          }
        }
        return;
      }


      // ── Gebäude-Auswahlmodus (Mine/Brunnen) ──────────────────────────────
      if (spielBuildingMode) {
        const { q: cq, r: cr } = (() => {
          const fx = (mx - canvas.width  / 2) / SIZE;
          const fy = (my - canvas.height / 2) / SIZE;
          const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
          const fr = 2 / 3 * fy;
          const s  = -fq - fr;
          let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
          const dq = Math.abs(rq - fq), dr = Math.abs(rr - fr), ds = Math.abs(rs - s);
          if (dq > dr && dq > ds) rq = -rr - rs;
          else if (dr > ds)        rr = -rq - rs;
          return { q: rq, r: rr };
        })();
        const hit = spielBuildingMode.candidates.findIndex(c => c.q === cq && c.r === cr);
        if (hit !== -1) {
          if (spielBuildingMode.candidates[hit].used) {
            spielLog = 'Dieses Feld wird bereits verwendet.';
          } else {
            confirmBuildingSelection(hit);
          }
        } else {
          spielBuildingMode = null;
          spielLog = 'Auswahl abgebrochen.';
        }
        render(); return;
      }

      // ── Nadoris reaktive Münze – Ruinen-Auswahl ──────────────────────────
      if (nadorReaktivSelect) {
        const { q: bq, r: br2 } = (() => {
          const fx = (mx - canvas.width  / 2) / SIZE;
          const fy = (my - canvas.height / 2) / SIZE;
          const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
          const fr = 2 / 3 * fy;
          const s  = -fq - fr;
          let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
          const dq2 = Math.abs(rq - fq), dr2 = Math.abs(rr - fr), ds2 = Math.abs(rs - s);
          if (dq2 > dr2 && dq2 > ds2) rq = -rr - rs;
          else if (dr2 > ds2)           rr = -rq - rs;
          return { q: rq, r: rr };
        })();
        const bk = key(bq, br2);
        if (nadorReaktivSelect.eligibleKeys.includes(bk)) {
          const { nPIdx } = nadorReaktivSelect;
          nadorReaktivSelect = null;
          const bd = spielUnits.find(u => u.type === 'BD' && u.q === bq && u.r === br2 && u.ownerIdx === nPIdx);
          if (bd) bd.type = 'B';
          spielLog = '🌿 Nadoris setzt Münze ein – Dornenbusch regeneriert!';
          advanceToNextPlayerAnimated();
        }
        render(); return;
      }

      // ── Dornenbusch-Modus (Nadoris) ─────────────────────────────────────
      if (nadorBuschMode) {
        const { q: bq, r: br2 } = (() => {
          const fx = (mx - canvas.width  / 2) / SIZE;
          const fy = (my - canvas.height / 2) / SIZE;
          const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
          const fr = 2 / 3 * fy;
          const s  = -fq - fr;
          let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
          const dq2 = Math.abs(rq - fq), dr2 = Math.abs(rr - fr), ds2 = Math.abs(rs - s);
          if (dq2 > dr2 && dq2 > ds2) rq = -rr - rs;
          else if (dr2 > ds2)           rr = -rq - rs;
          return { q: rq, r: rr };
        })();
        const bk = key(bq, br2);
        if (nadorBuschMode.eligibleKeys.includes(bk)) {
          const { nadorPIdx } = nadorBuschMode;
          const playerCount = players.filter(p => !p.eliminated).length;
          const maxBushes   = playerCount <= 2 ? 1 : playerCount <= 4 ? 2 : 3;
          const bushes      = spielUnits.map((u, i) => ({ u, i })).filter(({ u }) => u.ownerIdx === nadorPIdx && (u.type === 'B' || u.type === 'BD'));
          nadorBuschMode = null;
          if (bushes.length >= maxBushes) {
            nadorBuschReplaceMode = {
              nadorPIdx,
              newQ: bq, newR: br2,
              eligibleBushKeys: bushes.map(({ u }) => key(u.q, u.r)),
              selecting: false,
            };
            spielLog = '🌿 Maximum erreicht – soll ein bestehender Busch vernichtet werden?';
          } else {
            saveSpielState();
            spielUnits.push({ q: bq, r: br2, type: 'B', ownerIdx: nadorPIdx });
            spielPhase3Log.push({ label: '🌿 Dornenbusch', detail: 'beschworen' });
            spielLog = '🌿 Dornenbusch beschworen!';
          }
        } else {
          nadorBuschMode = null;
          spielLog = '🌿 Beschwörung abgebrochen.';
        }
        render(); return;
      }

      // ── Donnerblitz-Modus (Thorgrim) ─────────────────────────────────────
      if (thorgrimBlitzMode) {
        const { q: tq, r: tr } = (() => {
          const fx = (mx - canvas.width  / 2) / SIZE;
          const fy = (my - canvas.height / 2) / SIZE;
          const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
          const fr = 2 / 3 * fy;
          const s  = -fq - fr;
          let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
          const dq3 = Math.abs(rq - fq), dr3 = Math.abs(rr - fr), ds3 = Math.abs(rs - s);
          if (dq3 > dr3 && dq3 > ds3) rq = -rr - rs;
          else if (dr3 > ds3)           rr = -rq - rs;
          return { q: rq, r: rr };
        })();
        const tk = key(tq, tr);
        if (thorgrimBlitzMode.step === 'selectWatcher') {
          const wIdx = spielUnits.findIndex(u => u.q === tq && u.r === tr && u.ownerIdx === currentPlayerIdx && u.type === 'W');
          if (wIdx !== -1) {
            thorgrimBlitzMode = { step: 'selectTarget', watcherIdx: wIdx, watcherQ: spielUnits[wIdx].q, watcherR: spielUnits[wIdx].r };
            spielLog = '⚡ Wächter gewählt. Klicke auf ein angrenzendes Feld für den Donnerblitz.';
          } else {
            thorgrimBlitzMode = null;
            spielLog = '⚡ Kein Wächter – Donnerblitz abgebrochen.';
          }
          render(); return;
        }
        if (thorgrimBlitzMode.step === 'selectTarget') {
          const { watcherIdx, watcherQ, watcherR } = thorgrimBlitzMode;
          const isAdj    = DIRS.some(({ dq, dr }) => watcherQ + dq === tq && watcherR + dr === tr);
          const inGrid   = spielPlayGrid && spielPlayGrid.has(tk) && hexMap.get(tk) !== 'blocked';
          const isECamp  = players.some((p, i) => i !== currentPlayerIdx && !p.eliminated && p.campQ === tq && p.campR === tr);
          if (isAdj && inGrid && !isECamp) {
            const enemiesOnTarget = spielUnits.map((u, i) => ({ u, i }))
              .filter(({ u }) => u.q === tq && u.r === tr && u.ownerIdx !== currentPlayerIdx)
              .sort((a, b) => { const p = t => t === 'W' ? 0 : t === 'S' ? 1 : 2; return p(a.u.type) - p(b.u.type); });
            let msg = '⚡ Donnerblitz! ';
            if (enemiesOnTarget.length === 0) {
              msg += 'Kein Ziel – Blitz verfehlt.';
              spielPhase3Log.push({ label: '⚡ Donnerblitz', detail: 'verfehlt' });
            } else {
              const { u: tgt, i: tgtIdx } = enemiesOnTarget[0];
              const isNeutralTgt = tgt.ownerIdx === -1;
              const blitzBushIdx = tgt.type === 'S'
                ? spielUnits.findIndex(u => u.type === 'B' && u.q === tq && u.r === tr && u.ownerIdx === tgt.ownerIdx) : -1;
              if (blitzBushIdx !== -1) {
                trackNadorBuschAngegriffen(spielUnits[blitzBushIdx]);
                spielUnits[blitzBushIdx].type = 'BD';
                msg += '🌿 Busch → Ruine. Schleicher überlebt.';
                spielPhase3Log.push({ label: '⚡ Donnerblitz', detail: '→ Busch-Ruine' });
              } else if (tgt.type === 'W') {
                spielUnits[tgtIdx].type = 'S';
                if (isNeutralTgt) { players[currentPlayerIdx].machtsteine += 1; msg += 'Neutraler Wächter → S. +1 MP.'; }
                else { spielTurnKills.push('WD'); msg += 'Wächter → S. '; }
                spielPhase3Log.push({ label: '⚡ Donnerblitz', detail: 'W→S' });
              } else {
                if (tgt.type === 'S' && tgt.hasGem) droppedGems.push({ q: tq, r: tr });
                if (!isNeutralTgt) { trackMovinaTod(tgt); spielTurnKills.push(tgt.type); }
                if (isNeutralTgt) { players[currentPlayerIdx].machtsteine += 1; msg += 'Neutraler Schleicher stirbt. +1 MP.'; }
                else msg += `${tgt.type === 'B' ? 'Dornenbusch' : 'Schleicher'} stirbt.`;
                spielUnits.splice(tgtIdx, 1);
                spielPhase3Log.push({ label: '⚡ Donnerblitz', detail: `${tgt.type} stirbt` });
              }
              checkEliminations();
            }
            spielLog = msg;
            thorgrimBlitzMode = null;
          } else {
            thorgrimBlitzMode = null;
            spielLog = '⚡ Ungültiges Ziel – Donnerblitz abgebrochen.';
          }
          render(); return;
        }
      }

      // ── Mondsprung-Modus (Illyria) ──────────────────────────────────────
      if (mondsprungMode) {
        const { q: tq, r: tr } = (() => {
          const fx = (mx - canvas.width  / 2) / SIZE;
          const fy = (my - canvas.height / 2) / SIZE;
          const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
          const fr = 2 / 3 * fy;
          const s  = -fq - fr;
          let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
          const dq4 = Math.abs(rq - fq), dr4 = Math.abs(rr - fr), ds4 = Math.abs(rs - s);
          if (dq4 > dr4 && dq4 > ds4) rq = -rr - rs;
          else if (dr4 > ds4)           rr = -rq - rs;
          return { q: rq, r: rr };
        })();
        const tk = key(tq, tr);
        const { pIdx } = mondsprungMode;
        const cp = players[pIdx];

        if (mondsprungMode.step === 'selectSource') {
          if (mondsprungMode.eligibleKeys.includes(tk)) {
            const sourceAtCamp = tq === cp.campQ && tr === cp.campR;
            const sourceIdx = spielUnits.findIndex(u => u.ownerIdx === pIdx && u.type === 'S' && u.q === tq && u.r === tr && !u.hasGem);
            if (sourceAtCamp) {
              // Richtung 1: Lager → Feld (3 Schleicher)
              const destKeys = [...new Set(
                spielUnits
                  .filter(u => u.ownerIdx === pIdx && u.type === 'S' && !(u.q === cp.campQ && u.r === cp.campR))
                  .map(u => key(u.q, u.r))
              )].filter(k => {
                const [dq5, dr5] = k.split(',').map(Number);
                const sCount = spielUnits.filter(u => u.ownerIdx === pIdx && u.type === 'S' && u.q === dq5 && u.r === dr5).length;
                const hasBush = spielUnits.some(u => u.type === 'B' && u.q === dq5 && u.r === dr5);
                const hasW    = spielUnits.some(u => u.type === 'W' && u.q === dq5 && u.r === dr5);
                return sCount === 1 && !hasBush && !hasW;
              });
              if (destKeys.length === 0) {
                mondsprungMode = null;
                spielLog = '🌙 Kein gültiges Zielfeld – Mondsprung abgebrochen.';
              } else {
                mondsprungMode = { pIdx, step: 'selectDest', sourceIdx, eligibleKeys: destKeys };
                spielLog = '🌙 Klicke auf das Zielfeld (genau 1 eigener Schleicher) – 3 Schleicher erscheinen.';
              }
            } else {
              // Richtung 2: Feld → Lager (sofort ausführen)
              spielUnits[sourceIdx].q = cp.campQ;
              spielUnits[sourceIdx].r = cp.campR;
              spielPhase3Log.push({ label: '🌙 Mondsprung', detail: 'Feld-S → Lager' });
              spielLog = '🌙 Mondsprung! Schleicher ins Lager zurückgerufen.';
              mondsprungMode = null;
              checkEliminations();
              render(); return;
            }
          } else {
            mondsprungMode = null;
            spielLog = '🌙 Mondsprung abgebrochen.';
          }
          render(); return;
        }

        if (mondsprungMode.step === 'selectDest') {
          if (mondsprungMode.eligibleKeys.includes(tk)) {
            const { sourceIdx } = mondsprungMode;
            // Lager-Schleicher zum Zielfeld bewegen + 1 neuen Schleicher spawnen
            spielUnits[sourceIdx].q = tq;
            spielUnits[sourceIdx].r = tr;
            spielUnits.push({ q: tq, r: tr, type: 'S', ownerIdx: pIdx });
            spielPhase3Log.push({ label: '🌙 Mondsprung', detail: 'Lager-S → Feld: 3×S' });
            spielLog = '🌙 Mondsprung! Drei Schleicher erscheinen auf dem Feld.';
            checkEliminations();
          } else {
            spielLog = '🌙 Ungültiges Ziel – Mondsprung abgebrochen.';
          }
          mondsprungMode = null;
          render(); return;
        }
      }

      // ── Aktions-Buttons: Zug beenden / Aufteilen / Zusammenführen ────────
      for (const btn of spielActionBtns) {
        if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          if (btn.action === 'endTurn') {
            triggerPhase4(); render(); return;
          }
          if (btn.action === 'nadorReaktivYes') {
            const nPIdx = players.findIndex(p => p.charIdx === 2 && !p.eliminated);
            if (nPIdx !== -1 && players[nPIdx].abilityReady) {
              players[nPIdx].abilityReady = false;
              const positions = nadorReaktivPrompt.positions;
              nadorReaktivPrompt = null;
              if (positions.length === 1) {
                const bd = spielUnits.find(u => u.type === 'BD' && u.q === positions[0].q && u.r === positions[0].r && u.ownerIdx === nPIdx);
                if (bd) bd.type = 'B';
                spielLog = '🌿 Nadoris setzt Münze ein – Dornenbusch regeneriert!';
                advanceToNextPlayerAnimated();
              } else {
                const eligibleKeys = positions.map(p => key(p.q, p.r));
                nadorReaktivSelect = { eligibleKeys, nPIdx };
                spielLog = '🌿 Klicke auf eine Ruine (💀) zum Regenerieren.';
              }
            } else {
              nadorReaktivPrompt = null;
              advanceToNextPlayerAnimated();
            }
            render(); return;
          }
          if (btn.action === 'nadorReaktivNo') {
            nadorReaktivPrompt = null;
            advanceToNextPlayerAnimated(); return;
          }
          if (btn.action === 'nadorRegenYes') {
            const { bdIdx, bq, br } = nadorRegenPrompt;
            nadorRegenPrompt = null;
            executeNadorRegen(bdIdx, bq, br);
            render(); return;
          }
          if (btn.action === 'nadorRegenNo') {
            nadorRegenPrompt = null;
            spielLog = '🌿 Regeneration abgebrochen.';
            render(); return;
          }
          if (btn.action === 'movinaReviveYes') {
            const movPIdx = players.findIndex(p => p.charIdx === 4 && !p.eliminated);
            if (movPIdx !== -1 && movinaFeldTod) {
              const { q: fq, r: fr } = movinaFeldTod;
              const atkIdx = spielUnits.findIndex(u => u.q === fq && u.r === fr && u.ownerIdx === currentPlayerIdx);
              if (atkIdx !== -1) {
                const atk = spielUnits[atkIdx];
                if (atk.type === 'W') {
                  spielUnits[atkIdx].type = 'S';
                  spielLog = '💀 Totenerweckung: Schleicher erwacht, trifft Wächter → Wächter → Schleicher. Schleicher stirbt.';
                } else {
                  if (atk.hasGem) droppedGems.push({ q: atk.q, r: atk.r });
                  spielTurnKills.push(atk.type);
                  spielUnits.splice(atkIdx, 1);
                  spielLog = '💀 Totenerweckung: Schleicher erwacht, tötet Angreifer – und stirbt.';
                }
              } else {
                spielLog = '💀 Totenerweckung: Schleicher erwacht kurz – kein Angreifer mehr auf dem Feld.';
              }
              movinaReaktivUsed = true;
              players[movPIdx].abilityReady = false;
              movinaSchleicherTod = false;
              movinaFeldTod = null;
              spielPhase3Log.push({ label: '💀 Totenerweckung (reaktiv)', detail: 'Gegenschlag' });
              checkEliminations();
            }
            movinaRevivePrompt = false;
            advanceToNextPlayerAnimated(); render(); return;
          }
          if (btn.action === 'movinaReviveNo') {
            movinaRevivePrompt = false;
            movinaFeldTod = null;
            advanceToNextPlayerAnimated(); render(); return;
          }
          if (btn.action === 'confirmRecovery') {
            const nPIdx = useAbilities ? players.findIndex(p => p.charIdx === 2 && !p.eliminated) : -1;
            if (nPIdx !== -1 && nadorBuschAngegriffen.length > 0 && players[nPIdx].abilityReady && nPIdx !== currentPlayerIdx) {
              if (phase3TimeoutId) { clearTimeout(phase3TimeoutId); phase3TimeoutId = null; }
              nadorReaktivPrompt = { positions: [...nadorBuschAngegriffen] };
              nadorBuschAngegriffen = [];
              render(); return;
            }
            const movPIdx = useAbilities ? players.findIndex(p => p.charIdx === 4 && !p.eliminated) : -1;
            if (movPIdx !== -1 && players[movPIdx].abilityReady && movinaFeldTod && movPIdx !== currentPlayerIdx) {
              if (phase3TimeoutId) { clearTimeout(phase3TimeoutId); phase3TimeoutId = null; }
              movinaRevivePrompt = true;
              render(); return;
            }
            advanceToNextPlayerAnimated(); return;
          }
          if (btn.action === 'undo') {
            undoSpielAction(); return;
          }
          if (btn.action === 'openInGameMenu') {
            if (inGameMenuOpen) {
              inGameMenuOpen = false;
              if (window.closeHandbuchOverlay) window.closeHandbuchOverlay(); else render();
            } else {
              inGameMenuOpen = true; render();
              if (window.openHandbuchOverlay) window.openHandbuchOverlay(() => { inGameMenuOpen = false; render(); });
            }
            return;
          }
          if (btn.action === 'useAbility') {
            const charIdx = players[btn.pIdx].charIdx;

            if (charIdx === 0) {
              spielLog = '⚔ Feuerinfusion bereit – wird automatisch beim nächsten Kampf eingesetzt.';
              render(); return;
            }

            players[btn.pIdx].abilityReady = false;

            if (charIdx === 1) {
              saveSpielState();
              janaFreeMoves = 2;
              spielLog = '❄ Nordwind: 2 kostenlose Züge verfügbar! Wähle eine eigene Einheit.';
              render(); return;
            }

            if (charIdx === 2) {
              const nadorPIdx = btn.pIdx;
              const eligibleKeys = [...new Set(
                spielUnits.filter(u => u.ownerIdx === nadorPIdx && u.type === 'S').map(u => key(u.q, u.r))
              )].filter(k => {
                const [bq2, br2] = k.split(',').map(Number);
                return !spielUnits.some(u => u.ownerIdx === nadorPIdx && (u.type === 'B' || u.type === 'BD') && u.q === bq2 && u.r === br2);
              });
              if (eligibleKeys.length === 0) {
                players[btn.pIdx].abilityReady = true;
                spielLog = '🌿 Kein eigener Schleicher verfügbar – Dornenbusch kann nicht beschworen werden.';
                render(); return;
              }
              saveSpielState();
              nadorBuschMode = { nadorPIdx, eligibleKeys };
              spielLog = '🌿 Dornenbusch: Klicke auf ein Feld mit eigenem Schleicher.';
              render(); return;
            }

            if (charIdx === 3) {
              saveSpielState();
              thorgrimMarker = true;
              spielLog = '⚡ Donnerblitz-Marker aktiv! Klicke auf den Marker um einen Wächter angreifen zu lassen.';
              render(); return;
            }

            if (charIdx === 4) {
              const movPIdx2 = btn.pIdx;
              const campUnits2 = spielUnits.filter(u =>
                u.ownerIdx === movPIdx2 &&
                u.q === players[movPIdx2].campQ && u.r === players[movPIdx2].campR);
              if (campUnits2.length >= 3) {
                players[movPIdx2].abilityReady = true;
                spielLog = '💀 Lager ist voll – Totenerweckung nicht möglich.';
                render(); return;
              }
              saveSpielState();
              spielUnits.push({ q: players[movPIdx2].campQ, r: players[movPIdx2].campR, type: 'W', ownerIdx: movPIdx2 });
              players[movPIdx2].abilityReady = false;
              movinaSchleicherTod = false;
              spielPhase3Log.push({ label: '💀 Totenerweckung', detail: 'Wächter ins Lager' });
              spielLog = '💀 Totenerweckung: Ein Wächter erwacht im Lager.';
              render(); return;
            }

            if (charIdx === 5) {
              const pIdx = btn.pIdx;
              const cp   = players[pIdx];
              const hasCampS  = spielUnits.some(u => u.ownerIdx === pIdx && u.type === 'S' && u.q === cp.campQ && u.r === cp.campR);
              const hasFieldS = spielUnits.some(u => u.ownerIdx === pIdx && u.type === 'S' && !u.hasGem && !(u.q === cp.campQ && u.r === cp.campR));
              if (!hasCampS && !hasFieldS) {
                players[pIdx].abilityReady = true;
                spielLog = '🌙 Keine Schleicher verfügbar – Mondsprung nicht möglich.';
                render(); return;
              }
              const eligibleSourceKeys = [...new Set(
                spielUnits.filter(u => u.ownerIdx === pIdx && u.type === 'S' && !u.hasGem).map(u => key(u.q, u.r))
              )];
              saveSpielState();
              mondsprungMode = { pIdx, step: 'selectSource', eligibleKeys: eligibleSourceKeys };
              spielLog = '🌙 Mondsprung: Lager-Schleicher wählen (→ Feld, 3×S) oder Feld-Schleicher wählen (→ Lager).';
              render(); return;
            }

            render(); return;
          }
          if (btn.action === 'useThorgrimMarker') {
            const wächter = spielUnits.filter(u => u.ownerIdx === currentPlayerIdx && u.type === 'W');
            if (wächter.length === 0) {
              spielLog = '⚡ Kein Wächter verfügbar – Donnerblitz kann nicht eingesetzt werden.';
              render(); return;
            }
            saveSpielState();
            thorgrimMarker = false;
            if (wächter.length === 1) {
              const w = wächter[0];
              const wIdx = spielUnits.indexOf(w);
              thorgrimBlitzMode = { step: 'selectTarget', watcherIdx: wIdx, watcherQ: w.q, watcherR: w.r };
              spielLog = '⚡ Donnerblitz bereit! Klicke auf ein angrenzendes Feld des Wächters.';
            } else {
              thorgrimBlitzMode = { step: 'selectWatcher' };
              spielLog = '⚡ Donnerblitz: Wähle einen eigenen Wächter.';
            }
            render(); return;
          }
          if (btn.action === 'instantMineFromPopup') {
            const { mine, schlIdx } = mineInfoPopup.sofortabbau;
            mineInfoPopup = null;
            saveSpielState();
            const su  = spielUnits[schlIdx];
            const top = mine.stack[0];
            mine.stack.shift(); mine.stack.push(top);
            players[currentPlayerIdx].nachtrank -= 2;
            if (top === 'G') {
              players[currentPlayerIdx].gold += 1;
              spielPhase3Log.push({ label: '⛏ Sofortabbau', detail: '−2 Tränke, +1 Gold' });
              spielLog = 'Sofortabbau: −2 Tränke, +1 Gold.';
            } else {
              if (su) su.hasGem = true;
              spielPhase3Log.push({ label: '⛏ Sofortabbau', detail: '−2 Tränke, +1 Edelstein' });
              spielLog = 'Sofortabbau: −2 Tränke, +1 Edelstein.';
            }
            render(); return;
          }
          if (btn.action === 'instantMine') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            const b  = getSpielBuildingAt(su.q, su.r);
            const top = b.stack[0];
            b.stack.shift(); b.stack.push(top);
            players[currentPlayerIdx].nachtrank -= 2;
            if (top === 'G') {
              players[currentPlayerIdx].gold += 1;
              spielPhase3Log.push({ label: '⛏ Sofortabbau', detail: '−2 Tränke, +1 Gold' });
              spielLog = 'Sofortabbau: −2 Tränke, +1 Gold.';
            } else {
              su.hasGem = true;
              spielPhase3Log.push({ label: '⛏ Sofortabbau', detail: '−2 Tränke, +1 Edelstein' });
              spielLog = 'Sofortabbau: −2 Tränke, +1 Edelstein.';
            }
            spielSelectedIdx = null; spielReachable = new Map();
            render(); return;
          }
          if (btn.action === 'instantWell') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            su.hasGem = false;
            players[currentPlayerIdx].nachtrank -= 2;   // Sofortwandlung Brunnen (Hauptphase): kostet 2 Tränke
            players[currentPlayerIdx].machtsteine += 5; // Sofortwandlung Brunnen (Hauptphase): gibt +5 MP
            spielPhase3Log.push({ label: '◎ Edelstein gewandelt', detail: '−2 Tränke, +5 MP' });
            spielLog = 'Edelstein sofort gewandelt: −2 Tränke, +5 Machtpunkte.';
            checkEliminations();
            spielSelectedIdx = null; spielReachable = new Map();
            render(); return;
          }
          if (btn.action === 'sellBuilding') {
            const su  = spielUnits[spielSelectedIdx];
            const bIdx = spielBuildings.findIndex(b => b.q === su.q && b.r === su.r && b.ownerIdx === currentPlayerIdx);
            if (bIdx !== -1) {
              saveSpielState();
              const sold = spielBuildings[bIdx];
              spielBuildings.splice(bIdx, 1);
              players[currentPlayerIdx].gold += 1;  // Gebäude verkaufen → +1 Gold, ändere 1 für anderen Erlös
              const label = sold.type === 'mine' ? '⛏ Mine' : '◎ Brunnen';
              spielPhase3Log.push({ label: `${label} verkauft`, detail: '+1 Gold' });
              spielLog = `${label} verkauft. +1 Gold.`;
              spielSelectedIdx = null; spielReachable = new Map();
            }
            render(); return;
          }
          if (btn.action === 'buildMine' || btn.action === 'buildWell') {
            const su = spielUnits[spielSelectedIdx];
            const isMine = btn.action === 'buildMine';
            const btype = isMine ? 'mine' : 'well';
            const candidates = DIRS
              .map(({ dq, dr }) => ({ q: su.q + dq, r: su.r + dr }))
              .filter(c => {
                const t = hexMap.get(key(c.q, c.r));
                return isMine ? t === 'blocked' : (!t || t === 'sealed');
              })
              .map(c => ({ ...c, used: isAdjFieldUsed(c.q, c.r, btype) }));
            spielSelectedIdx = null; spielReachable = new Map();
            const freeCandidates = candidates.filter(c => !c.used);
            if (freeCandidates.length === 1) {
              // Nur ein freier Kandidat → sofort bauen (Index des freien Kandidaten ermitteln)
              const freeIdx = candidates.findIndex(c => !c.used);
              spielBuildingMode = { type: btype, unitQ: su.q, unitR: su.r, candidates };
              confirmBuildingSelection(freeIdx);
            } else {
              spielBuildingMode = { type: btype, unitQ: su.q, unitR: su.r, candidates };
              spielLog = isMine
                ? 'Wähle ein Gebirge: Klick darauf oder Zahl eingeben. [Esc] abbr.'
                : 'Wähle einen Rand: Klick darauf oder Zahl eingeben. [Esc] abbr.';
            }
            render(); return;
          }
          if (btn.action === 'split') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            const sq = su.q, sr = su.r;
            spielUnits.splice(spielSelectedIdx, 1);
            spielUnits.push({ q: sq, r: sr, type: 'S', ownerIdx: currentPlayerIdx });
            spielUnits.push({ q: sq, r: sr, type: 'S', ownerIdx: currentPlayerIdx });
            players[currentPlayerIdx].nachtrank -= 1;
            spielPhase3Log.push({ label: 'Aufgeteilt  W → 2×S', detail: '−1 Trank' });
            spielSelectedIdx = null; spielReachable = new Map();
            spielLog = 'Wächter in 2 Schleicher aufgeteilt. −1 Trank.';
            render(); return;
          }
          if (btn.action === 'merge') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            const sq = su.q, sr = su.r;
            const idxA = spielSelectedIdx, idxB = btn.otherIdx;
            spielUnits.splice(Math.max(idxA, idxB), 1);
            spielUnits.splice(Math.min(idxA, idxB), 1);
            spielUnits.push({ q: sq, r: sr, type: 'W', ownerIdx: currentPlayerIdx });
            players[currentPlayerIdx].nachtrank -= 1;
            spielPhase3Log.push({ label: 'Fusioniert  2×S → W', detail: '−1 Trank' });
            spielSelectedIdx = null; spielReachable = new Map();
            spielLog = '2 Schleicher zu Wächter zusammengeführt. −1 Trank.';
            render(); return;
          }
        }
      }

      // ── Shop-Panel-Klicks ─────────────────────────────────────────────────
      if (spielCampMenuOpen) {
        for (const btn of spielShopButtons) {
          if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
            saveSpielState();
            const p = players[currentPlayerIdx];
            if (btn.action === 'buy') {
              p.gold -= btn.cost;
              spielUnits.push({ q: p.campQ, r: p.campR, type: btn.unitType, ownerIdx: currentPlayerIdx });
              spielCampMenuOpen = false;
              const unitLabel = btn.unitType === 'W' ? 'Schattenwächter' : 'Nebelschleicher';
              spielPhase3Log.push({ label: `${unitLabel} gekauft`, detail: `−${btn.cost} Gold` });
              spielLog = `${unitLabel} gekauft (−${btn.cost} Gold).`;
            } else if (btn.action === 'tradeGoldToTrank') {
              p.gold -= 2; p.nachtrank += 1;
              spielPhase3Log.push({ label: '⇄ Tausch: 2 Gold → 1 Trank', detail: '−2 Gold, +1 Trank' });
              spielLog = `Getauscht: −2 Gold, +1 Trank. Gold: ${p.gold}, Tränke: ${p.nachtrank}`;
            } else if (btn.action === 'tradeTrankToGold') {
              p.nachtrank -= 2; p.gold += 1;
              spielPhase3Log.push({ label: '⇄ Tausch: 2 Tränke → 1 Gold', detail: '−2 Tränke, +1 Gold' });
              spielLog = `Getauscht: −2 Tränke, +1 Gold. Gold: ${p.gold}, Tränke: ${p.nachtrank}`;
            }
            render(); return;
          }
        }
        spielCampMenuOpen = false;
        render(); return;
      }

      const { q, r } = (() => {
        const fx = (mx - canvas.width  / 2) / SIZE;
        const fy = (my - canvas.height / 2) / SIZE;
        const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
        const fr = 2 / 3 * fy;
        const s  = -fq - fr;
        let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
        const dq = Math.abs(rq - fq), dr = Math.abs(rr - fr), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr - rs;
        else if (dr > ds)        rr = -rq - rs;
        return { q: rq, r: rr };
      })();
      const k = key(q, r);

      // Klick auf Gebirge → Mine-Info-Popup
      if (hexMap.get(k) === 'blocked') {
        const mine = spielBuildings.find(b => b.type === 'mine' && b.adjBQ === q && b.adjBR === r);
        if (mine) {
          let displayStack = [...mine.stack];
          let isPreview = false;
          const schls = spielUnits.filter(u => u.q === mine.q && u.r === mine.r && u.ownerIdx === currentPlayerIdx && u.type === 'S');
          if (spielPhaseStep === 1) {
            const top = mine.stack[0];
            if (schls.length > 0) {
              if (top === 'G') {
                displayStack = [...mine.stack.slice(1), 'G'];
                isPreview = true;
              } else if (top === 'E') {
                const schlNoGem = schls.find(u => !u.hasGem);
                if (schlNoGem) { displayStack = makeMineStack(); isPreview = true; }
              }
            }
          }
          let sofortabbau = null;
          if (schls.length > 0) {
            const schlIdx = spielUnits.indexOf(schls[0]);
            sofortabbau = { mine, schlIdx };
          }
          mineInfoPopup = { stack: displayStack, isPreview, sofortabbau };
          render(); return;
        }
      }

      // Popup schließen bei Klick woanders
      if (mineInfoPopup) { mineInfoPopup = null; render(); return; }

      if (!spielPlayGrid || !spielPlayGrid.has(k)) {
        if (spielSelectedIdx !== null || spielCampMenuOpen) {
          spielSelectedIdx = null; spielReachable = new Map(); spielCampMenuOpen = false;
          spielLog = 'Auswahl aufgehoben.'; render();
        }
        return;
      }

      // ── Bewegung/Angriff hat Vorrang wenn Feld erreichbar ─────────────────
      const selUnit = spielSelectedIdx !== null ? spielUnits[spielSelectedIdx] : null;
      if (selUnit && spielReachable.has(k)) {
        const cost       = spielReachable.get(k);

        // ── Angriffspriorität: Wächter → Schleicher → Lager ─────────────────
        // 1. Feindliche Einheiten auf dem Feld (W hat Vorrang vor S)
        const enemiesOnField = spielUnits
          .map((u, i) => ({ u, i }))
          .filter(({ u }) => u.q === q && u.r === r && u.ownerIdx !== currentPlayerIdx && u.type !== 'BD')
          .sort((a, b) => {
            const pri = t => t === 'W' ? 0 : t === 'S' ? 1 : 2; // W > S > B
            return pri(a.u.type) - pri(b.u.type);
          });

        const defIdx   = enemiesOnField.length > 0 ? enemiesOnField[0].i : -1;
        const defender = defIdx !== -1 ? spielUnits[defIdx] : null;

        if (defender) {
          // ── Feuerinfusion: reaktiver Defensiv-Prompt (Tarrak wird angegriffen) ──
          const tarrakPIdx = useAbilities ? players.findIndex(p => p.charIdx === 0) : -1;
          const isDefensiveTarrakTrigger =
            tarrakPIdx !== -1 &&
            tarrakPIdx !== currentPlayerIdx &&
            !!players[tarrakPIdx].abilityReady &&
            selUnit.type === 'W' &&
            defIdx !== -1 &&
            spielUnits[defIdx].type === 'S' &&
            spielUnits[defIdx].ownerIdx === tarrakPIdx;

          if (isDefensiveTarrakTrigger) {
            tarrakAbilityPrompt = { atkIdx: spielSelectedIdx, defIdx, cost, q, r };
            render(); return;
          }

          // Kampf
          saveSpielState();
          const isNeutralDef = defender.ownerIdx === -1;

          // ── Feuerinfusion: offensiver Buff (Tarrak greift an) ─────────────────
          let fireInfusionAtkBonus = 0;
          if (useAbilities && tarrakPIdx === currentPlayerIdx && !!players[currentPlayerIdx].abilityReady) {
            fireInfusionAtkBonus = 1;
            players[currentPlayerIdx].abilityReady = false;
            spielLog = '⚔ Feuerinfusion aktiv!';
          }

          // ── Dornenbusch-Combo: Schleicher + Busch als Wächter-Equivalent ────
          const bushComboIdx = (!isNeutralDef && defender.type === 'S')
            ? spielUnits.findIndex(u => u.type === 'B' && u.q === q && u.r === r && u.ownerIdx === defender.ownerIdx)
            : -1;
          const isBushCombo = bushComboIdx !== -1;

          if (isBushCombo) {
            const res = resolveSpielCombat(selUnit, { type: 'W' }, fireInfusionAtkBonus, 0);
            let msg = `Kampf: ${selUnit.type}${fireInfusionAtkBonus > 0 ? '⚔' : ''} → 🌿Busch-S. `;
            if (res.defenderDowngraded) {
              // Busch → Ruine; Schleicher überlebt
              trackNadorBuschAngegriffen(spielUnits[bushComboIdx]);
              spielUnits[bushComboIdx].type = 'BD';
              msg += 'Busch zerstört → Ruine. Schleicher überlebt. ';
            } else if (!res.defenderSurvives) {
              // Busch → Ruine; Schleicher stirbt
              trackNadorBuschAngegriffen(spielUnits[bushComboIdx]);
              spielUnits[bushComboIdx].type = 'BD';
              const u = spielUnits[defIdx];
              if (u && u.type === 'S' && u.hasGem) droppedGems.push({ q: u.q, r: u.r });
              spielTurnKills.push('S');
              trackMovinaTod(u);
              spielUnits.splice(defIdx, 1);
              if (spielSelectedIdx === defIdx) spielSelectedIdx = null;
              else if (spielSelectedIdx !== null && spielSelectedIdx > defIdx) spielSelectedIdx--;
              msg += 'Busch → Ruine. Schleicher stirbt. ';
            }
            if (!res.attackerSurvives) {
              if (selUnit.hasGem) droppedGems.push({ q: selUnit.q, r: selUnit.r });
              if (spielSelectedIdx !== null) { spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null; }
              msg += 'Angreifer stirbt.';
            } else if (res.attackerDowngraded) {
              if (spielSelectedIdx !== null) spielUnits[spielSelectedIdx].type = 'S';
              msg += 'Angreifer → S. ';
              if (!res.defenderDowngraded && spielSelectedIdx !== null) {
                spielUnits[spielSelectedIdx].q = q; spielUnits[spielSelectedIdx].r = r;
              }
            } else if (spielSelectedIdx !== null && !res.defenderDowngraded) {
              spielUnits[spielSelectedIdx].q = q; spielUnits[spielSelectedIdx].r = r;
            }
            const janaFreeUsedB = Math.min(janaFreeMoves, cost);
            janaFreeMoves -= janaFreeUsedB;
            players[currentPlayerIdx].nachtrank -= (cost - janaFreeUsedB);
            const bushFreeNote = janaFreeUsedB > 0 ? ` ❄${janaFreeUsedB} frei` : '';
            spielPhase3Log.push({ label: `⚔ Kampf  ${selUnit.type}→🌿Busch-S`, detail: `−${cost - janaFreeUsedB} Trank${bushFreeNote}` });
            spielLog = msg + ` (−${cost - janaFreeUsedB} Trank, ${players[currentPlayerIdx].nachtrank} übrig)`;
            checkEliminations();

          // ── Sonderfall: Wächter greift mehrere feindliche Schleicher an ──
          } else {

          // ── Schleicher greift Solo-Dornenbusch an: B → Ruine, S stirbt ────
          if (selUnit.type === 'S' && defender.type === 'B') {
            trackNadorBuschAngegriffen(spielUnits[defIdx]);
            spielUnits[defIdx].type = 'BD';
            if (selUnit.hasGem) droppedGems.push({ q: selUnit.q, r: selUnit.r });
            spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null;
            const janaFreeUsedBs = Math.min(janaFreeMoves, cost);
            janaFreeMoves -= janaFreeUsedBs;
            players[currentPlayerIdx].nachtrank -= (cost - janaFreeUsedBs);
            const bsFreeNote = janaFreeUsedBs > 0 ? ` ❄${janaFreeUsedBs} frei` : '';
            spielPhase3Log.push({ label: '⚔ Kampf  S→🌿Busch', detail: `−${cost - janaFreeUsedBs} Trank${bsFreeNote}` });
            spielLog = `Kampf: Schleicher → Dornenbusch. Busch → Ruine. Schleicher stirbt. (−${cost - janaFreeUsedBs} Trank, ${players[currentPlayerIdx].nachtrank} übrig)`;
            checkEliminations();
            render(); return;
          }

          const multiSlayTargets = selUnit.type === 'W' && !isNeutralDef
            && defender.type === 'S' && enemiesOnField.length >= 2
            && enemiesOnField.every(({ u }) => u.type === 'S');

          if (multiSlayTargets) {
            const wAtk = 2 + fireInfusionAtkBonus;
            const killCount = Math.min(enemiesOnField.length, wAtk);
            const toKill = enemiesOnField.slice(0, killCount);
            let msg = `Kampf: Wächter → ${enemiesOnField.length}× Schleicher. `;
            const sortedDesc = [...toKill].sort((a, b) => b.i - a.i);
            for (const { u: eu, i: ei } of sortedDesc) {
              if (eu.hasGem) droppedGems.push({ q: eu.q, r: eu.r });
              trackMovinaTod(eu);
              spielTurnKills.push('S');
              spielUnits.splice(ei, 1);
              if (spielSelectedIdx > ei) spielSelectedIdx--;
            }
            const survived = enemiesOnField.length - killCount;
            msg += `${killCount} Schleicher sterben. `;
            if (survived > 0) msg += `${survived} Schleicher überlebt. `;
            if (killCount >= 2) {
              if (selUnit.hasGem) droppedGems.push({ q: selUnit.q, r: selUnit.r });
              spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null;
              msg += 'Wächter stirbt.';
            } else {
              spielUnits[spielSelectedIdx].type = 'S'; msg += 'Wächter → S. ';
            }
            players[currentPlayerIdx].nachtrank -= cost;
            spielPhase3Log.push({ label: `⚔ Kampf  Wächter→${enemiesOnField.length}×S`, detail: `−${cost} Trank` });
            spielLog = msg + ` (−${cost} Trank, ${players[currentPlayerIdx].nachtrank} übrig)`;
          } else {
            // ── Normaler 1-vs-1 Kampf ─────────────────────────────────────
            const res = resolveSpielCombat(selUnit, defender, fireInfusionAtkBonus, 0);
            let msg   = `Kampf: ${selUnit.type}${fireInfusionAtkBonus > 0 ? '⚔' : ''} → ${defender.type}. `;
            if (res.defenderDowngraded) {
              spielUnits[defIdx].type = 'S'; msg += 'Gegner → S. ';
              if (isNeutralDef) { players[currentPlayerIdx].machtsteine += 1; msg += '+1 MP. '; }
              else spielTurnKills.push('WD');
            } else if (!res.defenderSurvives) {
              if (defender.type === 'B') {
                // Busch nimmt Schaden → wird immer zur Ruine, nie entfernt
                trackNadorBuschAngegriffen(spielUnits[defIdx]);
                spielUnits[defIdx].type = 'BD';
                msg += 'Dornenbusch → Ruine. ';
              } else {
                if (isNeutralDef) {
                  if (defender.type === 'W') { players[currentPlayerIdx].machtsteine += 2; msg += '+2 MP. '; }
                  else                       { players[currentPlayerIdx].machtsteine += 1; msg += '+1 MP. '; }
                } else spielTurnKills.push(defender.type);
                if (defender.type === 'S' && defender.hasGem) droppedGems.push({ q: defender.q, r: defender.r });
                trackMovinaTod(defender);
                spielUnits.splice(defIdx, 1); if (spielSelectedIdx > defIdx) spielSelectedIdx--;
                msg += 'Gegner stirbt. ';
              }
            }
            if (!res.attackerSurvives) {
              if (selUnit.type === 'S' && selUnit.hasGem) droppedGems.push({ q: selUnit.q, r: selUnit.r });
              trackMovinaTod(selUnit);
              spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null; msg += 'Angreifer stirbt.';
              if (fireInfusionAtkBonus > 0 && selUnit.type === 'S' && defender.type === 'W' && !isNeutralDef && !res.defenderSurvives) {
                tarrakFireGold++;
                msg += ' ⚔ +1 Gold (Glutbeute).';
              }
            } else {
              if (res.attackerDowngraded) { spielUnits[spielSelectedIdx].type = 'S'; msg += 'Angreifer → S. '; }
              const neutralsRemain = isNeutralDef && spielUnits.some(u => u.ownerIdx === -1 && u.q === q && u.r === r);
              if (!(res.defenderSurvives && !res.defenderDowngraded) && spielSelectedIdx !== null && !neutralsRemain) {
                spielUnits[spielSelectedIdx].q = q; spielUnits[spielSelectedIdx].r = r;
                const atkUnit = spielUnits[spielSelectedIdx];
                if (atkUnit && atkUnit.type === 'S' && !atkUnit.hasGem) {
                  const gemIdx = droppedGems.findIndex(g => g.q === q && g.r === r);
                  if (gemIdx !== -1) {
                    atkUnit.hasGem = true;
                    droppedGems.splice(gemIdx, 1);
                    msg += 'Edelstein aufgehoben! ';
                    spielPhase3Log.push({ label: '◆ Edelstein aufgehoben', detail: '' });
                  }
                }
                if (spielSelectedIdx !== null) {
                  const postCampIdx = players.findIndex((pp, i) =>
                    i !== currentPlayerIdx && !pp.eliminated && pp.campQ === q && pp.campR === r);
                  if (postCampIdx !== -1) {
                    const campAtker   = spielUnits[spielSelectedIdx];
                    const campAtk     = campAtker.type === 'W' ? 2 : 1;
                    const campAtkHp   = campAtker.type === 'W' ? 2 : 1;
                    const campReward  = campAtk * 2;
                    const campCounter = players[postCampIdx].machtsteine;
                    players[currentPlayerIdx].machtsteine += campReward;
                    players[postCampIdx].machtsteine = Math.max(0, players[postCampIdx].machtsteine - campAtk);
                    if (campCounter >= campAtkHp) {
                      spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null;
                      msg += `Lagerangriff! +${campReward} MP, Spieler ${postCampIdx + 1} −${campAtk} MP. Angreifer opfert sich. `;
                    } else {
                      if (campAtker.type === 'W') spielUnits[spielSelectedIdx].type = 'S';
                      spielSelectedIdx = null;
                      msg += `Lagerangriff! +${campReward} MP, Spieler ${postCampIdx + 1} −${campAtk} MP. Angreifer → Schleicher. `;
                    }
                    spielPhase3Log.push({ label: `⚔ Lagerangriff (${campAtker.type})`, detail: `+${campReward} MP` });
                  }
                }
              } else { msg += 'Prallt ab.'; }
            }
            const janaFreeUsedAtk = Math.min(janaFreeMoves, cost);
            janaFreeMoves -= janaFreeUsedAtk;
            players[currentPlayerIdx].nachtrank -= (cost - janaFreeUsedAtk);
            const atkLabel = selUnit.type === 'W' ? 'Wächter' : 'Schleicher';
            const defLabel = defender.type === 'W' ? 'Wächter' : defender.type === 'B' ? 'Dornenbusch' : 'Schleicher';
            const neutralKillNote = isNeutralDef && !res.defenderSurvives && !res.defenderDowngraded
              ? (defender.type === 'W' ? ', +2 MP' : ', +1 MP') : '';
            const neutralHitNote  = isNeutralDef && res.defenderDowngraded ? ', +1 MP' : '';
            const atkFreeNote = janaFreeUsedAtk > 0 ? ` ❄${janaFreeUsedAtk} frei` : '';
            spielPhase3Log.push({ label: `⚔ Kampf  ${atkLabel}→${defLabel}`, detail: `−${cost - janaFreeUsedAtk} Trank${neutralHitNote || neutralKillNote}${atkFreeNote}` });
            spielLog = msg + ` (−${cost - janaFreeUsedAtk} Trank, ${players[currentPlayerIdx].nachtrank} übrig)`;
            checkEliminations();
          }
          } // Ende isBushCombo else
        } else {
          // 2. Kein Feind auf dem Feld – Lagerangriff möglich?
          const enemyCampIdx = players.findIndex((p, i) =>
            i !== currentPlayerIdx && !p.eliminated && p.campQ === q && p.campR === r);
          if (enemyCampIdx !== -1) {
            saveSpielState();
            const atk        = selUnit.type === 'W' ? 2 : 1;
            const atkHp      = selUnit.type === 'W' ? 2 : 1;
            const reward     = atk * 2;
            const counterAtk = players[enemyCampIdx].machtsteine;
            const janaFreeUsedCamp = Math.min(janaFreeMoves, cost);
            janaFreeMoves -= janaFreeUsedCamp;
            players[currentPlayerIdx].nachtrank  -= (cost - janaFreeUsedCamp);
            players[currentPlayerIdx].machtsteine += reward;
            players[enemyCampIdx].machtsteine     = Math.max(0, players[enemyCampIdx].machtsteine - atk);
            const atkSurvives = counterAtk < atkHp;
            if (atkSurvives) {
              spielUnits[spielSelectedIdx].q = q;
              spielUnits[spielSelectedIdx].r = r;
              if (selUnit.type === 'W') spielUnits[spielSelectedIdx].type = 'S';
            } else {
              spielUnits.splice(spielSelectedIdx, 1);
            }
            const campFreeNote = janaFreeUsedCamp > 0 ? ` ❄${janaFreeUsedCamp} frei` : '';
            spielPhase3Log.push({ label: `⚔ Lagerangriff (${selUnit.type})`, detail: `−${cost - janaFreeUsedCamp} Trank, +${reward} MP${campFreeNote}` });
            spielSelectedIdx = null; spielReachable = new Map();
            const atkNote = atkSurvives
              ? (selUnit.type === 'W' ? 'Wächter → Schleicher.' : 'Schleicher überlebt.')
              : (selUnit.type === 'W' ? 'Wächter opfert sich.' : 'Schleicher opfert sich.');
            spielLog = `Lagerangriff! ${atkNote} Spieler ${enemyCampIdx + 1} −${atk} MP. Du +${reward} MP.`;
            checkEliminations();
            render(); return;
          }
          // 3. Normaler Zug
          saveSpielState();
          const isJump = Math.abs(q - selUnit.q) > 1 || Math.abs(r - selUnit.r) > 1 || Math.abs((q + r) - (selUnit.q + selUnit.r)) > 1;
          const fromQs = selUnit.q, fromRs = selUnit.r;
          const animUnit = { ...selUnit };
          spielUnits[spielSelectedIdx].q = q;
          spielUnits[spielSelectedIdx].r = r;
          const janaFreeUsed = Math.min(janaFreeMoves, cost);
          janaFreeMoves -= janaFreeUsed;
          players[currentPlayerIdx].nachtrank -= (cost - janaFreeUsed);
          const moveLabel  = selUnit.type === 'W' ? 'Wächter' : 'Schleicher';
          const freeDetail = janaFreeUsed > 0 ? ` ❄${janaFreeUsed} frei` : '';
          const trankDetail = (cost - janaFreeUsed) > 0 ? ` −${cost - janaFreeUsed} Trank` : '';
          spielPhase3Log.push({ label: `${isJump ? '↗' : '→'} ${moveLabel} bewegt`, detail: `${trankDetail}${freeDetail}`.trim() || '(kostenlos)' });
          const restHint = janaFreeMoves > 0 ? ` ❄ ${janaFreeMoves} freie Züge übrig.` : '';
          spielLog = `Bewegt nach (${q},${r})${isJump ? ' [Sprung]' : ''}.${trankDetail ? ` ${trankDetail.trim()}.` : ''} ${players[currentPlayerIdx].nachtrank} Tränke übrig.${restHint}`;
          startMoveAnim(fromQs, fromRs, q, r, (x, y) => {
            drawSpielUnit(x, y, animUnit, false, 1.0);
          });
          if (selUnit.type === 'S' && !selUnit.hasGem) {
            const gemIdx = droppedGems.findIndex(g => g.q === q && g.r === r);
            if (gemIdx !== -1) {
              spielUnits[spielSelectedIdx].hasGem = true;
              droppedGems.splice(gemIdx, 1);
              spielLog += ' Edelstein aufgehoben!';
              spielPhase3Log.push({ label: '◆ Edelstein aufgehoben', detail: '' });
            }
          }
        }
        spielSelectedIdx = null; spielReachable = new Map();
        render(); return;
      }

      // ── Nächstes Objekt im Feld per Abstand bestimmen ────────────────────
      let nearest = null, nearestDist = Infinity;
      for (const obj of spielObjPositions) {
        const d = (obj.x - mx) ** 2 + (obj.y - my) ** 2;
        if (d < nearestDist) { nearest = obj; nearestDist = d; }
      }
      if (nearest && nearestDist < (SIZE * 1.1) ** 2) {
        if (nearest.type === 'camp' && nearest.ownerIdx === currentPlayerIdx) {
          spielCampMenuOpen = true; spielSelectedIdx = null; spielReachable = new Map();
          spielLog = 'Lager geöffnet. Einheit kaufen oder schließen.';
          render(); return;
        }
        if (nearest.type === 'unit') {
          const u = spielUnits[nearest.idx];
          if (u && u.ownerIdx === currentPlayerIdx) {
            if (u.type === 'BD') {
              handleBuschRuineClick(nearest.idx, u.q, u.r);
              render(); return;
            }
            if (u.type === 'B') {
              spielLog = '🌿 Dornenbusch ist unbeweglich.';
              render(); return;
            }
            spielSelectedIdx = nearest.idx;
            spielReachable   = computeSpielReachable(u, players[currentPlayerIdx].nachtrank);
            spielLog = `${u.type === 'W' ? 'Schattenwächter' : 'Nebelschleicher'} ausgewählt. ${spielReachable.size} Felder erreichbar.`;
            render(); return;
          }
        }
      }

      // Abwahl
      spielSelectedIdx = null; spielReachable = new Map();
      spielLog = 'Auswahl aufgehoben.';
      render();
    });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;

      // Cursor über Statusleiste-Buttons
      {
        ctx.font = 'italic 14px "Exo 2",sans-serif';
        const verW = ctx.measureText('Version 0.1.26').width;
        const cy2  = canvas.height - 20, btnH = 30;
        const sbW  = 44, sbX = canvas.width - 14 - verW - 10 - sbW, sbY = cy2 - btnH / 2;
        const brW  = 44, brX = sbX - 8 - brW,                       brY = cy2 - btnH / 2;
        const overBr = mx >= brX && mx <= brX + brW && my >= brY && my <= brY + btnH;
        const overSb = mx >= sbX && mx <= sbX + sbW && my >= sbY && my <= sbY + btnH;
        if (overBr !== brBtnHover)   { brBtnHover   = overBr;  render(); }
        if (overSb !== saveBtnHover) { saveBtnHover = overSb;  render(); }
        if (overBr || (overSb && gamePhase === 'spielphase')) { canvas.style.cursor = 'pointer'; return; }
        if (overBr || overSb) { canvas.style.cursor = 'default'; return; }
      }
      // Cursor über Menüeintrag → pointer
      if (screen === 'menu') {
        const cx2 = canvas.width / 2, cy2 = canvas.height / 2;
        const startY2 = cy2 - 120, itemH2 = 64;
        for (let i = 0; i < MENU_ITEMS.length; i++) {
          const iy2 = startY2 + i * itemH2;
          if (mx >= cx2 - 160 && mx <= cx2 + 160 && my >= iy2 - 22 && my <= iy2 + 22) {
            canvas.style.cursor = 'pointer'; return;
          }
        }
      }
      // Cursor über Moduswahl-Karten → pointer + hover
      if (screen === 'modeSelect') {
        const { cx: cx3, cardW: cardW3, cardH: cardH3, gap: gap3, cardY: cardY3 } = _modeCardGeom();
        const totalW3 = cardW3 * 2 + gap3;
        let newModeHover = -1;
        for (let i = 0; i < 2; i++) {
          const bx3 = cx3 - totalW3 / 2 + i * (cardW3 + gap3);
          if (mx >= bx3 && mx <= bx3 + cardW3 && my >= cardY3 && my <= cardY3 + cardH3) newModeHover = i;
        }
        if (newModeHover !== modeHover) { modeHover = newModeHover; render(); }
        canvas.style.cursor = newModeHover >= 0 ? 'pointer' : 'default';
        return;
      }
      // Cursor über Spielerauswahl-Buttons → pointer
      if (screen === 'playerSelect') {
        const cx2 = canvas.width / 2, cy2 = canvas.height / 2;
        const options2 = [2,3,4,5,6], btnW2 = 90, btnH2 = 90, gap2 = 24;
        const totalW2 = options2.length * btnW2 + (options2.length - 1) * gap2;
        const startX2 = cx2 - totalW2 / 2, btnY2 = cy2 - 40;
        for (let i = 0; i < options2.length; i++) {
          const bx2 = startX2 + i * (btnW2 + gap2);
          if (mx >= bx2 && mx <= bx2 + btnW2 && my >= btnY2 && my <= btnY2 + btnH2) {
            canvas.style.cursor = 'pointer'; return;
          }
        }
        const sbX2 = cx2 - 100, sbY2 = cy2 + 100;
        if (mx >= sbX2 && mx <= sbX2 + 200 && my >= sbY2 && my <= sbY2 + 52) {
          canvas.style.cursor = 'pointer'; return;
        }
      }
      // Cursor über Charakterauswahl-Buttons → pointer
      if (screen === 'characterSelect') {
        const cx2 = canvas.width / 2, cy2 = canvas.height / 2;
        const ccy = cy2 + 30, arrowH2 = 50, arrowW2 = 50;
        const lax2 = cx2 - 195, lay2 = ccy - arrowH2 / 2;
        const rax2 = cx2 + 145, ray2 = ccy - arrowH2 / 2;
        const cbX2 = cx2 - 100, cbY2 = cy2 + 255;
        if ((mx >= lax2 && mx <= lax2 + arrowW2 && my >= lay2 && my <= lay2 + arrowH2) ||
            (mx >= rax2 && mx <= rax2 + arrowW2 && my >= ray2 && my <= ray2 + arrowH2) ||
            (mx >= cbX2 && mx <= cbX2 + 200    && my >= cbY2 && my <= cbY2 + 48)) {
          canvas.style.cursor = 'pointer'; return;
        }
      }
      canvas.style.cursor = 'default';

      if (gamePhase !== 'bauphase') return;

      // ── Bauphase Hover-Highlight + Außenfeld-Tooltip ────────────────────
      const { q, r } = pixelToHex(mx, my);
      const k = `${q},${r}`;
      const inField2 = hexMap.has(k) && hexMap.get(k) !== 'blocked' && hexMap.get(k) !== 'sealed';
      const cp3 = curPlayer();
      const isPinkNeighbor = !hexMap.has(k) && DIRS.some(({ dq, dr }) => cp3.q + dq === q && cp3.r + dr === r);
      if (inField2 || isPinkNeighbor) {
        if (bauHoverQ !== q || bauHoverR !== r) { bauHoverQ = q; bauHoverR = r; render(); }
      } else {
        if (bauHoverQ !== null) { bauHoverQ = null; bauHoverR = null; render(); }
      }
    });


    // ── SIZE berechnen: Radius 14 vom Ursprung in alle Richtungen sichtbar ───
    // Pointy-top Hex-Grid, Radius R:
    //   Breite  = (2R+1) * SIZE * sqrt(3)
    //   Höhe    = (3R+2) * SIZE
    function computeSize() {
      const R = 10;
      const sizeW = canvas.width  / ((2 * R + 1) * Math.sqrt(3));
      const sizeH = canvas.height / (3 * R + 2);
      SIZE = Math.floor(Math.min(sizeW, sizeH) * 0.93); // 7% Rand
    }

    // ── Dynamische Canvas-Größe ──────────────────────────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      computeSize();
      render();
    }
    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
  </script>

  <script>
    // Speichern-Overlay
    document.getElementById('saveCodeCopy').addEventListener('click', () => {
      const ta = document.getElementById('saveCodeText');
      ta.select();
      navigator.clipboard.writeText(ta.value).catch(() => document.execCommand('copy'));
      document.getElementById('saveCodeCopy').textContent = 'Kopiert ✓';
      setTimeout(() => { document.getElementById('saveCodeCopy').textContent = 'Kopieren'; }, 2000);
    });
    document.getElementById('saveCodeClose').addEventListener('click', () => {
      document.getElementById('saveCodeOverlay').style.display = 'none';
    });

    // Laden-Overlay
    document.getElementById('loadCodeCancel').addEventListener('click', () => {
      document.getElementById('loadCodeOverlay').style.display = 'none';
    });
    document.getElementById('loadCodeConfirm').addEventListener('click', () => {
      const code = document.getElementById('loadCodeInput').value.trim();
      if (!code) { document.getElementById('loadCodeError').textContent = 'Bitte Code einfügen.'; return; }
      const err = decodeAndLoadGameState(code);
      if (err) {
        document.getElementById('loadCodeError').textContent = err;
      } else {
        document.getElementById('loadCodeOverlay').style.display = 'none';
        render();
      }
    });
    // Enter im Textarea → Laden
    document.getElementById('loadCodeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) document.getElementById('loadCodeConfirm').click();
      if (e.key === 'Escape')            document.getElementById('loadCodeCancel').click();
    });

  <div id="hbOverlay">
    <div class="hb-box">
      <div class="hb-left">
        <div class="hb-search-wrap">
          <input type="text" id="hbSearchInput" placeholder="🔍  Suchen …" autocomplete="off" spellcheck="false">
          <div id="hbSearchCount"></div>
        </div>
        <div id="hbNav"></div>
      </div>
      <div id="hbContent"></div>
    </div>
    <button id="hbCloseBtn">[ Esc ]  Schließen</button>
  </div>

  <script>
  (function () {
    // ── Nav-Index aus HANDBUCH_PAGES aufbauen ────────────────────────────────
    function navLabel(s) {
      return s.replace(/\s*[–-]\s*Kosten:[^)]+/g, '').trim();
    }
    const NAV = [];
    HANDBUCH_PAGES.forEach((page, pi) => {
      let cur = null;
      page.forEach((item, ii) => {
        if (item.t === 'chapter' || item.t === 'heading') {
          cur = { type: item.t, label: navLabel(item.s), id: `hb-${pi}-${ii}`, texts: [item.s.toLowerCase()] };
          NAV.push(cur);
        } else if (item.t === 'body' && cur) {
          cur.texts.push(item.s.toLowerCase());
        }
      });
    });

    // ── Hilfsfunktionen ──────────────────────────────────────────────────────
    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function markQ(text, q) {
      if (!q) return esc(text);
      const out = []; let rem = text; const ql = q.toLowerCase();
      while (rem.length) {
        const i = rem.toLowerCase().indexOf(ql);
        if (i < 0) { out.push(esc(rem)); break; }
        out.push(esc(rem.slice(0, i)));
        out.push('<mark class="hb-hl">' + esc(rem.slice(i, i + q.length)) + '</mark>');
        rem = rem.slice(i + q.length);
      }
      return out.join('');
    }

    // ── Inhalt (rechte Spalte) rendern ───────────────────────────────────────
    function renderContent(q) {
      let html = '', seenTitle = false;
      HANDBUCH_PAGES.forEach((page, pi) => {
        page.forEach((item, ii) => {
          const id = `hb-${pi}-${ii}`;
          if      (item.t === 'title' && !seenTitle) { html += `<h1 class="hbc-title">${esc(item.s)}</h1>`; seenTitle = true; }
          else if (item.t === 'sub'     && pi === 0)  { html += `<p class="hbc-sub">${esc(item.s)}</p>`; }
          else if (item.t === 'chapter')              { html += `<h2 class="hbc-chapter" id="${id}">${markQ(item.s, q)}</h2>`; }
          else if (item.t === 'heading')              { html += `<h3 class="hbc-heading" id="${id}">${markQ(item.s, q)}</h3>`; }
          else if (item.t === 'body')                 { html += `<p class="hbc-body">${markQ(item.s, q)}</p>`; }
          else if (item.t === 'gap')                  { html += `<div class="hbc-gap"></div>`; }
        });
      });
      document.getElementById('hbContent').innerHTML = html;
    }

    // ── Nav (linke Spalte) rendern ───────────────────────────────────────────
    function renderNav(q) {
      const nav = document.getElementById('hbNav');
      nav.innerHTML = '';
      let hits = 0;
      NAV.forEach(entry => {
        if (q && !entry.texts.some(t => t.includes(q.toLowerCase()))) return;
        hits++;
        const el = document.createElement('div');
        el.className = entry.type === 'chapter' ? 'hb-nav-ch' : 'hb-nav-hd';
        el.innerHTML = (q && entry.label.toLowerCase().includes(q.toLowerCase()))
          ? markQ(entry.label, q) : esc(entry.label);
        el.addEventListener('click', () => {
          document.querySelectorAll('.hb-nav-ch, .hb-nav-hd').forEach(n => n.classList.remove('hb-on'));
          el.classList.add('hb-on');
          const target = document.getElementById(entry.id);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        nav.appendChild(el);
      });
      const cnt = document.getElementById('hbSearchCount');
      cnt.textContent = q ? (hits ? `${hits} Treffer` : 'Keine Treffer') : '';
    }

    // ── Overlay öffnen / schließen ───────────────────────────────────────────
    let hbOnClose = null;
    function openHb(onClose) {
      hbOnClose = onClose || null;
      document.getElementById('hbSearchInput').value = '';
      document.getElementById('hbSearchCount').textContent = '';
      renderContent('');
      renderNav('');
      document.getElementById('hbOverlay').classList.add('hb-open');
      setTimeout(() => document.getElementById('hbSearchInput').focus(), 60);
    }
    function closeHb() {
      const ov = document.getElementById('hbOverlay');
      if (!ov.classList.contains('hb-open')) return;
      ov.classList.remove('hb-open');
      if (hbOnClose) { const cb = hbOnClose; hbOnClose = null; cb(); }
      else { screen = 'menu'; render(); }
    }
    window.openHandbuchOverlay  = openHb;
    window.closeHandbuchOverlay = closeHb;

    // ── Geschichte Overlay ────────────────────────────────────────────────────
    function renderGesch() {
      let html = '';
      GESCH_PAGES.forEach(page => {
        page.forEach(item => {
          if      (item.t === 'title')   html += `<h1 class="hbc-title">${esc(item.s)}</h1>`;
          else if (item.t === 'sub')     html += `<p class="hbc-sub">${esc(item.s)}</p>`;
          else if (item.t === 'chapter') html += `<h2 class="hbc-chapter">${esc(item.s)}</h2>`;
          else if (item.t === 'heading') html += `<h3 class="hbc-heading">${esc(item.s)}</h3>`;
          else if (item.t === 'body')    html += `<p class="hbc-body">${esc(item.s)}</p>`;
          else if (item.t === 'quote')   html += `<p class="hbc-quote">${esc(item.s)}</p>`;
          else if (item.t === 'italic')  html += `<p class="hbc-italic">${esc(item.s)}</p>`;
          else if (item.t === 'bold')    html += `<p class="hbc-bold">${esc(item.s)}</p>`;
          else if (item.t === 'gap')     html += `<div class="hbc-gap"></div>`;
        });
      });
      document.getElementById('geschContent').innerHTML = html;
    }
    function openGesch() {
      renderGesch();
      document.getElementById('geschContent').scrollTop = 0;
      document.getElementById('geschOverlay').classList.add('gesch-open');
    }
    function closeGesch() {
      const ov = document.getElementById('geschOverlay');
      if (!ov.classList.contains('gesch-open')) return;
      ov.classList.remove('gesch-open');
      screen = 'menu'; render();
    }
    window.openGeschOverlay  = openGesch;
    window.closeGeschOverlay = closeGesch;

    // ── Events ───────────────────────────────────────────────────────────────
    document.getElementById('hbSearchInput').addEventListener('input', function () {
      const q = this.value.trim();
      renderContent(q);
      renderNav(q);
    });
    document.getElementById('hbSearchInput').addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.stopPropagation(); closeHb(); }
    });
    document.getElementById('hbCloseBtn').addEventListener('click', closeHb);
    document.getElementById('geschCloseBtn').addEventListener('click', closeGesch);
    document.getElementById('charCloseBtn').addEventListener('click', () => {
      screen = 'menu'; render();
      document.getElementById('charCloseBtn').style.display = 'none';
    });
  })();
  </script>
