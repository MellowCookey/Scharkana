<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scharkana – Das Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    #subtitle {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%);
      width: min(740px, 88vw); text-align: center;
      font-family: 'Exo 2', sans-serif;
      pointer-events: none; user-select: none;
    }
    .sub-narrator {
      display: block; font-style: italic; font-weight: 300;
      font-size: clamp(14px, 1.6vw, 17px); color: #c8c0e0; line-height: 1.8;
      text-shadow: 0 1px 10px #000, 0 0 28px rgba(60,20,120,.5);
    }
    .sub-speech {
      display: block; font-weight: 400;
      font-size: clamp(15px, 1.8vw, 20px); color: #f0eaff; line-height: 1.8;
      text-shadow: 0 1px 10px #000, 0 0 28px rgba(80,40,160,.6);
    }
    .sub-action {
      display: block; font-style: italic; font-weight: 300;
      font-size: clamp(13px, 1.4vw, 15px); color: #9080b0; line-height: 1.8; margin-top: 2px;
      text-shadow: 0 1px 10px #000;
    }

    #victory-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      font-family: 'Exo 2', sans-serif;
      z-index: 10;
      animation: fadeInOverlay 1s ease forwards;
    }
    @keyframes fadeInOverlay {
      from { opacity: 0; } to { opacity: 1; }
    }
    #victory-overlay.visible { display: flex; }

    .vbtn {
      width: 240px; padding: 14px 0;
      border-radius: 10px; border: 1.5px solid;
      font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: .03em;
      transition: filter .15s, transform .1s;
    }
    .vbtn:hover  { filter: brightness(1.2); transform: translateY(-1px); }
    .vbtn:active { transform: translateY(0); }
    .vbtn-log  {
      background: rgba(15,20,50,0.95); color: #c8a0f0;
      border-color: #7b4fd4;
      box-shadow: 0 0 12px rgba(90,40,170,.4);
    }
    .vbtn-log.sent {
      background: rgba(10,40,15,0.95); color: #66dd88;
      border-color: #40aa60; cursor: default;
      box-shadow: 0 0 12px rgba(40,160,70,.3);
    }
    .vbtn-close {
      background: rgba(40,10,10,0.95); color: #ee8888;
      border-color: #aa3333;
      box-shadow: 0 0 12px rgba(160,30,30,.3);
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="subtitle"></div>
<div id="victory-overlay">
  <p style="font-family:'Exo 2',sans-serif; color:#c8c0e0; font-size:18px; font-style:italic; margin:0 0 8px; text-shadow:0 0 20px rgba(120,80,200,.6);">Vielen Dank fürs Spielen!</p>
  <button class="vbtn vbtn-log" id="btnSendLog">📊  Log senden</button>
  <button class="vbtn vbtn-close" id="btnClose">✕  Spiel beenden</button>
</div>
<script>
'use strict';

// ── Charakter-Daten (Farben & Bilder) ────────────────────────────────────
const CHARS = [
  { name: 'Tarrak Feuerfaust',  color: '#c0281a', colorLight: '#ff6644', img: 'Charakterbilder/Tarrak Feuerfaust.jpg',  spriteW: 20, spriteH: 27 },
  { name: 'Jana Frostwind',     color: '#1a55c0', colorLight: '#66aaff', img: 'Charakterbilder/Jana Frostwind.jpg',     spriteW: 20, spriteH: 27 },
  { name: 'Nadoris Waldgeist',  color: '#1a7a28', colorLight: '#55cc66', img: 'Charakterbilder/Nadoris Waldgeist.jpg',  spriteW: 20, spriteH: 27 },
  { name: 'Thorgrim Donneraxt', color: '#b08800', colorLight: '#ffdd44', img: 'Charakterbilder/Thorgrim Donneraxt.jpg', spriteW: 22, spriteH: 27 },
  { name: 'Morvina Aschegrund', color: '#7722cc', colorLight: '#bb77ff', img: 'Charakterbilder/Morvina Aschegrund.jpg', spriteW: 20, spriteH: 27 },
  { name: 'Illyria Mondlicht',  color: '#8899bb', colorLight: '#ddeeff', img: 'Charakterbilder/Illyria Mondlicht.jpg',  spriteW: 23, spriteH: 29 },
];

// ── URL-Parameter ─────────────────────────────────────────────────────────
const params      = new URLSearchParams(location.search);
const CIDX        = Math.max(0, Math.min(5, parseInt(params.get('charIdx') ?? '0')));
const CH          = CHARS[CIDX];
const WIN_COL     = CH.color;
const WIN_LITE    = CH.colorLight;
const WIN_NAME    = CH.name;
// players=0,1,2 → alle Mitspieler (inkl. Sieger); OTHER_IDXS = ohne Sieger
const _pRaw       = params.get('players') ?? String(CIDX);
const OTHER_IDXS  = _pRaw.split(',').map(s => parseInt(s.trim()))
                    .filter(i => !isNaN(i) && i >= 0 && i < CHARS.length && i !== CIDX);

// Charakter-PNG vorladen
const charImg = new Image();
charImg.src   = CH.img;

// ── Hex → rgba(r,g,b,a) Hilfsfunktion ───────────────────────────────────
function hexRgba(col, a) {
  const r = parseInt(col.slice(1,3),16);
  const g = parseInt(col.slice(3,5),16);
  const b = parseInt(col.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Canvas ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const subEl  = document.getElementById('subtitle');

let W, H, hexes = null;
let i2done = false, i3done = false;
let animP = 0, frozen = false, running = true;
const HS = 46;   // Hex-Größe (identisch zum Hauptspiel)

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  hexes   = null;
  i2done  = false;
  i3done  = false;
  frozen  = false;
  animP   = 0;
}
window.addEventListener('resize', resize);
resize();

// ── Hex-Gitter aufbauen ───────────────────────────────────────────────────
function initHex() {
  const cx = W / 2, cy = H / 2;
  const hexW    = HS * Math.sqrt(3);
  const rowH    = HS * 1.5;
  const maxDist = Math.sqrt(cx * cx + cy * cy);
  hexes = [];
  const rows = Math.ceil(H / rowH) + 3;
  const cols = Math.ceil(W / hexW) + 3;
  for (let r = -rows; r <= rows; r++) {
    for (let q = -cols; q <= cols; q++) {
      const px = cx + hexW * q + (r & 1) * hexW / 2;
      const py = cy + rowH * r;
      if (px < -HS*2 || px > W+HS*2 || py < -HS*2 || py > H+HS*2) continue;
      const dx = px - cx, dy = py - cy;
      const nd = Math.min(1, Math.sqrt(dx*dx + dy*dy) / (maxDist * 0.88));
      const jitter = (Math.random() - 0.5) * 0.18;
      const activationT = Math.max(0, Math.min(0.8, (1 - nd) * 0.78 + jitter));
      hexes.push({
        px, py, nd, activationT,
        fillAlpha : 0.22 + nd * 0.65,
        angle     : Math.atan2(dy, dx),
        seed      : Math.random(),
        state     : 'normal',  // normal | flying | gone
        ox: 0, oy: 0, rot: 0, alf: 1,
        vx: 0, vy: 0, vr: 0,
        flyStart  : 0,
        restOx    : 0, restOy: 0,
      });
    }
  }
}

// ── Eine Hex-Zelle zeichnen ───────────────────────────────────────────────
function drawHexCell(h, alpha, ox, oy, rot, scl) {
  if (alpha < 0.005) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(h.px + ox, h.py + oy);
  if (rot)       ctx.rotate(rot);
  if (scl !== 1) ctx.scale(scl, scl);
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI/3*i - Math.PI/6;
    const x = (HS - 1.5) * Math.cos(a);
    const y = (HS - 1.5) * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  const l = Math.round(3 + h.nd * 9);
  ctx.fillStyle   = `hsl(265,45%,${l}%)`;
  ctx.fill();
  ctx.strokeStyle = `rgba(110,55,200,${0.25 * h.nd})`;
  ctx.lineWidth   = 0.8;
  ctx.stroke();
  ctx.restore();
}

// ── Hintergrundgradient ───────────────────────────────────────────────────
function drawBgGrad() {
  const cx = W/2, cy = H/2;
  const g = ctx.createRadialGradient(cx, cy, 100, cx, cy, 700);
  g.addColorStop(0, '#1e1040');
  g.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ── Portal-Phase: Hexe mit normaler animP-Steuerung ───────────────────────
function drawPortalHexes(p) {
  if (!hexes) initHex();
  const FS = 0.87;
  for (const h of hexes) {
    if (p < h.activationT) continue;
    const fi = Math.min(1, (p - h.activationT) / 0.045);
    const fo = p > FS ? Math.max(0, 1 - (p - FS) / (1 - FS)) : 1;
    drawHexCell(h, h.fillAlpha * fi * fo, 0, 0, 0, 1);
  }
}

// ── Impuls-Physik ─────────────────────────────────────────────────────────
function launchFlying(ndMin, ndMax, speedMult, t) {
  for (const h of hexes) {
    if (h.state !== 'normal') continue;
    if (h.nd < ndMin || h.nd >= ndMax) continue;
    const spd = speedMult * (0.5 + 0.8 * (1 - h.nd)) * (180 + h.seed * 160);
    const spr = (h.seed - 0.5) * 1.4;
    h.vx       = Math.cos(h.angle + spr) * spd;
    h.vy       = Math.sin(h.angle + spr) * spd - 70 * h.seed;
    h.vr       = (h.seed - 0.5) * 5.5;
    h.state    = 'flying';
    h.flyStart = t;
    h.alf      = 1;
  }
}

// Rand-Hexe dauerhaft nach außen verschieben (Türeffekt)
function pushEdge() {
  for (const h of hexes) {
    if (h.state !== 'normal') continue;
    if (h.nd < 0.48 || h.nd >= 0.74) continue;
    const pushAmt = (0.74 - h.nd) / 0.26 * 80;
    // Seitliche Türhälften (links/rechts) öffnen stärker
    const sideFactor = 1 + Math.abs(Math.cos(h.angle)) * 0.5;
    h.restOx = Math.cos(h.angle) * pushAmt * sideFactor;
    h.restOy = Math.sin(h.angle) * pushAmt;
  }
}

// ── Break-Phase: Physik-Update + Zeichnen ────────────────────────────────
function drawBreakingHexes(t, dt) {
  if (!hexes) return;

  // Impuls 2 auslösen
  if (t >= T_I2 && !i2done) {
    launchFlying(0, 0.30, 1.25, t);
    i2done = true;
  }
  // Impuls 3 auslösen
  if (t >= T_I3 && !i3done) {
    launchFlying(0.30, 0.52, 1.0, t);
    pushEdge();
    i3done = true;
  }

  // Physik
  for (const h of hexes) {
    if (h.state !== 'flying') continue;
    h.ox  += h.vx * dt;
    h.oy  += h.vy * dt;
    h.vy  += 270 * dt;
    h.vx  *= Math.pow(0.96, dt * 60);
    h.rot += h.vr * dt;
    h.alf  = Math.max(0, 1 - (t - h.flyStart) / 2.4);
    if (h.alf <= 0.005) h.state = 'gone';
  }

  // Zeichnen
  for (const h of hexes) {
    if (h.state === 'gone') continue;

    if (h.state === 'flying') {
      drawHexCell(h, h.fillAlpha * h.alf, h.ox, h.oy, h.rot, 1);
      continue;
    }

    // Normale Hexe – Impuls-Effekte
    let ox = 0, oy = 0, scl = 1;

    // Impuls 1: Push nach vorne + Wackeln
    if (t >= T_I1 && t < T_I1 + I1_DUR) {
      const tN  = (t - T_I1) / I1_DUR;
      const push = (1 - Math.min(h.nd, 0.9)) * 0.15 * Math.sin(Math.PI * tN);
      scl = 1 + push;
      const wob = (1 - Math.min(h.nd / 0.65, 1)) * 4.5;
      ox += wob * Math.sin(t * 14 + h.seed * 18);
      oy += wob * Math.cos(t * 11 + h.seed * 22);
    }

    // Nach Impuls 1: Innen-Hexe driften langsam aus dem Raster (sehen wackelig aus)
    if (t >= T_I1 && t < T_I2 && h.nd < 0.32) {
      const tN   = (t - T_I1) / (T_I2 - T_I1);
      const drift = tN * 11 * h.seed;
      ox += Math.cos(h.angle + h.seed * 4.2) * drift;
      oy += Math.sin(h.angle + h.seed * 3.7) * drift;
    }

    // Impuls 2: Starkes Beben für übrige Hexe
    if (t >= T_I2 && t < T_I2 + I2_DUR) {
      const tN  = (t - T_I2) / I2_DUR;
      const wob = (1 - Math.min(h.nd, 1)) * 6 * Math.max(0, 1 - tN * 1.6);
      ox += wob * Math.sin(t * 18 + h.seed * 12);
      oy += wob * Math.cos(t * 15 + h.seed * 25);
    }

    // Rest-Position nach Impuls 3 interpolieren
    if (t >= T_I3 && (h.restOx !== 0 || h.restOy !== 0)) {
      const ease = 1 - Math.pow(Math.max(0, 1 - (t - T_I3) / 0.65), 3);
      ox = h.restOx * ease;
      oy = h.restOy * ease;
    }

    drawHexCell(h, h.fillAlpha, ox, oy, 0, scl);
  }
}

// ── Risse mit Leuchtstreifen (zwischen Impuls 1 und 2) ───────────────────
function drawCrackStrokes(prog) {
  if (!hexes) return;
  for (const h of hexes) {
    if (h.nd >= 0.38 || h.state !== 'normal') continue;
    const intensity = prog * (1 - h.nd / 0.38) * (0.3 + 0.7 * h.seed);
    ctx.save();
    ctx.globalAlpha = intensity;
    ctx.translate(h.px, h.py);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI/3*i - Math.PI/6;
      i === 0 ? ctx.moveTo((HS-1.5)*Math.cos(a), (HS-1.5)*Math.sin(a))
              : ctx.lineTo((HS-1.5)*Math.cos(a), (HS-1.5)*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle = WIN_LITE;
    ctx.lineWidth   = 1.2 + prog * 1.5;
    ctx.shadowColor = WIN_COL;
    ctx.shadowBlur  = 12;
    ctx.stroke();
    ctx.restore();
  }
}

// ── Zentrales Leuchten (durch das Portal-Loch) ────────────────────────────
function drawCenterGlow(alpha, radius) {
  if (alpha <= 0.002) return;
  const cx = W/2, cy = H/2;
  const r  = radius ?? Math.min(W, H) * 0.38;
  const g  = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0,   hexRgba(WIN_COL, alpha));
  g.addColorStop(0.35, hexRgba(WIN_COL, alpha * 0.55));
  g.addColorStop(1,   hexRgba(WIN_COL, 0));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

// ── Vollbild-Flash ────────────────────────────────────────────────────────
function drawFlash(alpha) {
  if (alpha <= 0.002) return;
  ctx.fillStyle = hexRgba(WIN_COL, alpha * 0.7);
  ctx.fillRect(0, 0, W, H);
  // Weißer Kern
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.35})`;
  ctx.fillRect(0, 0, W, H);
}

// ── Charakter-Reveal (Finalzustand) ──────────────────────────────────────
function drawFinalState(t) {
  const cx = W/2, cy = H/2;
  const age      = t - T_FINAL;
  const revealA  = Math.min(1, age / 0.9);
  const holeR    = Math.min(W, H) * 0.30;
  // Tiefes Leuchten im Loch – pulsierend
  const pulse = 0.88 + 0.12 * Math.sin(t * 2.2);
  drawCenterGlow(revealA * pulse, holeR * 2.0);

  // Glühender Leuchtring am Lochrand
  if (revealA > 0.2) {
    const ringA = Math.min(1, (revealA - 0.2) / 0.5);
    ctx.save();
    ctx.globalAlpha = ringA * 0.75 * pulse;
    const ringG = ctx.createRadialGradient(cx, cy, holeR * 0.82, cx, cy, holeR * 1.18);
    ringG.addColorStop(0,    hexRgba(WIN_COL,  0));
    ringG.addColorStop(0.45, hexRgba(WIN_LITE, 0.9));
    ringG.addColorStop(0.55, hexRgba(WIN_LITE, 0.9));
    ringG.addColorStop(1,    hexRgba(WIN_COL,  0));
    ctx.fillStyle = ringG;
    ctx.beginPath();
    ctx.arc(cx, cy, holeR * 1.25, 0, Math.PI * 2);
    ctx.arc(cx, cy, holeR * 0.75, 0, Math.PI * 2, true);
    ctx.fill();
    ctx.restore();
  }

  // Charakter-Bild
  const imgA = Math.min(1, age / 1.3);
  if (imgA > 0.01 && charImg.complete && charImg.naturalWidth > 0) {
    const imgH = holeR * 2.1;
    const imgW = imgH * (charImg.naturalWidth / charImg.naturalHeight);
    ctx.save();
    ctx.globalAlpha = imgA;
    ctx.beginPath();
    ctx.arc(cx, cy, holeR * 0.97, 0, Math.PI * 2);
    ctx.clip();
    ctx.shadowColor = WIN_LITE;
    ctx.shadowBlur  = 65;
    ctx.drawImage(charImg, cx - imgW / 2, cy - imgH * 0.52, imgW, imgH);
    ctx.restore();
  }

  // Gewinner-Name
  const nameA = Math.min(1, Math.max(0, (age - 1.0) / 0.9));
  if (nameA > 0.01) {
    ctx.save();
    ctx.globalAlpha  = nameA;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    ctx.font         = `bold 30px "Exo 2",sans-serif`;
    ctx.fillStyle    = WIN_LITE;
    ctx.shadowColor  = WIN_COL;
    ctx.shadowBlur   = 28;
    ctx.fillText('⚑  ' + WIN_NAME, cx, cy + holeR * 1.10);
    ctx.restore();
  }
}

// ── Mitspieler-Namen ─────────────────────────────────────────────────────
function drawOtherPlayers(t) {
  if (!OTHER_IDXS.length) return;
  const age     = t - T_OTHERS;
  const fadeIn  = Math.min(1, age / 1.2);
  const fadeOut = t > T_CLOSE - 1.2 ? Math.max(0, 1 - (t - (T_CLOSE - 1.2)) / 1.2) : 1;
  const alpha   = fadeIn * fadeOut;
  if (alpha < 0.005) return;

  const cx = W/2, cy = H/2;
  const lineH  = 30;
  const startY = cy - (OTHER_IDXS.length * lineH) / 2;

  ctx.save();
  ctx.globalAlpha  = alpha * 0.5;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'bottom';
  ctx.font         = `300 italic 13px "Exo 2",sans-serif`;
  ctx.fillStyle    = '#888';
  ctx.fillText('— Mitgespielt —', cx, startY - 14);
  ctx.restore();

  OTHER_IDXS.forEach((idx, i) => {
    const ch     = CHARS[idx];
    const delay  = 0.25 + i * 0.18;
    const nAlpha = alpha * Math.min(1, Math.max(0, (age - delay) / 0.5));
    if (nAlpha < 0.005) return;
    ctx.save();
    ctx.globalAlpha  = nAlpha;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = `400 16px "Exo 2",sans-serif`;
    ctx.fillStyle    = '#b0a8c0';
    ctx.shadowColor  = ch.color;
    ctx.shadowBlur   = 6;
    ctx.fillText(ch.name, cx, startY + i * lineH + lineH / 2);
    ctx.restore();
  });
}

// ── Portal schließt sich (Hexe füllen wieder auf) ────────────────────────
function drawClosingPortal(t) {
  if (!hexes) return;
  const elapsed = t - T_CLOSE;
  const CLOSE_D = 5.0;
  for (const h of hexes) {
    const delay = h.seed * CLOSE_D * 0.85;
    if (elapsed < delay) continue;
    const fi = Math.min(1, (elapsed - delay) / 0.4);
    drawHexCell(h, h.fillAlpha * fi, 0, 0, 0, 1);
  }
}

// ── Zeitplan (Sekunden) ───────────────────────────────────────────────────
const T_PORTAL  = 10.5;
const PORTAL_D  =  4.5;
const HEX_CYC   = 10000;
const FREEZE_P  =  0.82;
const T_I1      = 20.0;
const I1_DUR    =  2.5;
const T_I2      = 23.5;
const I2_DUR    =  3.0;
const T_I3      = 27.2;
const FLASH_D   =  3.1;
const T_FINAL   = 30.5;
const T_END     = T_FINAL + 8.0;

// ── Untertitel ────────────────────────────────────────────────────────────
const SCENE = [
  [ 0.5,  4.0, '<span class="sub-narrator">Der Wächter verspürt eine Macht jenseits des Portales.</span>' ],
  [ 5.2,  9.0, '<span class="sub-speech">»Wie… wie kann das sein?«</span><br><span class="sub-action">— sagt er verwundert und tritt näher ans Portal.</span>' ],
  [ T_FINAL + 0.6, T_FINAL + 4.5,
    `<span class="sub-action">Der Wächter sagt:</span><br><span class="sub-speech">»${WIN_NAME} hat sich als würdig erwiesen!«</span>` ],
];
const SUB_FADE = 0.6;

function drawSubtitles(t) {
  let html = '', op = 0;
  for (const [tIn, tOut, h] of SCENE) {
    if (t < tIn - SUB_FADE || t > tOut + SUB_FADE) continue;
    let a;
    if      (t < tIn)  a = (t - (tIn - SUB_FADE)) / SUB_FADE;
    else if (t <= tOut) a = 1;
    else               a = 1 - (t - tOut) / SUB_FADE;
    html = h; op = Math.max(0, Math.min(1, a)); break;
  }
  if (html && subEl.innerHTML !== html) subEl.innerHTML = html;
  subEl.style.opacity = html ? op.toFixed(4) : '0';
}


// ── Haupt-Loop ────────────────────────────────────────────────────────────
let startTime = null, lastNow = null;

function frame(now) {
  if (!running) return;
  if (!startTime) startTime = now;
  const t  = (now - startTime) / 1000;
  const dt = lastNow ? Math.min(0.05, (now - lastNow) / 1000) : 0.016;
  lastNow  = now;

  // ── Portal-Phase ─────────────────────────────────────────────────────
  if (t < T_I1) {
    drawBgGrad();
    if (t >= T_PORTAL) {
      if (!frozen) {
        const el = now - (startTime + T_PORTAL * 1000);
        animP = Math.min(FREEZE_P, el / HEX_CYC);
        if (animP >= FREEZE_P) { frozen = true; animP = FREEZE_P; }
      }
      if (!hexes) initHex();
      drawPortalHexes(animP);
    }
    // Schwarzer Vorhang
    let bA = 1;
    if (t >= T_PORTAL) bA = Math.max(0, 1 - (t - T_PORTAL) / PORTAL_D);
    if (bA > 0.001) { ctx.fillStyle = `rgba(0,0,0,${bA.toFixed(4)})`; ctx.fillRect(0, 0, W, H); }

  // ── Break-Phase ───────────────────────────────────────────────────────
  } else {
    if (!hexes) initHex();
    drawBgGrad();

    // Risse leuchten (nach Impuls 1, vor Impuls 2)
    if (t >= T_I1 + 1.0 && t < T_I2) {
      const prog = Math.min(1, (t - (T_I1 + 1.0)) / (T_I2 - T_I1 - 1.0));
      drawCenterGlow(prog * 0.20, Math.min(W, H) * 0.16);
    }

    // Leuchten durch Lücken – sofort wenn Hexe wegfliegen (ab Impuls 2)
    if (t >= T_I2) {
      const gA = Math.min(1, (t - T_I2) / 0.12) * (t < T_I3 ? 0.5 : 0.90);
      drawCenterGlow(gA);
    }

    drawBreakingHexes(t, dt);

    // Risstriche über Hexe (nach Impuls 1, vor Impuls 2)
    if (t >= T_I1 + 1.0 && t < T_I2) {
      const prog = Math.min(1, (t - (T_I1 + 1.0)) / (T_I2 - T_I1 - 1.0));
      drawCrackStrokes(prog);
    }

    // Flash bei Impuls 3: 0.3s hoch → 2s hell → 0.8s runter
    if (t >= T_I3 && t < T_I3 + FLASH_D) {
      const tN = (t - T_I3) / FLASH_D;
      const fA = tN < 0.10 ? tN / 0.10 : tN < 0.74 ? 1.0 : 1 - (tN - 0.74) / 0.26;
      drawFlash(Math.max(0, fA));
    }

  }

  // ── Finalzustand ─────────────────────────────────────────────────────
  if (t >= T_FINAL) drawFinalState(t);

  drawSubtitles(t);

  if (t < T_END) {
    requestAnimationFrame(frame);
  } else {
    running = false;
    setTimeout(showVictoryButtons, 2000);
  }
}

function showVictoryButtons() {
  document.getElementById('victory-overlay').classList.add('visible');
}

document.getElementById('btnClose').addEventListener('click', () => {
  window.close();
});

document.getElementById('btnSendLog').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true;
  btn.textContent = '⏳  Wird gesendet …';

  try {
    const raw = localStorage.getItem('scharkana_stats');
    if (!raw) throw new Error('Keine Spieldaten in localStorage gefunden');
    const { csvStr, summary, gameId } = JSON.parse(raw);

    const fd = new FormData();
    fd.append('payload_json', JSON.stringify({
      content: `**Scharkana Spielstatistik**\n${summary}`
    }));
    const blob = new Blob([csvStr], { type: 'text/csv' });
    fd.append('files[0]', blob, `scharkana_${gameId}.csv`);

    const resp = await fetch(
      'https://discord.com/api/webhooks/1495883584408518849/jO79NHBZl7L7lu57bp7Qk3IQjgEglaJ3r2IBY98771pn5L-kLcQbaIgl9B31HH-qQGWB',
      { method: 'POST', body: fd }
    );
    if (!resp.ok) {
      const errText = await resp.text().catch(() => resp.status);
      throw new Error(`Discord ${resp.status}: ${errText}`);
    }

    btn.textContent = '✓  Log gesendet';
    btn.classList.add('sent');
    localStorage.removeItem('scharkana_stats');
  } catch (e) {
    console.error('Log senden fehlgeschlagen:', e);
    btn.disabled = false;
    btn.textContent = '⚠  Fehler – erneut versuchen';
    btn.title = e.message;
  }
});

requestAnimationFrame(frame);
</script>
