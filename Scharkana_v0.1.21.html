      // Zeilen
      if (rows.length === 0) {
        ctx.fillStyle = '#666'; ctx.font = '13px "Exo 2",sans-serif';
        ctx.textBaseline = 'middle';
        ctx.fillText('Keine Einheiten getötet.', px + pw / 2, py + 48 + 14);
      }
      rows.forEach((row, i) => {
        const ry = py + 48 + i * 28;
        ctx.fillStyle = '#ccccee'; ctx.font = '13px "Exo 2",sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(row.label, px + 20, ry + 14);
        ctx.fillStyle = '#ffdd66'; ctx.font = 'bold 13px "Exo 2",sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`+${row.gold} Gold`, px + pw - 20, ry + 14);
      });

      // Gesamtsumme
      const sumY = py + 48 + rows.length * 28 + 8;
      ctx.strokeStyle = ch.color + '44'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px + 16, sumY); ctx.lineTo(px + pw - 16, sumY); ctx.stroke();
      ctx.fillStyle = '#ffdd66'; ctx.font = 'bold 14px "Exo 2",sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(`Gesamt: +${rp.goldEarned} Gold`, px + pw - 20, sumY + 16);

      // Weiter-Button
      const bbY = sumY + 32, bbX = px + pw / 2 - 80;
      ctx.fillStyle   = 'rgba(20,60,20,0.9)';
      ctx.strokeStyle = '#44cc66'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(bbX, bbY, 160, bh, 6); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#88ee99'; ctx.font = 'bold 13px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Weiter  →', bbX + 80, bbY + bh / 2);
      ctx.restore();

      spielActionBtns.push({ x: bbX, y: bbY, w: 160, h: bh, action: 'confirmRecovery' });
    }

    function confirmBuildingSelection(idx) {
      saveSpielState();
      players[currentPlayerIdx].gold -= 2;
      const { type, unitQ, unitR } = spielBuildingMode;
      const adj = spielBuildingMode.candidates[idx];
      if (type === 'mine') {
        spielBuildings.push({ q: unitQ, r: unitR, type: 'mine', ownerIdx: currentPlayerIdx,
          stack: makeMineStack(), adjBQ: adj.q, adjBR: adj.r });
        spielPhase3Log.push({ label: '⛏ Mine gebaut', detail: '−2 Gold' });
        spielLog = 'Mine gebaut. −2 Gold.';
      } else {
        spielBuildings.push({ q: unitQ, r: unitR, type: 'well', ownerIdx: currentPlayerIdx,
          adjBQ: adj.q, adjBR: adj.r });
        spielPhase3Log.push({ label: '◎ Brunnen gebaut', detail: '−2 Gold' });
        spielLog = 'Brunnen gebaut. −2 Gold.';
      }
      spielBuildingMode = null;
    }

    function isHamburgerClick(mx, my) {
      // Exakt dieselbe Position wie beim Zeichnen (beide Phasen identisch)
      const MB_W = 130, MB_X = canvas.width - 10 - 130;
      const BTN_Y = 12, BTN_H = 32;
      return mx >= MB_X && mx <= MB_X + MB_W && my >= BTN_Y && my <= BTN_Y + BTN_H;
    }

    function handleInGameMenuClick(mx, my) {
      if (!inGameMenuOpen) return false;
      // Schließen-Button
      const cb = inGameMenuCloseBtn;
      if (cb && mx >= cb.x && mx <= cb.x + cb.w && my >= cb.y && my <= cb.y + cb.h) {
        inGameMenuOpen = false; render(); return true;
      }
      // Navigations-Pfeile
      for (const btn of inGameMenuNavBtns) {
        if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          inGameMenuPage = Math.max(1, Math.min(HANDBUCH_PAGES.length, inGameMenuPage + btn.dir));
          render(); return true;
        }
      }
      // Klick außerhalb der Box schließt
      const BW = 860, BH = 840;
      const BX = (canvas.width - BW) / 2, BY = (canvas.height - BH) / 2;
      if (mx < BX || mx > BX + BW || my < BY || my > BY + BH) {
        inGameMenuOpen = false; render();
      }
      return true;
    }

    // ── Allgemeiner Klick-Handler: Menü + Versionsnummer ────────────────────
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;

      // Menü-Einträge per Maus wählbar machen
      if (screen === 'menu') {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const startY = cy - 120, itemH = 64;
        for (let i = 0; i < MENU_ITEMS.length; i++) {
          const iy = startY + i * itemH;
          if (mx >= cx - 160 && mx <= cx + 160 && my >= iy - 22 && my <= iy + 22) {
            menuIndex = i;
            render();
            handleMenuSelect(MENU_ITEMS[i]);
            return;
          }
        }
        return;
      }

      // Spielerauswahl per Maus
      if (screen === 'playerSelect') {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const options = [2, 3, 4, 5, 6];
        const btnW = 90, btnH = 90, gap = 24;
        const totalW = options.length * btnW + (options.length - 1) * gap;
        const startX = cx - totalW / 2;
        const btnY = cy - 40;
        for (let i = 0; i < options.length; i++) {
          const bx = startX + i * (btnW + gap);
          if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
            playerCount = options[i]; render();
            return;
          }
        }
        const sbW = 200, sbH = 52, sbX = cx - 100, sbY = cy + 100;
        if (mx >= sbX && mx <= sbX + sbW && my >= sbY && my <= sbY + sbH) {
          carouselIndex = 0; charSelectingPlayer = 1; selectedCharacters = [];
          screen = 'characterSelect'; render();
        }
        return;
      }

      // Charakterauswahl per Maus
      if (screen === 'characterSelect') {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const cardCenterY = cy + 30;
        const arrowW = 50, arrowH = 50;
        // Linker Pfeil
        const lax = cx - 195, lay = cardCenterY - arrowH / 2;
        if (mx >= lax && mx <= lax + arrowW && my >= lay && my <= lay + arrowH) {
          carouselIndex = nextFreeCharIdx(carouselIndex, -1); render(); return;
        }
        // Rechter Pfeil
        const rax = cx + 145, ray = cardCenterY - arrowH / 2;
        if (mx >= rax && mx <= rax + arrowW && my >= ray && my <= ray + arrowH) {
          carouselIndex = nextFreeCharIdx(carouselIndex, 1); render(); return;
        }
        // Bestätigungs-Button
        const cbX = cx - 100, cbY = cy + 255, cbW = 200, cbH = 48;
        if (mx >= cbX && mx <= cbX + cbW && my >= cbY && my <= cbY + cbH) {
          if (selectedCharacters.includes(carouselIndex)) return;
          selectedCharacters.push(carouselIndex);
          if (charSelectingPlayer < playerCount) {
            charSelectingPlayer++;
            carouselIndex = nextFreeCharIdx(carouselIndex, 1);
            render();
          } else {
            initGame(); screen = 'game'; render();
          }
          return;
        }
        return;
      }

      // ── Statusleiste-Buttons unten rechts ───────────────────────────────
      {
        ctx.font = 'italic 14px "Exo 2",sans-serif';
        const verW = ctx.measureText('Version 0.1.21').width;
        const cy2  = canvas.height - 20, btnH = 30;
        const sbW  = 44, sbX = canvas.width - 14 - verW - 10 - sbW, sbY = cy2 - btnH / 2;
        const brW  = 44, brX = sbX - 8 - brW,                       brY = cy2 - btnH / 2;
        // ⚠ Bugreport
        if (mx >= brX && mx <= brX + brW && my >= brY && my <= brY + btnH) {
          let url = 'bugreport.html';
          try { if (gamePhase === 'spielphase') url += '?code=' + encodeURIComponent(encodeGameState()); } catch(e) {}
          window.open(url, '_blank');
          return;
        }
        // 💾 Speichern
        if (gamePhase === 'spielphase' && mx >= sbX && mx <= sbX + sbW && my >= sbY && my <= sbY + btnH) {
          const code = encodeGameState();
          document.getElementById('saveCodeText').value = code;
          document.getElementById('saveCodeOverlay').style.display = 'flex';
          setTimeout(() => { document.getElementById('saveCodeText').select(); }, 50);
          return;
        }
      }
    });

    // ── Bauphase: Mausklick ──────────────────────────────────────────────────
    canvas.addEventListener('click', e => {
      if (screen === 'victory') { returnToMenu(); return; }
      if (gamePhase !== 'bauphase') return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      if (isHamburgerClick(mx, my)) { if (inGameMenuOpen) { inGameMenuOpen = false; if (window.closeHandbuchOverlay) window.closeHandbuchOverlay(); else render(); } else { inGameMenuOpen = true; render(); if (window.openHandbuchOverlay) window.openHandbuchOverlay(() => { inGameMenuOpen = false; render(); }); } return; }
      if (handleInGameMenuClick(mx, my)) return;
      // Regelhinweis-Popup schließen
      if (regelHinweisPopup) {
        const b = regelHinweisPopup.btnRect;
        if (b && mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          regelHinweisPopup = null; render();
        }
        return;
      }
      if (blockFlash) return;

      // Info-Fenster Button: Hier bleiben
      for (const btn of spielActionBtns) {
        if (btn.action === 'bauSkip' &&
            mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          const cp2 = curPlayer();
          if (cp2.moves > 0) {
            if (cp2.moves <= 2) {
              const minDist = cp2.moves === 2 ? 2 : 3;
              if (bauZuNahFuerSkip(minDist)) {
                showRegelHinweis(cp2.moves);
                render(); return;
              }
            }
            cp2.moves--; advanceTurn(); render();
          }
          return;
        }
      }

      // Klick auf Nachbarfeld → bewegen
      const cp2 = curPlayer();
      if (cp2.moves === 0) return;
      const { q: cq, r: cr } = pixelToHex(mx, my);
      const isAdj = DIRS.some(({ dq, dr }) => cp2.q + dq === cq && cp2.r + dr === cr);
      if (!isAdj) return;
      const nk = `${cq},${cr}`;
      if (hexMap.get(nk) === 'blocked' || isBlockedByPlayer(cq, cr)) { flashBlocked(cq, cr); render(); return; }
      if (hexMap.get(nk) === 'sealed') return;
      if (hexDist(cq, cr) > 10) { flashBlocked(cq, cr); spielLog = 'Spielfeldgrenze erreicht!'; render(); return; }
      // Abstandsregel: letzten 2 Züge prüfen (kein Fallback bei moves ≤ 2)
      if (bauDistanzStatus(cq, cr) === 'blocked' && (cp2.moves > 2 ? !bauAllNeighborsBlocked() : true)) {
        flashBlocked(cq, cr);
        spielLog = 'Zu nah an einem Mitspieler! Wähle ein weiter entferntes Feld.';
        render(); return;
      }
      const fromQ2 = cp2.q, fromR2 = cp2.r;
      const animCharIdx2 = cp2.charIdx;
      cp2.q = cq; cp2.r = cr;
      if (!hexMap.has(nk)) hexMap.set(nk, 'visited');
      cp2.moves--;
      checkEnclosed();
      advanceTurn();
      startMoveAnim(fromQ2, fromR2, cq, cr, (x, y) => {
        drawSpriteOnBoard(x - SIZE * 0.30, y + SIZE * 0.08, animCharIdx2, 0.54);
      });
    });

    // ── Spielphase: Mausklick ────────────────────────────────────────────────
    canvas.addEventListener('click', e => {
      if (gamePhase !== 'spielphase') return;
      if (spielResourcePopup) return; // Popup blockiert alle Klicks
      const rect = canvas.getBoundingClientRect();
      const mx   = e.clientX - rect.left;
      const my   = e.clientY - rect.top;
      if (isHamburgerClick(mx, my)) { if (inGameMenuOpen) { inGameMenuOpen = false; if (window.closeHandbuchOverlay) window.closeHandbuchOverlay(); else render(); } else { inGameMenuOpen = true; render(); if (window.openHandbuchOverlay) window.openHandbuchOverlay(() => { inGameMenuOpen = false; render(); }); } return; }
      if (handleInGameMenuClick(mx, my)) return;

      // ── Phasenschritt 1/2: nur Weiter-Button erlaubt ────────────────────
      if (spielPhaseStep === 1 || spielPhaseStep === 2) {
        for (const btn of spielActionBtns) {
          if (btn.action === 'nextPhase' &&
              mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
            confirmPhaseStep(); render();
          }
        }
        return;
      }


      // ── Gebäude-Auswahlmodus (Mine/Brunnen) ──────────────────────────────
      if (spielBuildingMode) {
        const { q: cq, r: cr } = (() => {
          const fx = (mx - canvas.width  / 2) / SIZE;
          const fy = (my - canvas.height / 2) / SIZE;
          const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
          const fr = 2 / 3 * fy;
          const s  = -fq - fr;
          let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
          const dq = Math.abs(rq - fq), dr = Math.abs(rr - fr), ds = Math.abs(rs - s);
          if (dq > dr && dq > ds) rq = -rr - rs;
          else if (dr > ds)        rr = -rq - rs;
          return { q: rq, r: rr };
        })();
        const hit = spielBuildingMode.candidates.findIndex(c => c.q === cq && c.r === cr);
        if (hit !== -1) {
          if (spielBuildingMode.candidates[hit].used) {
            spielLog = 'Dieses Feld wird bereits verwendet.';
          } else {
            confirmBuildingSelection(hit);
          }
        } else {
          spielBuildingMode = null;
          spielLog = 'Auswahl abgebrochen.';
        }
        render(); return;
      }

      // ── Aktions-Buttons: Zug beenden / Aufteilen / Zusammenführen ────────
      for (const btn of spielActionBtns) {
        if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          if (btn.action === 'endTurn') {
            triggerPhase4(); render(); return;
          }
          if (btn.action === 'confirmRecovery') {
            advanceToNextPlayerAnimated(); return;
          }
          if (btn.action === 'undo') {
            undoSpielAction(); return;
          }
          if (btn.action === 'openInGameMenu') {
            if (inGameMenuOpen) {
              inGameMenuOpen = false;
              if (window.closeHandbuchOverlay) window.closeHandbuchOverlay(); else render();
            } else {
              inGameMenuOpen = true; render();
              if (window.openHandbuchOverlay) window.openHandbuchOverlay(() => { inGameMenuOpen = false; render(); });
            }
            return;
          }
          if (btn.action === 'instantMine') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            const b  = getSpielBuildingAt(su.q, su.r);
            const top = b.stack[0];
            b.stack.shift(); b.stack.push(top);
            players[currentPlayerIdx].nachtrank -= 2;
            if (top === 'G') {
              players[currentPlayerIdx].gold += 1;
              spielPhase3Log.push({ label: '⛏ Sofortabbau', detail: '−2 Tränke, +1 Gold' });
              spielLog = 'Sofortabbau: −2 Tränke, +1 Gold.';
            } else {
              su.hasGem = true;
              spielPhase3Log.push({ label: '⛏ Sofortabbau', detail: '−2 Tränke, +1 Edelstein' });
              spielLog = 'Sofortabbau: −2 Tränke, +1 Edelstein.';
            }
            spielSelectedIdx = null; spielReachable = new Map();
            render(); return;
          }
          if (btn.action === 'instantWell') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            su.hasGem = false;
            players[currentPlayerIdx].nachtrank -= 2;   // Sofortwandlung Brunnen (Hauptphase): kostet 2 Tränke
            players[currentPlayerIdx].machtsteine += 5; // Sofortwandlung Brunnen (Hauptphase): gibt +5 MP
            spielPhase3Log.push({ label: '◎ Edelstein gewandelt', detail: '−2 Tränke, +5 MP' });
            spielLog = 'Edelstein sofort gewandelt: −2 Tränke, +5 Machtpunkte.';
            checkEliminations();
            spielSelectedIdx = null; spielReachable = new Map();
            render(); return;
          }
          if (btn.action === 'sellBuilding') {
            const su  = spielUnits[spielSelectedIdx];
            const bIdx = spielBuildings.findIndex(b => b.q === su.q && b.r === su.r && b.ownerIdx === currentPlayerIdx);
            if (bIdx !== -1) {
              saveSpielState();
              const sold = spielBuildings[bIdx];
              spielBuildings.splice(bIdx, 1);
              players[currentPlayerIdx].gold += 1;  // Gebäude verkaufen → +1 Gold, ändere 1 für anderen Erlös
              const label = sold.type === 'mine' ? '⛏ Mine' : '◎ Brunnen';
              spielPhase3Log.push({ label: `${label} verkauft`, detail: '+1 Gold' });
              spielLog = `${label} verkauft. +1 Gold.`;
              spielSelectedIdx = null; spielReachable = new Map();
            }
            render(); return;
          }
          if (btn.action === 'buildMine' || btn.action === 'buildWell') {
            const su = spielUnits[spielSelectedIdx];
            const isMine = btn.action === 'buildMine';
            const btype = isMine ? 'mine' : 'well';
            const candidates = DIRS
              .map(({ dq, dr }) => ({ q: su.q + dq, r: su.r + dr }))
              .filter(c => {
                const t = hexMap.get(key(c.q, c.r));
                return isMine ? t === 'blocked' : (!t || t === 'sealed');
              })
              .map(c => ({ ...c, used: isAdjFieldUsed(c.q, c.r, btype) }));
            spielSelectedIdx = null; spielReachable = new Map();
            const freeCandidates = candidates.filter(c => !c.used);
            if (freeCandidates.length === 1) {
              // Nur ein freier Kandidat → sofort bauen (Index des freien Kandidaten ermitteln)
              const freeIdx = candidates.findIndex(c => !c.used);
              spielBuildingMode = { type: btype, unitQ: su.q, unitR: su.r, candidates };
              confirmBuildingSelection(freeIdx);
            } else {
              spielBuildingMode = { type: btype, unitQ: su.q, unitR: su.r, candidates };
              spielLog = isMine
                ? 'Wähle ein Gebirge: Klick darauf oder Zahl eingeben. [Esc] abbr.'
                : 'Wähle einen Rand: Klick darauf oder Zahl eingeben. [Esc] abbr.';
            }
            render(); return;
          }
          if (btn.action === 'split') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            const sq = su.q, sr = su.r;
            spielUnits.splice(spielSelectedIdx, 1);
            spielUnits.push({ q: sq, r: sr, type: 'S', ownerIdx: currentPlayerIdx });
            spielUnits.push({ q: sq, r: sr, type: 'S', ownerIdx: currentPlayerIdx });
            players[currentPlayerIdx].nachtrank -= 1;
            spielPhase3Log.push({ label: 'Aufgeteilt  W → 2×S', detail: '−1 Trank' });
            spielSelectedIdx = null; spielReachable = new Map();
            spielLog = 'Wächter in 2 Schleicher aufgeteilt. −1 Trank.';
            render(); return;
          }
          if (btn.action === 'merge') {
            saveSpielState();
            const su = spielUnits[spielSelectedIdx];
            const sq = su.q, sr = su.r;
            const idxA = spielSelectedIdx, idxB = btn.otherIdx;
            spielUnits.splice(Math.max(idxA, idxB), 1);
            spielUnits.splice(Math.min(idxA, idxB), 1);
            spielUnits.push({ q: sq, r: sr, type: 'W', ownerIdx: currentPlayerIdx });
            players[currentPlayerIdx].nachtrank -= 1;
            spielPhase3Log.push({ label: 'Fusioniert  2×S → W', detail: '−1 Trank' });
            spielSelectedIdx = null; spielReachable = new Map();
            spielLog = '2 Schleicher zu Wächter zusammengeführt. −1 Trank.';
            render(); return;
          }
        }
      }

      // ── Shop-Panel-Klicks ─────────────────────────────────────────────────
      if (spielCampMenuOpen) {
        for (const btn of spielShopButtons) {
          if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
            saveSpielState();
            const p = players[currentPlayerIdx];
            if (btn.action === 'buy') {
              p.gold -= btn.cost;
              spielUnits.push({ q: p.campQ, r: p.campR, type: btn.unitType, ownerIdx: currentPlayerIdx });
              spielCampMenuOpen = false;
              const unitLabel = btn.unitType === 'W' ? 'Schattenwächter' : 'Nebelschleicher';
              spielPhase3Log.push({ label: `${unitLabel} gekauft`, detail: `−${btn.cost} Gold` });
              spielLog = `${unitLabel} gekauft (−${btn.cost} Gold).`;
            } else if (btn.action === 'tradeGoldToTrank') {
              p.gold -= 2; p.nachtrank += 1;
              spielPhase3Log.push({ label: '⇄ Tausch: 2 Gold → 1 Trank', detail: '−2 Gold, +1 Trank' });
              spielLog = `Getauscht: −2 Gold, +1 Trank. Gold: ${p.gold}, Tränke: ${p.nachtrank}`;
            } else if (btn.action === 'tradeTrankToGold') {
              p.nachtrank -= 2; p.gold += 1;
              spielPhase3Log.push({ label: '⇄ Tausch: 2 Tränke → 1 Gold', detail: '−2 Tränke, +1 Gold' });
              spielLog = `Getauscht: −2 Tränke, +1 Gold. Gold: ${p.gold}, Tränke: ${p.nachtrank}`;
            }
            render(); return;
          }
        }
        spielCampMenuOpen = false;
        render(); return;
      }

      const { q, r } = (() => {
        const fx = (mx - canvas.width  / 2) / SIZE;
        const fy = (my - canvas.height / 2) / SIZE;
        const fq = Math.sqrt(3) / 3 * fx - 1 / 3 * fy;
        const fr = 2 / 3 * fy;
        const s  = -fq - fr;
        let rq = Math.round(fq), rr = Math.round(fr), rs = Math.round(s);
        const dq = Math.abs(rq - fq), dr = Math.abs(rr - fr), ds = Math.abs(rs - s);
        if (dq > dr && dq > ds) rq = -rr - rs;
        else if (dr > ds)        rr = -rq - rs;
        return { q: rq, r: rr };
      })();
      const k = key(q, r);

      // Klick auf Gebirge → Mine-Info-Popup
      if (hexMap.get(k) === 'blocked') {
        const mine = spielBuildings.find(b => b.type === 'mine' && b.adjBQ === q && b.adjBR === r);
        if (mine) {
          let displayStack = [...mine.stack];
          let isPreview = false;
          if (spielPhaseStep === 1) {
            const top = mine.stack[0];
            const schls = spielUnits.filter(u => u.q === mine.q && u.r === mine.r && u.ownerIdx === currentPlayerIdx && u.type === 'S');
            if (schls.length > 0) {
              if (top === 'G') {
                displayStack = [...mine.stack.slice(1), 'G'];
                isPreview = true;
              } else if (top === 'E') {
                const schlNoGem = schls.find(u => !u.hasGem);
                if (schlNoGem) { displayStack = makeMineStack(); isPreview = true; }
              }
            }
          }
          mineInfoPopup = { stack: displayStack, isPreview };
          render(); return;
        }
      }

      // Popup schließen bei Klick woanders
      if (mineInfoPopup) { mineInfoPopup = null; render(); return; }

      if (!spielPlayGrid || !spielPlayGrid.has(k)) {
        if (spielSelectedIdx !== null || spielCampMenuOpen) {
          spielSelectedIdx = null; spielReachable = new Map(); spielCampMenuOpen = false;
          spielLog = 'Auswahl aufgehoben.'; render();
        }
        return;
      }

      // ── Bewegung/Angriff hat Vorrang wenn Feld erreichbar ─────────────────
      const selUnit = spielSelectedIdx !== null ? spielUnits[spielSelectedIdx] : null;
      if (selUnit && spielReachable.has(k)) {
        const cost       = spielReachable.get(k);

        // ── Angriffspriorität: Wächter → Schleicher → Lager ─────────────────
        // 1. Feindliche Einheiten auf dem Feld (W hat Vorrang vor S)
        const enemiesOnField = spielUnits
          .map((u, i) => ({ u, i }))
          .filter(({ u }) => u.q === q && u.r === r && u.ownerIdx !== currentPlayerIdx)
          .sort((a, b) => (a.u.type === 'W' ? -1 : 1));

        const defIdx   = enemiesOnField.length > 0 ? enemiesOnField[0].i : -1;
        const defender = defIdx !== -1 ? spielUnits[defIdx] : null;

        if (defender) {
          // Kampf
          saveSpielState();
          const isNeutralDef = defender.ownerIdx === -1;

          // ── Sonderfall: Wächter greift mehrere feindliche Schleicher an ──────
          const multiSlayTargets = selUnit.type === 'W' && !isNeutralDef
            && defender.type === 'S' && enemiesOnField.length >= 2
            && enemiesOnField.every(({ u }) => u.type === 'S');

          if (multiSlayTargets) {
            // W hat atk=2: trifft maximal 2 Schleicher; übrige überleben
            const wAtk = 2;
            const killCount = Math.min(enemiesOnField.length, wAtk);
            const toKill = enemiesOnField.slice(0, killCount);
            let msg = `Kampf: Wächter → ${enemiesOnField.length}× Schleicher. `;
            // Getroffene Schleicher sterben (von hinten nach vorne für stabile Indizes)
            const sortedDesc = [...toKill].sort((a, b) => b.i - a.i);
            for (const { u: eu, i: ei } of sortedDesc) {
              if (eu.hasGem) droppedGems.push({ q: eu.q, r: eu.r });
              spielTurnKills.push('S');
              spielUnits.splice(ei, 1);
              if (spielSelectedIdx > ei) spielSelectedIdx--;
            }
            const survived = enemiesOnField.length - killCount;
            msg += `${killCount} Schleicher sterben. `;
            if (survived > 0) msg += `${survived} Schleicher überlebt. `;
            // W nimmt Schaden = Anzahl getöteter Schleicher (je 1 Gegentreffer)
            if (killCount >= 2) {
              if (selUnit.hasGem) droppedGems.push({ q: selUnit.q, r: selUnit.r });
              spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null;
              msg += 'Wächter stirbt.';
            } else {
              spielUnits[spielSelectedIdx].type = 'S'; msg += 'Wächter → S. ';
            }
            players[currentPlayerIdx].nachtrank -= cost;
            spielPhase3Log.push({ label: `⚔ Kampf  Wächter→${enemiesOnField.length}×S`, detail: `−${cost} Trank` });
            spielLog = msg + ` (−${cost} Trank, ${players[currentPlayerIdx].nachtrank} übrig)`;
          } else {
            // ── Normaler 1-vs-1 Kampf ───────────────────────────────────────
            const res = resolveSpielCombat(selUnit, defender);
            let msg   = `Kampf: ${selUnit.type} → ${defender.type}. `;
            if (res.defenderDowngraded) {
              spielUnits[defIdx].type = 'S'; msg += 'Gegner → S. ';
              if (isNeutralDef) { players[currentPlayerIdx].machtsteine += 1; msg += '+1 MP. '; }  // Neutraler Wächter degradiert → +1 MP
            } else if (!res.defenderSurvives) {
              if (isNeutralDef) {
                if (defender.type === 'W') {
                  players[currentPlayerIdx].machtsteine += 2; msg += '+2 MP. ';  // Neutralen Wächter getötet → +2 MP
                } else {
                  players[currentPlayerIdx].machtsteine += 1; msg += '+1 MP. ';  // Neutralen Schleicher getötet → +1 MP
                }
              } else spielTurnKills.push(defender.type);
              if (defender.type === 'S' && defender.hasGem) droppedGems.push({ q: defender.q, r: defender.r });
              spielUnits.splice(defIdx, 1); if (spielSelectedIdx > defIdx) spielSelectedIdx--;
              msg += 'Gegner stirbt. ';
            }
            if (!res.attackerSurvives) {
              if (selUnit.type === 'S' && selUnit.hasGem) droppedGems.push({ q: selUnit.q, r: selUnit.r });
              spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null; msg += 'Angreifer stirbt.';
            } else {
              if (res.attackerDowngraded) { spielUnits[spielSelectedIdx].type = 'S'; msg += 'Angreifer → S. '; }
              // Neutrale am Zentrum: Angreifer rückt nicht vor solange noch Neutrale dort stehen
              const neutralsRemain = isNeutralDef && spielUnits.some(u => u.ownerIdx === -1 && u.q === q && u.r === r);
              if (!(res.defenderSurvives && !res.defenderDowngraded) && spielSelectedIdx !== null && !neutralsRemain) {
                spielUnits[spielSelectedIdx].q = q; spielUnits[spielSelectedIdx].r = r;
                // Schleicher hebt Edelstein auf dem betretenen Feld automatisch auf
                const atkUnit = spielUnits[spielSelectedIdx];
                if (atkUnit && atkUnit.type === 'S' && !atkUnit.hasGem) {
                  const gemIdx = droppedGems.findIndex(g => g.q === q && g.r === r);
                  if (gemIdx !== -1) {
                    atkUnit.hasGem = true;
                    droppedGems.splice(gemIdx, 1);
                    msg += 'Edelstein aufgehoben! ';
                    spielPhase3Log.push({ label: '◆ Edelstein aufgehoben', detail: '' });
                  }
                }
                // Steht der Angreifer nach dem Kampf auf einem feindlichen Lager → sofort Lagerangriff
                if (spielSelectedIdx !== null) {
                  const postCampIdx = players.findIndex((pp, i) =>
                    i !== currentPlayerIdx && !pp.eliminated && pp.campQ === q && pp.campR === r);
                  if (postCampIdx !== -1) {
                    const campAtker   = spielUnits[spielSelectedIdx];
                    const campAtk     = campAtker.type === 'W' ? 2 : 1;
                    const campAtkHp   = campAtker.type === 'W' ? 2 : 1;
                    const campReward  = campAtk * 2;
                    const campCounter = players[postCampIdx].machtsteine; // Lager schlägt mit eigenen MP zurück
                    players[currentPlayerIdx].machtsteine += campReward;
                    players[postCampIdx].machtsteine = Math.max(0, players[postCampIdx].machtsteine - campAtk);
                    if (campCounter >= campAtkHp) {
                      spielUnits.splice(spielSelectedIdx, 1); spielSelectedIdx = null;
                      msg += `Lagerangriff! +${campReward} MP, Spieler ${postCampIdx + 1} −${campAtk} MP. Angreifer opfert sich. `;
                    } else {
                      if (campAtker.type === 'W') spielUnits[spielSelectedIdx].type = 'S';
                      spielSelectedIdx = null;
                      msg += `Lagerangriff! +${campReward} MP, Spieler ${postCampIdx + 1} −${campAtk} MP. Angreifer → Schleicher. `;
                    }
                    spielPhase3Log.push({ label: `⚔ Lagerangriff (${campAtker.type})`, detail: `+${campReward} MP` });
                  }
                }
              } else { msg += 'Prallt ab.'; }
            }
            players[currentPlayerIdx].nachtrank -= cost;
            const atkLabel = selUnit.type === 'W' ? 'Wächter' : 'Schleicher';
            const defLabel = defender.type === 'W' ? 'Wächter' : 'Schleicher';
            const neutralKillNote = isNeutralDef && !res.defenderSurvives && !res.defenderDowngraded
              ? (defender.type === 'W' ? ', +2 MP' : ', +1 MP') : '';
            const neutralHitNote  = isNeutralDef && res.defenderDowngraded ? ', +1 MP' : '';
            spielPhase3Log.push({ label: `⚔ Kampf  ${atkLabel}→${defLabel}`, detail: `−${cost} Trank${neutralHitNote || neutralKillNote}` });
            spielLog = msg + ` (−${cost} Trank, ${players[currentPlayerIdx].nachtrank} übrig)`;
            checkEliminations();
          }
        } else {
          // 2. Kein Feind auf dem Feld – Lagerangriff möglich?
          const enemyCampIdx = players.findIndex((p, i) =>
            i !== currentPlayerIdx && !p.eliminated && p.campQ === q && p.campR === r);
          if (enemyCampIdx !== -1) {
            saveSpielState();
            // Lagerangriff: Angreifer schlägt zu, Lager schlägt mit seinen aktuellen MP zurück
            // Schaden am Feind: atk (W=2, S=1) → ändere die Werte für anderen Schaden
            // Belohnung für Angreifer: atk * 2 → also W=+4 MP, S=+2 MP → ändere * 2 für andere Belohnung
            const atk        = selUnit.type === 'W' ? 2 : 1;
            const atkHp      = selUnit.type === 'W' ? 2 : 1;
            const reward     = atk * 2;
            const counterAtk = players[enemyCampIdx].machtsteine; // Lager schlägt mit eigenen MP zurück
            players[currentPlayerIdx].nachtrank  -= cost;
            players[currentPlayerIdx].machtsteine += reward;
            players[enemyCampIdx].machtsteine     = Math.max(0, players[enemyCampIdx].machtsteine - atk);
            const atkSurvives = counterAtk < atkHp;
            if (atkSurvives) {
              spielUnits[spielSelectedIdx].q = q;
              spielUnits[spielSelectedIdx].r = r;
              if (selUnit.type === 'W') spielUnits[spielSelectedIdx].type = 'S';
            } else {
              spielUnits.splice(spielSelectedIdx, 1);
            }
            spielPhase3Log.push({ label: `⚔ Lagerangriff (${selUnit.type})`, detail: `−${cost} Trank, +${reward} MP` });
            spielSelectedIdx = null; spielReachable = new Map();
            const atkNote = atkSurvives
              ? (selUnit.type === 'W' ? 'Wächter → Schleicher.' : 'Schleicher überlebt.')
              : (selUnit.type === 'W' ? 'Wächter opfert sich.' : 'Schleicher opfert sich.');
            spielLog = `Lagerangriff! ${atkNote} Spieler ${enemyCampIdx + 1} −${atk} MP. Du +${reward} MP.`;
            checkEliminations();
            render(); return;
          }
          // 3. Normaler Zug
          saveSpielState();
          const isJump = Math.abs(q - selUnit.q) > 1 || Math.abs(r - selUnit.r) > 1 || Math.abs((q + r) - (selUnit.q + selUnit.r)) > 1;
          const fromQs = selUnit.q, fromRs = selUnit.r;
          const animUnit = { ...selUnit }; // Snapshot für ghostFn
          spielUnits[spielSelectedIdx].q = q;
          spielUnits[spielSelectedIdx].r = r;
          players[currentPlayerIdx].nachtrank -= cost;
          const moveLabel = selUnit.type === 'W' ? 'Wächter' : 'Schleicher';
          spielPhase3Log.push({ label: `${isJump ? '↗' : '→'} ${moveLabel} bewegt`, detail: `−${cost} Trank` });
          spielLog = `Bewegt nach (${q},${r})${isJump ? ' [Sprung]' : ''}. −${cost} Trank. ${players[currentPlayerIdx].nachtrank} übrig.`;
          startMoveAnim(fromQs, fromRs, q, r, (x, y) => {
            drawSpielUnit(x, y, animUnit, false, 1.0);
          });
          // Schleicher hebt liegenden Edelstein automatisch auf
          if (selUnit.type === 'S' && !selUnit.hasGem) {
            const gemIdx = droppedGems.findIndex(g => g.q === q && g.r === r);
            if (gemIdx !== -1) {
              spielUnits[spielSelectedIdx].hasGem = true;
              droppedGems.splice(gemIdx, 1);
              spielLog += ' Edelstein aufgehoben!';
              spielPhase3Log.push({ label: '◆ Edelstein aufgehoben', detail: '' });
            }
          }
        }
        spielSelectedIdx = null; spielReachable = new Map();
        render(); return;
      }

      // ── Nächstes Objekt im Feld per Abstand bestimmen ────────────────────
      let nearest = null, nearestDist = Infinity;
      for (const obj of spielObjPositions) {
        const d = (obj.x - mx) ** 2 + (obj.y - my) ** 2;
        if (d < nearestDist) { nearest = obj; nearestDist = d; }
      }
      if (nearest && nearestDist < (SIZE * 1.1) ** 2) {
        if (nearest.type === 'camp' && nearest.ownerIdx === currentPlayerIdx) {
          spielCampMenuOpen = true; spielSelectedIdx = null; spielReachable = new Map();
          spielLog = 'Lager geöffnet. Einheit kaufen oder schließen.';
          render(); return;
        }
        if (nearest.type === 'unit') {
          const u = spielUnits[nearest.idx];
          if (u && u.ownerIdx === currentPlayerIdx) {
            spielSelectedIdx = nearest.idx;
            spielReachable   = computeSpielReachable(u, players[currentPlayerIdx].nachtrank);
            spielLog = `${u.type === 'W' ? 'Schattenwächter' : 'Nebelschleicher'} ausgewählt. ${spielReachable.size} Felder erreichbar.`;
            render(); return;
          }
        }
      }

      // Abwahl
      spielSelectedIdx = null; spielReachable = new Map();
      spielLog = 'Auswahl aufgehoben.';
      render();
    });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;

      // Cursor über Statusleiste-Buttons
      {
        ctx.font = 'italic 14px "Exo 2",sans-serif';
        const verW = ctx.measureText('Version 0.1.21').width;
        const cy2  = canvas.height - 20, btnH = 30;
        const sbW  = 44, sbX = canvas.width - 14 - verW - 10 - sbW, sbY = cy2 - btnH / 2;
        const brW  = 44, brX = sbX - 8 - brW,                       brY = cy2 - btnH / 2;
        const overBr = mx >= brX && mx <= brX + brW && my >= brY && my <= brY + btnH;
        const overSb = mx >= sbX && mx <= sbX + sbW && my >= sbY && my <= sbY + btnH;
        if (overBr !== brBtnHover)   { brBtnHover   = overBr;  render(); }
        if (overSb !== saveBtnHover) { saveBtnHover = overSb;  render(); }
        if (overBr || (overSb && gamePhase === 'spielphase')) { canvas.style.cursor = 'pointer'; return; }
        if (overBr || overSb) { canvas.style.cursor = 'default'; return; }
      }
      // Cursor über Menüeintrag → pointer
      if (screen === 'menu') {
        const cx2 = canvas.width / 2, cy2 = canvas.height / 2;
        const startY2 = cy2 - 120, itemH2 = 64;
        for (let i = 0; i < MENU_ITEMS.length; i++) {
          const iy2 = startY2 + i * itemH2;
          if (mx >= cx2 - 160 && mx <= cx2 + 160 && my >= iy2 - 22 && my <= iy2 + 22) {
            canvas.style.cursor = 'pointer'; return;
          }
        }
      }
      // Cursor über Spielerauswahl-Buttons → pointer
      if (screen === 'playerSelect') {
        const cx2 = canvas.width / 2, cy2 = canvas.height / 2;
        const options2 = [2,3,4,5,6], btnW2 = 90, btnH2 = 90, gap2 = 24;
        const totalW2 = options2.length * btnW2 + (options2.length - 1) * gap2;
        const startX2 = cx2 - totalW2 / 2, btnY2 = cy2 - 40;
        for (let i = 0; i < options2.length; i++) {
          const bx2 = startX2 + i * (btnW2 + gap2);
          if (mx >= bx2 && mx <= bx2 + btnW2 && my >= btnY2 && my <= btnY2 + btnH2) {
            canvas.style.cursor = 'pointer'; return;
          }
        }
        const sbX2 = cx2 - 100, sbY2 = cy2 + 100;
        if (mx >= sbX2 && mx <= sbX2 + 200 && my >= sbY2 && my <= sbY2 + 52) {
          canvas.style.cursor = 'pointer'; return;
        }
      }
      // Cursor über Charakterauswahl-Buttons → pointer
      if (screen === 'characterSelect') {
        const cx2 = canvas.width / 2, cy2 = canvas.height / 2;
        const ccy = cy2 + 30, arrowH2 = 50, arrowW2 = 50;
        const lax2 = cx2 - 195, lay2 = ccy - arrowH2 / 2;
        const rax2 = cx2 + 145, ray2 = ccy - arrowH2 / 2;
        const cbX2 = cx2 - 100, cbY2 = cy2 + 255;
        if ((mx >= lax2 && mx <= lax2 + arrowW2 && my >= lay2 && my <= lay2 + arrowH2) ||
            (mx >= rax2 && mx <= rax2 + arrowW2 && my >= ray2 && my <= ray2 + arrowH2) ||
            (mx >= cbX2 && mx <= cbX2 + 200    && my >= cbY2 && my <= cbY2 + 48)) {
          canvas.style.cursor = 'pointer'; return;
        }
      }
      canvas.style.cursor = 'default';

      if (gamePhase !== 'bauphase') return;

      // ── Bauphase Hover-Highlight + Außenfeld-Tooltip ────────────────────
      const { q, r } = pixelToHex(mx, my);
      const k = `${q},${r}`;
      const inField2 = hexMap.has(k) && hexMap.get(k) !== 'blocked' && hexMap.get(k) !== 'sealed';
      const cp3 = curPlayer();
      const isPinkNeighbor = !hexMap.has(k) && DIRS.some(({ dq, dr }) => cp3.q + dq === q && cp3.r + dr === r);
      if (inField2 || isPinkNeighbor) {
        if (bauHoverQ !== q || bauHoverR !== r) { bauHoverQ = q; bauHoverR = r; render(); }
      } else {
        if (bauHoverQ !== null) { bauHoverQ = null; bauHoverR = null; render(); }
      }
    });


    // ── SIZE berechnen: Radius 14 vom Ursprung in alle Richtungen sichtbar ───
    // Pointy-top Hex-Grid, Radius R:
    //   Breite  = (2R+1) * SIZE * sqrt(3)
    //   Höhe    = (3R+2) * SIZE
    function computeSize() {
      const R = 10;
      const sizeW = canvas.width  / ((2 * R + 1) * Math.sqrt(3));
      const sizeH = canvas.height / (3 * R + 2);
      SIZE = Math.floor(Math.min(sizeW, sizeH) * 0.93); // 7% Rand
    }

    // ── Dynamische Canvas-Größe ──────────────────────────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      computeSize();
      render();
    }
    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
  </script>

  <script>
  (function () {
    // ── Nav-Index aus HANDBUCH_PAGES aufbauen ────────────────────────────────
    function navLabel(s) {
      return s.replace(/\s*[–-]\s*Kosten:[^)]+/g, '').trim();
    }
    const NAV = [];
    HANDBUCH_PAGES.forEach((page, pi) => {
      let cur = null;
      page.forEach((item, ii) => {
        if (item.t === 'chapter' || item.t === 'heading') {
          cur = { type: item.t, label: navLabel(item.s), id: `hb-${pi}-${ii}`, texts: [item.s.toLowerCase()] };
          NAV.push(cur);
        } else if (item.t === 'body' && cur) {
          cur.texts.push(item.s.toLowerCase());
        }
      });
    });

    // ── Hilfsfunktionen ──────────────────────────────────────────────────────
    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function markQ(text, q) {
      if (!q) return esc(text);
      const out = []; let rem = text; const ql = q.toLowerCase();
      while (rem.length) {
        const i = rem.toLowerCase().indexOf(ql);
        if (i < 0) { out.push(esc(rem)); break; }
        out.push(esc(rem.slice(0, i)));
        out.push('<mark class="hb-hl">' + esc(rem.slice(i, i + q.length)) + '</mark>');
        rem = rem.slice(i + q.length);
      }
      return out.join('');
    }

    // ── Inhalt (rechte Spalte) rendern ───────────────────────────────────────
    function renderContent(q) {
      let html = '', seenTitle = false;
      HANDBUCH_PAGES.forEach((page, pi) => {
        page.forEach((item, ii) => {
          const id = `hb-${pi}-${ii}`;
          if      (item.t === 'title' && !seenTitle) { html += `<h1 class="hbc-title">${esc(item.s)}</h1>`; seenTitle = true; }
          else if (item.t === 'sub'     && pi === 0)  { html += `<p class="hbc-sub">${esc(item.s)}</p>`; }
          else if (item.t === 'chapter')              { html += `<h2 class="hbc-chapter" id="${id}">${markQ(item.s, q)}</h2>`; }
          else if (item.t === 'heading')              { html += `<h3 class="hbc-heading" id="${id}">${markQ(item.s, q)}</h3>`; }
          else if (item.t === 'body')                 { html += `<p class="hbc-body">${markQ(item.s, q)}</p>`; }
          else if (item.t === 'gap')                  { html += `<div class="hbc-gap"></div>`; }
        });
      });
      document.getElementById('hbContent').innerHTML = html;
    }

    // ── Nav (linke Spalte) rendern ───────────────────────────────────────────
    function renderNav(q) {
      const nav = document.getElementById('hbNav');
      nav.innerHTML = '';
      let hits = 0;
      NAV.forEach(entry => {
        if (q && !entry.texts.some(t => t.includes(q.toLowerCase()))) return;
        hits++;
        const el = document.createElement('div');
        el.className = entry.type === 'chapter' ? 'hb-nav-ch' : 'hb-nav-hd';
        el.innerHTML = (q && entry.label.toLowerCase().includes(q.toLowerCase()))
          ? markQ(entry.label, q) : esc(entry.label);
        el.addEventListener('click', () => {
          document.querySelectorAll('.hb-nav-ch, .hb-nav-hd').forEach(n => n.classList.remove('hb-on'));
          el.classList.add('hb-on');
          const target = document.getElementById(entry.id);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        nav.appendChild(el);
      });
      const cnt = document.getElementById('hbSearchCount');
      cnt.textContent = q ? (hits ? `${hits} Treffer` : 'Keine Treffer') : '';
    }

    // ── Overlay öffnen / schließen ───────────────────────────────────────────
    let hbOnClose = null;
    function openHb(onClose) {
      hbOnClose = onClose || null;
      document.getElementById('hbSearchInput').value = '';
      document.getElementById('hbSearchCount').textContent = '';
      renderContent('');
      renderNav('');
      document.getElementById('hbOverlay').classList.add('hb-open');
      setTimeout(() => document.getElementById('hbSearchInput').focus(), 60);
    }
    function closeHb() {
      const ov = document.getElementById('hbOverlay');
      if (!ov.classList.contains('hb-open')) return;
      ov.classList.remove('hb-open');
      if (hbOnClose) { const cb = hbOnClose; hbOnClose = null; cb(); }
      else { screen = 'menu'; render(); }
    }
    window.openHandbuchOverlay  = openHb;
    window.closeHandbuchOverlay = closeHb;

    // ── Geschichte Overlay ────────────────────────────────────────────────────
    function renderGesch() {
      let html = '';
      GESCH_PAGES.forEach(page => {
        page.forEach(item => {
          if      (item.t === 'title')   html += `<h1 class="hbc-title">${esc(item.s)}</h1>`;
          else if (item.t === 'sub')     html += `<p class="hbc-sub">${esc(item.s)}</p>`;
          else if (item.t === 'chapter') html += `<h2 class="hbc-chapter">${esc(item.s)}</h2>`;
          else if (item.t === 'heading') html += `<h3 class="hbc-heading">${esc(item.s)}</h3>`;
          else if (item.t === 'body')    html += `<p class="hbc-body">${esc(item.s)}</p>`;
          else if (item.t === 'quote')   html += `<p class="hbc-quote">${esc(item.s)}</p>`;
          else if (item.t === 'italic')  html += `<p class="hbc-italic">${esc(item.s)}</p>`;
          else if (item.t === 'bold')    html += `<p class="hbc-bold">${esc(item.s)}</p>`;
          else if (item.t === 'gap')     html += `<div class="hbc-gap"></div>`;
        });
      });
      document.getElementById('geschContent').innerHTML = html;
    }
    function openGesch() {
      renderGesch();
      document.getElementById('geschContent').scrollTop = 0;
      document.getElementById('geschOverlay').classList.add('gesch-open');
    }
    function closeGesch() {
      const ov = document.getElementById('geschOverlay');
      if (!ov.classList.contains('gesch-open')) return;
      ov.classList.remove('gesch-open');
      screen = 'menu'; render();
    }
    window.openGeschOverlay  = openGesch;
    window.closeGeschOverlay = closeGesch;

    // ── Events ───────────────────────────────────────────────────────────────
    document.getElementById('hbSearchInput').addEventListener('input', function () {
      const q = this.value.trim();
      renderContent(q);
      renderNav(q);
    });
    document.getElementById('hbSearchInput').addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.stopPropagation(); closeHb(); }
    });
    document.getElementById('hbCloseBtn').addEventListener('click', closeHb);
    document.getElementById('geschCloseBtn').addEventListener('click', closeGesch);
    document.getElementById('charCloseBtn').addEventListener('click', () => {
      screen = 'menu'; render();
      document.getElementById('charCloseBtn').style.display = 'none';
    });
  })();
  </script>
</body>
</html>
