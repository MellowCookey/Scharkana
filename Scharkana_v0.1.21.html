<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scharkana – Das Erbe der Zeitenwächterin</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=exo-2:400,400i,700,700i,900,900i&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #14161a;
      overflow: hidden;
      font-family: "Exo 2",sans-serif;
      color: #ccc;
    }
    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      background: #1c2028;
    }
  </style>
</head>
<body>
  <canvas id="board"></canvas>

  <script>
    const canvas = document.getElementById('board');
    const ctx    = canvas.getContext('2d');
    let SIZE = 42;   // Hex-Größe (dynamisch per Mausrad oder fitAll)
    let panX = 0, panY = 0;       // Kamera-Versatz in Pixeln

    // ── Kamera auf Zentrum zurücksetzen ─────────────────────────────────────
    function autoBauZoom() {
      panX = 0; panY = 0;
    }


    // ── Spielzustand ────────────────────────────────────────────────────────
    const DIRS = [
      { dq:  0, dr: -1 }, // 1 – oben-links
      { dq:  1, dr: -1 }, // 2 – oben-rechts
      { dq:  1, dr:  0 }, // 3 – rechts
      { dq:  0, dr:  1 }, // 4 – unten-rechts
      { dq: -1, dr:  1 }, // 5 – unten-links
      { dq: -1, dr:  0 }, // 6 – links
    ];

    const hexMap = new Map();
    hexMap.set('0,0', 'start');

    let blockFlash    = null;
    let sealAnimation = null;
    let sealRingMap   = new Map(); // key → Ring-Nummer (für Opazitätsverlauf)
    let gamePhase     = 'bauphase'; // 'bauphase' | 'spielphase'
    let moveAnim      = null;       // { fromX,fromY,toX,toY,ghostFn,startTime }
    let moveAnimRafId = null;

    // ── Spielphase: Einheitenzustand ─────────────────────────────────────────
    let spielUnits        = []; // { q, r, type:'S'|'W', ownerIdx }
    let spielSelectedIdx  = null;
    let spielReachable    = new Map();
    let spielCampMenuOpen = false;
    let spielShopButtons  = [];
    let spielObjPositions = [];
    let spielActionBtns   = [];
    let spielPlayGrid     = null; // Set gültiger Hex-Keys
    let spielLog          = 'Klicke auf eine eigene Einheit oder das Lager (⌂).';
    let infoPanelBottom   = 54; // wird von drawPhaseInfoPanel aktualisiert
    let regelHinweisPopup = null; // { lines: string[], btnRect: {x,y,w,h} }
    let inGameMenuOpen    = false;
    let inGameMenuPage    = 1;
    let spielHistory      = [];
    let spielBuildings    = []; // { q, r, type:'mine'|'well', ownerIdx, stack (mine), adjBQ, adjBR }
    let spielBuildingMode = null; // null | { type:'mine'|'well', unitQ, unitR, candidates:[{q,r}] }
    let spielTurnKills     = []; // getötete Einheiten diese Runde: ['S'|'W']
    let droppedGems        = []; // { q, r } – auf dem Boden liegende Edelsteine
    let phaseTransition    = null; // { startTime } – Übergang Bau→Spiel
    let phase1Toast        = null; // { gold, trank, startTime } – kurze Einblendung nach Phase 1
    let victoryWinnerIdx   = null; // Index des Gewinners, null wenn kein Sieg
    let victoryFadeStart   = null; // performance.now() beim Start des Fade-Effekts
    let victoryFadeRafId   = null; // requestAnimationFrame-ID für Fade
    let spielRecoveryPanel = null; // null | { wKills, sKills, goldEarned } — Phase 4
    let spielPhase1Result  = null; // { gold, trank, unitCount }
    let spielPhase2Result  = [];   // [{ icon, label }]
    let spielPhase3StartGold  = 0;
    let spielPhase3StartTrank = 0;
    let spielPhase3Log     = [];   // [{ label, goldDelta }] — Käufe & Bauten
    let spielPhaseStep     = 3;    // 1=Versorgung, 2=Abbau, 3=Hauptphase, 4=Beutephase
    let spielResourcePopup = null; // null | { lines, timeout, interval, startTime }
    let mineInfoPopup      = null; // null | { stack: string[] }
    let spielRunde         = 1;    // Rundenanzahl (zählt jedes Mal wenn Spieler 1 dran ist)
    let bauHoverQ          = null; // Hover-Hex in der Bauphase
    let bauHoverR          = null;
    let transitionMPs      = [];   // MP-Startwerte für Übergangsbildschirm
    let brBtnHover         = false;
    let saveBtnHover       = false;
    let cardAnim           = null; // { startTime, duration, prevOrder } – Karten-Übergangsanimation
    let phase3TimeoutId    = null; // Timeout-ID für automatisches Überspringen der Beutephase

    // ── Spielstatistik-Tracking ──────────────────────────────────────────────
    let _trackGameStart = null; // { ms, dateStr }
    let _trackTurnLog   = [];   // abgeschlossene Zug-Datensätze
    let _trackTurn      = null; // laufender Zug



    // ── Phase 2: Abbauphase ───────────────────────────────────────────────────
    function runPhase2(pIdx) {
      const p = players[pIdx];
      spielPhase2Result = [];
      for (const b of spielBuildings) {
        // Jede Mine/Brunnen wird geprüft – unabhängig vom Erbauer
        const schls = spielUnits.filter(u => u.q === b.q && u.r === b.r && u.ownerIdx === pIdx && u.type === 'S');
        // Priorität: Schleicher mit Edelstein zuerst
        const schlGem = schls.find(u => u.hasGem);
        const schl = schlGem || schls[0] || null;
        if (b.type === 'well') {
          if (schl) {
            if (schl.hasGem) {
              schl.hasGem = false;
              p.machtsteine += 5;  // Edelstein am Brunnen (Phase 1) → +5 MP, ändere 5 für anderen Wert
              spielPhase2Result.push({ icon: '◎', label: '+5 Machtpunkte (Edelstein)' });
            } else {
              p.nachtrank++;
              spielPhase2Result.push({ icon: '◎', label: '+1 Trank (Brunnen)' });
            }
          }
        }
        if (b.type === 'mine') {
          if (schls.length > 0) {
            const top = b.stack[0];
            if (top === 'G') {
              // Jeder Schleicher (auch mit Edelstein) kann Gold abbauen
              p.gold++;
              b.stack.shift();
              b.stack.push('G');
              spielPhase2Result.push({ icon: '⛏', label: '+1 Gold (Mine)' });
            } else if (top === 'E') {
              // Nur ein Schleicher ohne Edelstein kann ihn aufnehmen
              const schlNoGem = schls.find(u => !u.hasGem);
              if (schlNoGem) {
                schlNoGem.hasGem = true;
                b.stack = makeMineStack();
                spielPhase2Result.push({ icon: '⛏', label: 'Edelstein abgebaut!' });
              }
              // Nur gem-tragende Schleicher vorhanden → kein Abbau
            }
          }
        }
      }
      checkEliminations();
      if (_trackTurn) {
        for (const r of spielPhase2Result) {
          if (r.label.includes('Machtpunkte')) _trackTurn.mp_brunnen += 5;
          else if (r.label.includes('Edelstein')) _trackTurn.abbau_edelsteine++;
          else if (r.label.includes('Gold'))  _trackTurn.abbau_gold++;
          else if (r.label.includes('Trank')) _trackTurn.abbau_traenke++;
        }
      }
      return spielPhase2Result.map(r => r.label).join(' · ');
    }

    // ── Phase 1: Versorgungsphase ─────────────────────────────────────────────
    function runPhase1(pIdx) {
      const p = players[pIdx];
      const unitCount = spielUnits.filter(u => u.ownerIdx === pIdx).length;
      let g, t;
      // ── Einkommen pro Runde ──────────────────────────────────────────────────
      // Ändere die Zahlen rechts, um Gold/Tränke pro Runde anzupassen.
      // Ändere die Schwellenwerte (<=3, <=5), um die Einheitenanzahl-Grenzen zu verschieben.
      if      (unitCount <= 3) { g = 3; t = 3; }  // 1–3 Einheiten  → +3 Gold, +3 Tränke
      else if (unitCount <= 5) { g = 2; t = 2; }  // 4–5 Einheiten  → +2 Gold, +2 Tränke
      else                     { g = 1; t = 1; }  // 6+  Einheiten  → +1 Gold, +1 Trank
      _trackTurn = {
        runde: spielRunde, spielerNr: pIdx + 1,
        charakter: CHARACTERS[p.charIdx].name,
        mp_start: p.machtsteine,
        gold_start: p.gold, traenke_start: p.nachtrank,
        einheiten_start: unitCount,
        einkommen_gold: g, einkommen_traenke: t,
        abbau_gold: 0, abbau_traenke: 0, abbau_edelsteine: 0, mp_brunnen: 0,
        beute_gold: 0, waechter_kills: 0, schleicher_kills: 0,
        mp_ende: null, gold_ende: null, traenke_ende: null, einheiten_ende: null,
        zugdauer_sek: 0, turnStartMs: Date.now(),
      };
      p.gold      += g;
      p.nachtrank += t;
      spielPhase1Result = { gold: g, trank: t, unitCount };
      phase1Toast = { gold: g, trank: t, startTime: performance.now() };
      // Phase 1 automatisch nach 1.5s weiterschalten
      setTimeout(() => {
        phase1Toast = null;
        confirmPhaseStep();
        render();
      }, 1500);
      return `+${g} Gold, +${t} Trank`;
    }

    // ── Phase 4: Erholungsphase auslösen (nach Zug beenden) ──────────────────
    function triggerPhase4() {
      const wKills     = spielTurnKills.filter(t => t === 'W').length;
      const sKills     = spielTurnKills.filter(t => t === 'S').length;
      const goldEarned = wKills * 2 + sKills * 1;
      players[currentPlayerIdx].gold += goldEarned;
      spielRecoveryPanel = { wKills, sKills, goldEarned };
      spielPhaseStep     = 4;
      spielSelectedIdx   = null; spielReachable = new Map(); spielCampMenuOpen = false;
      // Phase 3 automatisch nach 3 Sekunden überspringen
      if (phase3TimeoutId) clearTimeout(phase3TimeoutId);
      phase3TimeoutId = setTimeout(() => {
        phase3TimeoutId = null;
        advanceToNextPlayerAnimated();
        render();
      }, 3000);
    }

    // ── Spieler eliminieren ───────────────────────────────────────────────────
    function eliminatePlayer(idx) {
      players[idx].eliminated = true;
      // Alle Einheiten entfernen, Edelsteine fallen lassen
      spielUnits = spielUnits.filter(u => {
        if (u.ownerIdx === idx) {
          if (u.type === 'S' && u.hasGem) droppedGems.push({ q: u.q, r: u.r });
          return false;
        }
        return true;
      });
      // Spielauswahl zurücksetzen falls nötig
      if (spielSelectedIdx !== null) { spielSelectedIdx = null; spielReachable = new Map(); }
      spielLog = `Spieler ${idx + 1} hat 0 Machtpunkte – ausgeschieden!`;
    }

    // Prüfe nach jeder Machtsteine-Änderung ob ein Spieler eliminiert wird
    function checkEliminations() {
      players.forEach((p, i) => {
        if (!p.eliminated && p.machtsteine <= 0) eliminatePlayer(i);
      });
      // Siegbedingung: 30 Machtpunkte → ändere 30, um das Siegziel anzupassen
      for (let i = 0; i < players.length; i++) {
        if (!players[i].eliminated && players[i].machtsteine >= 30) {
          triggerVictory(i); return;
        }
      }
      // Siegbedingung: letzter Überlebender
      const alive = players.filter(p => !p.eliminated);
      if (alive.length === 1) {
        triggerVictory(players.indexOf(alive[0]));
      }
    }

    function triggerVictory(winnerIdx) {
      if (victoryWinnerIdx !== null) return; // bereits ausgelöst
      victoryWinnerIdx = winnerIdx;
      spielPhaseStep   = 99;
      // Laufenden Zug noch sichern (endet durch Sieg/Elimination ohne advanceToNextPlayer)
      if (_trackTurn) {
        const _vp = players[currentPlayerIdx];
        _trackTurn.mp_ende        = _vp.machtsteine;
        _trackTurn.gold_ende      = _vp.gold;
        _trackTurn.traenke_ende   = _vp.nachtrank;
        _trackTurn.einheiten_ende = spielUnits.filter(u => u.ownerIdx === currentPlayerIdx).length;
        _trackTurn.zugdauer_sek   = Math.round((Date.now() - _trackTurn.turnStartMs) / 1000);
        _trackTurnLog.push(Object.assign({}, _trackTurn));
        _trackTurn = null;
      }
      _prepareGameStats(winnerIdx);
      spielLog = `🏆 ${CHARACTERS[players[winnerIdx].charIdx].name} hat gewonnen!`;
      victoryFadeStart = performance.now();
      const _allPlayerIdxs = players.map(p => p.charIdx).join(',');
      function fadeTick() {
        render();
        const elapsed = performance.now() - victoryFadeStart;
        if (elapsed < 5000) {
          victoryFadeRafId = requestAnimationFrame(fadeTick);
        } else {
          victoryFadeRafId = null;
          victoryFadeStart = null;
          window.location.href = `portal_cutscene.html?charIdx=${players[winnerIdx].charIdx}&players=${_allPlayerIdxs}`;
        }
      }
      victoryFadeRafId = requestAnimationFrame(fadeTick);
    }

    function _prepareGameStats(winnerIdx) {
      if (!_trackGameStart) return;
      const winner  = players[winnerIdx];
      const dauer   = Math.round((Date.now() - _trackGameStart.ms) / 1000);
      const siegbed = winner.machtsteine >= 30 ? '30_MP' : 'letzter_ueberlebender';
      const gameId  = _trackGameStart.dateStr.replace(/[:.]/g, '-').slice(0, 19);

      const cols = [
        'spiel_id','datum','version','anzahl_spieler','sieger_charakter',
        'siegbedingung','spieldauer_sek',
        'runde','spieler_nr','charakter',
        'mp_start','mp_ende','gold_start','gold_ende',
        'traenke_start','traenke_ende','einheiten_start','einheiten_ende',
        'einkommen_gold','einkommen_traenke',
        'abbau_gold','abbau_traenke','abbau_edelsteine','mp_brunnen',
        'beute_gold','waechter_kills','schleicher_kills','zugdauer_sek'
      ];

      const rows = _trackTurnLog.map(t => [
        gameId, _trackGameStart.dateStr, '0.1.21', players.length,
        CHARACTERS[winner.charIdx].name, siegbed, dauer,
        t.runde, t.spielerNr, t.charakter,
        t.mp_start, t.mp_ende ?? '', t.gold_start, t.gold_ende ?? '',
        t.traenke_start, t.traenke_ende ?? '',
        t.einheiten_start, t.einheiten_ende ?? '',
        t.einkommen_gold, t.einkommen_traenke,
        t.abbau_gold, t.abbau_traenke, t.abbau_edelsteine, t.mp_brunnen,
        t.beute_gold, t.waechter_kills, t.schleicher_kills, t.zugdauer_sek
      ]);

      const csvStr = [cols.join(','), ...rows.map(r => r.join(','))].join('\n');
      const lastRunde = _trackTurnLog.length > 0 ? _trackTurnLog[_trackTurnLog.length - 1].runde : '?';
      const summary = `🏆 Sieger: **${CHARACTERS[winner.charIdx].name}** · ${siegbed.replace('_', ' ')} · ` +
        `${Math.floor(dauer / 60)}m ${dauer % 60}s · ${players.length} Spieler · Runde ${lastRunde}`;

      try {
        localStorage.setItem('scharkana_stats', JSON.stringify({ csvStr, summary, gameId }));
      } catch (_e) { /* localStorage nicht verfügbar */ }
    }

    // ── Zum nächsten Spieler wechseln (nach Phase 4 Bestätigung) ─────────────
    function advanceToNextPlayer() {
      if (_trackTurn) {
        const _p  = players[currentPlayerIdx];
        const _rp = spielRecoveryPanel;
        _trackTurn.mp_ende        = _p.machtsteine;
        _trackTurn.gold_ende      = _p.gold;
        _trackTurn.traenke_ende   = _p.nachtrank;
        _trackTurn.einheiten_ende = spielUnits.filter(u => u.ownerIdx === currentPlayerIdx).length;
        if (_rp) {
          _trackTurn.beute_gold      = _rp.goldEarned;
          _trackTurn.waechter_kills  = _rp.wKills;
          _trackTurn.schleicher_kills = _rp.sKills;
        }
        _trackTurn.zugdauer_sek = Math.round((Date.now() - _trackTurn.turnStartMs) / 1000);
        _trackTurnLog.push(Object.assign({}, _trackTurn));
        _trackTurn = null;
      }
      spielRecoveryPanel = null;
      if (spielResourcePopup) {
        clearTimeout(spielResourcePopup.timeout);
        clearInterval(spielResourcePopup.interval);
        spielResourcePopup = null;
      }
      spielTurnKills     = [];
      spielPhase3Log     = [];
      spielPhase2Result  = [];
      spielPhaseStep     = 1;
      if (phase3TimeoutId) { clearTimeout(phase3TimeoutId); phase3TimeoutId = null; }
      // Nächsten nicht-eliminierten Spieler finden
      let next = (currentPlayerIdx + 1) % players.length;
      let guard = 0;
      while (players[next].eliminated && guard < players.length) {
        next = (next + 1) % players.length;
        guard++;
      }
      if (next <= currentPlayerIdx) spielRunde++;
      currentPlayerIdx   = next;
      spielSelectedIdx   = null;
      spielReachable     = new Map();
      spielCampMenuOpen  = false;
      spielBuildingMode  = null;

      // ── Neutrale Einheiten am Zentrum (0,0) aktualisieren ───────────────────
      {
        // 1. Falls alle Neutralen tot: Spielereinheiten im Zentrum entfernen
        const neutralAtCenter = spielUnits.filter(u => u.ownerIdx === -1 && u.q === 0 && u.r === 0);
        if (neutralAtCenter.length === 0) {
          spielUnits = spielUnits.filter(u => !(u.q === 0 && u.r === 0 && u.ownerIdx !== -1));
        }

        // 2. Regeneration oder neuer Wächter hinzufügen
        const neutralCenter = spielUnits.map((u, i) => ({ u, i }))
          .filter(({ u }) => u.ownerIdx === -1 && u.q === 0 && u.r === 0);
        const nW = neutralCenter.filter(({ u }) => u.type === 'W').length;
        const sEntry = neutralCenter.find(({ u }) => u.type === 'S');
        if (sEntry) {
          // Neutraler Schleicher regeneriert zu Wächter – kein zusätzlicher W diese Runde
          spielUnits[sEntry.i].type = 'W';
        } else if (nW < 3) {
          // Neuen Wächter hinzufügen
          spielUnits.push({ q: 0, r: 0, type: 'W', ownerIdx: -1 });
        }
      }

      runPhase1(currentPlayerIdx);
      spielLog = `Spieler ${currentPlayerIdx + 1} – Phase 1: Versorgung.`;
    }

    // ── Karten-Reihenfolge: aktiver Spieler zuerst ──────────────────────────
    function spielCardOrder() {
      const n = players.length;
      return Array.from({ length: n }, (_, i) => (currentPlayerIdx + i) % n);
    }

    // ── Animierter Spielerwechsel ────────────────────────────────────────────
    function advanceToNextPlayerAnimated() {
      if (phase3TimeoutId) { clearTimeout(phase3TimeoutId); phase3TimeoutId = null; }
      if (cardAnim) { advanceToNextPlayer(); render(); return; } // bereits animiert
      const prevOrder = spielCardOrder();
      cardAnim = { startTime: performance.now(), duration: 700, prevOrder };
      function tick() {
        const elapsed = performance.now() - cardAnim.startTime;
        if (elapsed >= cardAnim.duration) {
          cardAnim = null;
          advanceToNextPlayer();
          render();
          return;
        }
        render();
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function confirmPhaseStep() {
      if (spielPhaseStep === 1) {
        runPhase2(currentPlayerIdx);
        spielPhaseStep        = 3;
        spielPhase3StartGold  = players[currentPlayerIdx].gold;
        spielPhase3StartTrank = players[currentPlayerIdx].nachtrank;
        spielLog = `Hauptphase. Spieler ${currentPlayerIdx + 1} ist dran.`;
      }
    }

    function saveSpielState() {
      spielHistory.push({
        spielUnits:     spielUnits.map(u => ({ ...u })),
        spielBuildings: spielBuildings.map(b => ({ ...b, stack: b.stack ? [...b.stack] : undefined })),
        players:        players.map(p => ({ ...p })),
        currentPlayerIdx,
        spielTurnKills:  [...spielTurnKills],
        droppedGems:     droppedGems.map(g => ({ ...g })),
        spielPhase3Log:  spielPhase3Log.map(e => ({ ...e })),
      });
    }

    function undoSpielAction() {
      if (spielHistory.length === 0) {
        spielLog = 'Keine weitere Aktion rückgängig zu machen.';
        render(); return;
      }
      const state = spielHistory.pop();
      spielUnits       = state.spielUnits;
      spielBuildings   = state.spielBuildings;
      players          = state.players;
      currentPlayerIdx = state.currentPlayerIdx;
      spielTurnKills   = state.spielTurnKills;
      droppedGems      = state.droppedGems;
      spielPhase3Log   = state.spielPhase3Log;
      spielSelectedIdx = null; spielReachable = new Map(); spielCampMenuOpen = false; spielBuildingMode = null;
      spielLog = `Rückgängig gemacht. (${spielHistory.length} Schritte verbleibend)`;
      render();
    }

    const key = (q, r) => `${q},${r}`;

    // ── Spielstand-Encoding V2 (kompakt, Base91) ─────────────────────────────
    // 91 sichere druckbare ASCII-Zeichen – kein ", kein \, kein '
    const _V2A = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!#$%&()*+,-./:;<=>?@[]^_{|}~`';
    // 91² = 8281 > 8192 = 2¹³  →  2 Zeichen kodieren exakt 13 Bits

    // Alle spielbaren Hexfelder (Radius 10) in fester Reihenfolge – 331 Felder
    const _V2G = (() => {
      const R = 10, h = [];
      for (let q = -R; q <= R; q++)
        for (let r = Math.max(-R, -q - R); r <= Math.min(R, -q + R); r++)
          h.push([q, r]);
      return h;
    })();
    const _V2O = 10; // Koordinaten-Offset: -10..+10 → 0..20 (5 Bit)

    // ── Bit-Writer ───────────────────────────────────────────────────────────
    class _Bw {
      constructor() { this.d = []; this.b = 0; this.n = 0; }
      w(v, bits) {
        for (let i = bits - 1; i >= 0; i--) {
          this.b = (this.b << 1) | ((v >>> i) & 1);
          if (++this.n === 8) { this.d.push(this.b); this.b = 0; this.n = 0; }
        }
      }
      done() { if (this.n) this.d.push(this.b << (8 - this.n)); return new Uint8Array(this.d); }
    }

    // ── Bit-Reader ───────────────────────────────────────────────────────────
    class _Br {
      constructor(bytes) { this.b = bytes; this.bi = 0; this.li = 7; }
      r(n) {
        let v = 0;
        for (let i = 0; i < n; i++) {
          if (this.bi >= this.b.length) throw new Error('Code zu kurz');
          v = (v << 1) | ((this.b[this.bi] >>> this.li) & 1);
          if (--this.li < 0) { this.bi++; this.li = 7; }
        }
        return v;
      }
    }

    // ── Base91-Konvertierung (13 Bits ↔ 2 Zeichen) ───────────────────────────
    function _v2enc(bytes) {
      const A = _V2A; let out = '', buf = 0, len = 0;
      for (const b of bytes) {
        buf = (buf << 8) | b; len += 8;
        if (len >= 13) { len -= 13; const v = (buf >>> len) & 0x1FFF; out += A[v / 91 | 0] + A[v % 91]; }
      }
      if (len > 0) { const v = (buf & ((1 << len) - 1)) << (13 - len); out += A[v / 91 | 0] + A[v % 91]; }
      return out;
    }
    function _v2dec(str) {
      const A = _V2A, M = {};

    function initGame() {
      // Aufbauzüge pro Spieler: Basiswert + Spieleranzahl → ändere 8, um mehr/weniger Erkundung zu geben

    function hexDistance(q1, r1, q2, r2) {
      const dq = q1 - q2, dr = r1 - r2;
      return (Math.abs(dq) + Math.abs(dr) + Math.abs(dq + dr)) / 2;
    }

    function bfsPlayDist(startQ, startR, targetQ, targetR, grid) {
      const startK = `${startQ},${startR}`;
      const targetK = `${targetQ},${targetR}`;
      if (!grid.has(startK) || !grid.has(targetK)) return Infinity;
      const visited = new Map([[startK, 0]]);
      const queue = [{ q: startQ, r: startR, d: 0 }];
      while (queue.length) {
        const { q, r, d } = queue.shift();
        if (q === targetQ && r === targetR) return d;
        for (const { dq, dr } of DIRS) {
          const nq = q + dq, nr = r + dr, nk = `${nq},${nr}`;
          if (grid.has(nk) && !visited.has(nk)) {
            visited.set(nk, d + 1);
            queue.push({ q: nq, r: nr, d: d + 1 });
          }
        }
      }
      return Infinity;
    }

    // ── Bauphase: Abstandsregel-Helfer ──────────────────────────────────────
    function bauBfsDist(aq, ar, bq, br) {
      // BFS-Distanz über erkundete (start/visited) Felder; beide Endpunkte immer passierbar
      const ak = `${aq},${ar}`, bk = `${bq},${br}`;
      if (ak === bk) return 0;
      const passable = k => k === ak || k === bk || hexMap.get(k) === 'start' || hexMap.get(k) === 'visited';
      if (!passable(bk)) return Infinity;
      const vis = new Set([ak]);
      const queue = [{ q: aq, r: ar, d: 0 }];
      while (queue.length) {
        const { q, r, d } = queue.shift();
        for (const { dq, dr } of DIRS) {
          const nq2 = q + dq, nr2 = r + dr, nk = `${nq2},${nr2}`;
          if (passable(nk) && !vis.has(nk)) {
            if (nq2 === bq && nr2 === br) return d + 1;
            vis.add(nk);
            queue.push({ q: nq2, r: nr2, d: d + 1 });
          }
        }
      }
      return Infinity;
    }

    // Gibt 'blocked', 'warn' oder 'ok' zurück für ein Kandidatenfeld (nq,nr)
    // movesOverride erlaubt es, den Check für einen zukünftigen Zugzustand zu simulieren
    // Verwendet hexAxialDist (direkte Gitterdistanz), damit auch unbesuchte Felder korrekt bewertet werden
    function bauDistanzStatus(nq, nr, movesOverride) {
      const cp = curPlayer();
      const m = movesOverride !== undefined ? movesOverride : cp.moves;
      if (m > 2) return 'ok';
      const minDist = m === 2 ? 2 : 3;
      let closest = Infinity;
      for (let i = 0; i < players.length; i++) {
        if (i === currentPlayerIdx) continue;
        // BFS-Distanz: schwarze (blocked) Felder gelten als Barriere
        const d = bauBfsDist(nq, nr, players[i].q, players[i].r);
        if (d < closest) closest = d;
      }
      if (closest < minDist) return 'blocked';
      if (m <= 1 && closest === minDist) return 'warn';
      return 'ok';
    }

    // Fallback: true wenn ALLE begehbaren Nachbarfelder durch die Abstandsregel gesperrt sind
    function bauAllNeighborsBlocked(movesOverride) {
      const cp = curPlayer();
      const m = movesOverride !== undefined ? movesOverride : cp.moves;
      if (m > 2) return false;
      return DIRS.every(({ dq, dr }) => {
        const nq = cp.q + dq, nr = cp.r + dr;
        const nk = `${nq},${nr}`;
        const typ = hexMap.get(nk);
        if (typ === 'blocked' || typ === 'sealed') return true;
        if (isBlockedByPlayer(nq, nr)) return true;
        return bauDistanzStatus(nq, nr, m) === 'blocked';
      });
    }

    // Direkte Hex-Gitterdistanz (axiale Koordinaten, unabhängig von besuchten Feldern)
    function hexAxialDist(q1, r1, q2, r2) {
      return (Math.abs(q1 - q2) + Math.abs(r1 - r2) + Math.abs((q1 + r1) - (q2 + r2))) / 2;
    }

    // ── Bewegungsanimation ───────────────────────────────────────────────────
    function startMoveAnim(fromQ, fromR, toQ, toR, ghostFn) {
      if (moveAnimRafId) { cancelAnimationFrame(moveAnimRafId); moveAnimRafId = null; }
      const { x: fromX, y: fromY } = hexToPixel(fromQ, fromR);
      const { x: toX,   y: toY   } = hexToPixel(toQ,   toR);
      moveAnim = { fromX, fromY, toX, toY, ghostFn, startTime: performance.now() };
      function loop() {
        render();
        const elapsed = performance.now() - moveAnim.startTime;
        if (elapsed < 3000) {
          moveAnimRafId = requestAnimationFrame(loop);
        } else {
          moveAnim = null;
          moveAnimRafId = null;
          render();
        }
      }
      moveAnimRafId = requestAnimationFrame(loop);
    }

    function drawMoveAnim() {
      if (!moveAnim) return;
      const { fromX, fromY, toX, toY, ghostFn, startTime } = moveAnim;
      const elapsed = (performance.now() - startTime) / 1000; // Sekunden

      // Weg-Linie (gestrichelt, immer sichtbar während Animation)
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth   = 5;
      ctx.lineCap     = 'round';
      ctx.setLineDash([10, 7]);
      ctx.lineDashOffset = -elapsed * 18; // bewegt sich entlang der Linie
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      if (elapsed < 1.0) {
        // Phase 1: Linie erscheint – Geist noch voll sichtbar am alten Feld
        ctx.save();
        ctx.globalAlpha = 1;
        ghostFn(fromX, fromY);
        ctx.restore();
      } else if (elapsed < 2.0) {
        // Phase 2: Geist verblasst am alten Feld
        const alpha = 1 - (elapsed - 1.0);
        ctx.save();
        ctx.globalAlpha = alpha;
        ghostFn(fromX, fromY);
        ctx.restore();
      } else {
        // Phase 3: Leuchteffekt am neuen Feld verblasst
        const alpha = 1 - (elapsed - 2.0);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = 'rgba(255,255,255,0.45)';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur  = 22;
        ctx.beginPath();
        ctx.arc(toX, toY, SIZE * 0.45, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // true wenn der aktuelle Spieler zu nah an mindestens einem anderen Spieler ist
    function bauZuNahFuerSkip(minDist) {
      const cp = curPlayer();
      return players.some((p, i) =>
        i !== currentPlayerIdx && bauBfsDist(cp.q, cp.r, p.q, p.r) < minDist
      );
    }

    // ── Übergangsanimation Aufbauphase → Spielphase ──────────────────────────
    function drawPhaseTransitionScreen(t) {
      // t: 0..1
      // 0.00–0.18 : Einblenden
      // 0.18–0.82 : Inhalt sichtbar
      // 0.82–1.00 : Ausblenden
      const overlayAlpha = t < 0.18 ? t / 0.18
                         : t < 0.82 ? 1
                         : 1 - (t - 0.82) / 0.18;
      ctx.fillStyle = `rgba(0,0,0,${overlayAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (overlayAlpha < 0.5) return;

      const contentAlpha = t < 0.18 ? 0
                         : t < 0.28 ? (t - 0.18) / 0.10
                         : t < 0.74 ? 1
                         : 1 - (t - 0.74) / 0.08;
      if (contentAlpha <= 0) return;

      ctx.save();
      ctx.globalAlpha = contentAlpha;
      const cx = canvas.width / 2, cy = canvas.height / 2;

      // Charakterkarten – Größe vorab berechnen für vertikale Zentrierung
      const n = players.length;
      const gap = 14;
      const cardW = Math.min(188, (canvas.width * 0.90 - gap * (n - 1)) / n);
      const cardH = cardW * 1.62;
      const imgH  = cardH * 0.55;
      const totalW = n * cardW + (n - 1) * gap;
      const startX = cx - totalW / 2;
      const headerH = 112; // Höhe des Titelbereichs oberhalb der Karten
      const cardY   = Math.max(headerH + 10, Math.round((canvas.height - cardH - headerH) / 2) + headerH);
      const blockTop = cardY - headerH;

      // Titel
      ctx.fillStyle = '#ffffff'; ctx.font = 'bold 46px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = '#9b5de5'; ctx.shadowBlur = 30;
      ctx.fillText('Spielphase beginnt', cx, blockTop + 30);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#9b9bcc'; ctx.font = 'italic 17px "Exo 2",sans-serif';
      ctx.fillText('Die Lager sind errichtet – der Kampf beginnt', cx, blockTop + 72);

      // Dekorationslinie
      const lw = Math.min(700, canvas.width * 0.72);
      const lg = ctx.createLinearGradient(cx - lw/2, 0, cx + lw/2, 0);
      lg.addColorStop(0, 'transparent'); lg.addColorStop(0.5, '#9b5de5'); lg.addColorStop(1, 'transparent');
      ctx.strokeStyle = lg; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx - lw/2, blockTop + 94); ctx.lineTo(cx + lw/2, blockTop + 94); ctx.stroke();

      players.forEach((p, i) => {
        const ch    = CHARACTERS[p.charIdx];
        const img   = charImages[p.charIdx];
        const mp    = transitionMPs[i] ?? 0;
        const mpCol = mp >= 5 ? '#44dd88' : mp >= 4 ? '#ffcc00' : mp >= 2 ? '#ff9900' : '#ff4444';
        const cardX = startX + i * (cardW + gap);
        const cardCX = cardX + cardW / 2;

        // Karten-Hintergrund
        const bgGrad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
        bgGrad.addColorStop(0, ch.colorDark); bgGrad.addColorStop(1, '#06060e');
        ctx.fillStyle = bgGrad; ctx.strokeStyle = ch.color; ctx.lineWidth = 1.5;
        ctx.shadowColor = ch.color; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 8); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        // Portrait (geclippt)
        ctx.save();
        ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, imgH, [8, 8, 0, 0]); ctx.clip();
        if (img.complete && img.naturalWidth > 0) {
          const ia = img.naturalWidth / img.naturalHeight;
          const ca = cardW / imgH;
          let dw, dh, dx, dy;
          if (ia > ca) { dh = imgH; dw = dh * ia; dx = cardX + (cardW - dw) / 2; dy = cardY; }
          else          { dw = cardW; dh = dw / ia; dx = cardX; dy = cardY; }
          ctx.drawImage(img, dx, dy, dw, dh);
          const fGrad = ctx.createLinearGradient(0, cardY + imgH * 0.55, 0, cardY + imgH);
          fGrad.addColorStop(0, 'rgba(0,0,0,0)'); fGrad.addColorStop(1, '#06060e');
          ctx.fillStyle = fGrad; ctx.fillRect(cardX, cardY, cardW, imgH);
        } else {
          ctx.fillStyle = ch.colorDark; ctx.fillRect(cardX, cardY, cardW, imgH);
        }
        ctx.restore();

        // Spieler-Label
        const fs = Math.max(10, Math.round(cardW * 0.075));
        ctx.fillStyle = ch.colorLight; ctx.font = `bold ${fs}px "Exo 2",sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(`Spieler ${i + 1}`, cardCX, cardY + imgH + 7);

        // Charaktername
        ctx.fillStyle = '#e8e8ff'; ctx.font = `bold ${Math.max(11, Math.round(cardW * 0.085))}px "Exo 2",sans-serif`;
        ctx.fillText(ch.name, cardCX, cardY + imgH + 7 + fs + 4);

        // MP-Badge
        const badgeW = cardW * 0.68, badgeH = 26;
        const badgeX = cardCX - badgeW / 2;
        const badgeY = cardY + cardH - badgeH - 10;
        ctx.fillStyle = mpCol + '2a'; ctx.strokeStyle = mpCol; ctx.lineWidth = 1.5;
        ctx.shadowColor = mpCol; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 5); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = mpCol; ctx.font = `bold ${Math.max(11, Math.round(cardW * 0.075))}px "Exo 2",sans-serif`;
        ctx.textBaseline = 'middle';

    function runPhaseTransition(onDone) {
      const DURATION = 4200;
      phaseTransition = { startTime: performance.now(), onDone };
      let spielStarted = false;
      function tick(now) {
        const t = Math.min(1, (now - phaseTransition.startTime) / DURATION);
        render();
        drawPhaseTransitionScreen(t);
        if (!spielStarted && t >= 0.5) {
          spielStarted = true;
          onDone(); // Spielphase im Hintergrund starten wenn Bild schwarz ist
        }
        if (t < 1) requestAnimationFrame(tick);
        else phaseTransition = null;
      }
      requestAnimationFrame(tick);
    }

    function startSpielphase() {
      gamePhase        = 'spielphase';
      currentPlayerIdx = 0;
      panX = 0; panY = 0;
      spielUnits       = [];
      // Alle nicht-versiegelten Felder als gültiges Bewegungsfeld
      spielPlayGrid = new Set([...hexMap.keys()].filter(k => hexMap.get(k) !== 'sealed' && hexMap.get(k) !== 'blocked'));
      players.forEach((p, i) => {
        const dist    = bfsPlayDist(p.q, p.r, 0, 0, spielPlayGrid);
        // Start-Machtpunkte: 1 MP pro Feld Abstand vom Zentrum, maximal 5
        // Ändere Math.min(5, ...) → z.B. Math.min(3, ...) für weniger Startpunkte
        p.machtsteine = Math.min(5, dist === Infinity ? 0 : dist);
        p.gold        = 0;  // Start-Gold → ändere 0, um mit mehr Gold zu beginnen
        p.nachtrank   = 0;  // Start-Tränke → ändere 0, um mit mehr Tränken zu beginnen
        p.campQ       = p.q;
        p.campR       = p.r;
        // Starteinheit: jeder Spieler beginnt mit 1 Schattenwächter ('W') am Lager
        // Ändere 'W' auf 'S' für einen Nebelschleicher als Starteinheit
        spielUnits.push({ q: p.campQ, r: p.campR, type: 'W', ownerIdx: i });
      });
      // Zentrum startet leer – neutrale Wächter erscheinen schrittweise
      spielBuildings        = [];
      spielHistory          = [];
      spielBuildingMode     = null;
      spielTurnKills        = [];

    function startGeschichteAnim() {
      if (geschichteAnimId) cancelAnimationFrame(geschichteAnimId);
      geschichteProgress = 0;
      const start = performance.now();
      const SPEED = 8; // Zeilen pro Sekunde
      function step(now) {
        geschichteProgress = (now - start) / 1000 * SPEED;
        render();
        if (geschichteProgress < geschichteTotal + 2) {
          geschichteAnimId = requestAnimationFrame(step);
        } else {
          geschichteProgress = geschichteTotal + 2;
          geschichteAnimId   = null;
          render();
        }
      }
      geschichteAnimId = requestAnimationFrame(step);
    }

    // ── Hilfsfunktionen ──────────────────────────────────────────────────────
    function hexToPixel(q, r) {
      return {
        x: canvas.width  / 2 + panX + SIZE * (Math.sqrt(3) * q + Math.sqrt(3) / 2 * r),
        y: canvas.height / 2 + panY + SIZE * (1.5 * r),
      };
    }

    function hexDist(q, r) {
      return (Math.abs(q) + Math.abs(r) + Math.abs(q + r)) / 2;
    }

    function pixelToHex(px, py) {
      const cx = canvas.width / 2 + panX, cy = canvas.height / 2 + panY;
      const r_f = (py - cy) / (SIZE * 1.5);
      const q_f = (px - cx) / (SIZE * Math.sqrt(3)) - r_f / 2;
      let q = Math.round(q_f), r = Math.round(r_f);
      const s_f = -q_f - r_f, s = Math.round(s_f);
      const dq = Math.abs(q - q_f), dr = Math.abs(r - r_f), ds = Math.abs(s - s_f);
      if (dq > dr && dq > ds) q = -r - s;
      else if (dr > ds) r = -q - s;
      return { q, r };
    }

    function drawHex(cx, cy, fill, stroke) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a  = Math.PI / 3 * i - Math.PI / 6;
        const px = cx + (SIZE - 2) * Math.cos(a);
        const py = cy + (SIZE - 2) * Math.sin(a);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle   = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth   = 1.5;
      ctx.stroke();
    }

    function drawSpriteOnBoard(cx, cy, charIdx, scale) {
      const sc = spriteCanvases[charIdx];
      const ch = CHARACTERS[charIdx];
      const targetH = SIZE * 1.6 * scale;
      const sdW     = sc.width / sc.height * targetH;
      const sdH     = targetH;
      const bottomY = cy + SIZE * 0.44 * scale;
      const sdX     = cx - sdW / 2;
      const sdY     = bottomY - sdH;
      ctx.save();
      // Farbiger Schatten-Kreis (zeigt Spielerfarbe)
      ctx.fillStyle = ch.color + '55';
      ctx.beginPath();
      ctx.ellipse(cx, bottomY, sdW * 0.40, SIZE * 0.09 * scale, 0, 0, Math.PI * 2);
      ctx.fill();
      // Sprite mit leichtem Farb-Glow
      ctx.shadowColor = ch.color;
      ctx.shadowBlur  = 5 * scale;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(sc, sdX, sdY, sdW, sdH);
      ctx.restore();
    }

    function drawFigure(cx, cy, color = '#ffffff', scale = 1) {
      const s = SIZE * 0.18 * scale;
      ctx.save();
      ctx.fillStyle   = color;
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.arc(cx, cy - s * 4.2, s * 1.3, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - s * 1.5, cy - s * 2.6);
      ctx.lineTo(cx + s * 1.5, cy - s * 2.6);
      ctx.lineTo(cx + s * 1.0, cy + s * 0.2);
      ctx.lineTo(cx - s * 1.0, cy + s * 0.2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.9, cy + s * 0.2);
      ctx.lineTo(cx - s * 1.4, cy + s * 2.8);
      ctx.lineTo(cx - s * 0.2, cy + s * 2.8);
      ctx.lineTo(cx - s * 0.1, cy + s * 0.2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + s * 0.1, cy + s * 0.2);
      ctx.lineTo(cx + s * 0.2, cy + s * 2.8);
      ctx.lineTo(cx + s * 1.4, cy + s * 2.8);
      ctx.lineTo(cx + s * 0.9, cy + s * 0.2);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    }

    function drawTent(cx, cy, color, scale = 1) {
      const s = SIZE * 0.19 * scale;
      ctx.save();
      // Zelt-Körper (Dreieck)
      const lighter = color + 'dd';
      ctx.fillStyle   = color;
      ctx.strokeStyle = 'rgba(0,0,0,0.45)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(cx,           cy - s * 2.4); // Spitze
      ctx.lineTo(cx - s * 2.0, cy + s * 0.9); // links unten
      ctx.lineTo(cx + s * 2.0, cy + s * 0.9); // rechts unten
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Eingang (dunkles Dreieck)
      ctx.fillStyle = 'rgba(0,0,0,0.50)';
      ctx.beginPath();
      ctx.moveTo(cx,           cy - s * 0.4);
      ctx.lineTo(cx - s * 0.7, cy + s * 0.9);
      ctx.lineTo(cx + s * 0.7, cy + s * 0.9);
      ctx.closePath(); ctx.fill();
      // Bodenlinie
      ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - s * 2.2, cy + s * 0.9);
      ctx.lineTo(cx + s * 2.2, cy + s * 0.9);
      ctx.stroke();
      // Mast + Wimpel
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, cy - s * 2.4); ctx.lineTo(cx, cy - s * 3.2); ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx,           cy - s * 3.2);
      ctx.lineTo(cx + s * 0.9, cy - s * 2.85);
      ctx.lineTo(cx,           cy - s * 2.5);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // ── Spiellogik ───────────────────────────────────────────────────────────
    function checkEnclosed() {
      let minQ = Infinity, maxQ = -Infinity, minR = Infinity, maxR = -Infinity;
      for (const [k] of hexMap) {
        const [q, r] = k.split(',').map(Number);
        minQ = Math.min(minQ, q); maxQ = Math.max(maxQ, q);
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
      }
      minQ -= 2; maxQ += 2; minR -= 2; maxR += 2;

      const seen = new Set();

      function floodGroup(sq, sr) {
        const sk = key(sq, sr);
        if (hexMap.has(sk) || seen.has(sk)) return null;
        const group = [];
        const queue = [[sq, sr]];
        const inQueue = new Set([sk]);
        let open = false;
        while (queue.length > 0) {
          const [q, r] = queue.shift();
          group.push(key(q, r));
          seen.add(key(q, r));
          for (const { dq, dr } of DIRS) {
            const nq = q + dq, nr = r + dr;
            const nk = key(nq, nr);
            if (hexMap.has(nk) || inQueue.has(nk)) continue;
            if (nq < minQ || nq > maxQ || nr < minR || nr > maxR) { open = true; continue; }
            inQueue.add(nk);
            queue.push([nq, nr]);
          }
        }
        return open ? null : group;
      }

      for (const [k] of [...hexMap]) {
        const [q, r] = k.split(',').map(Number);
        for (const { dq, dr } of DIRS) {
          const nq = q + dq, nr = r + dr;
          if (hexMap.has(key(nq, nr)) || seen.has(key(nq, nr))) continue;
          const group = floodGroup(nq, nr);
          if (group) for (const gk of group) hexMap.set(gk, 'blocked');
        }
      }
    }

    function sealBoard() {
      const SEAL_RINGS = 40;
      const seen = new Set([...hexMap.keys()]);
      const frontier = [];

      // BFS: 10 Ringe nach außen – jeder Ring bekommt seine eigene Verzögerung
      let currentRing = [];
      for (const [k] of hexMap) {
        const [q, r] = k.split(',').map(Number);
        currentRing.push({ q, r });
      }
      for (let ring = 1; ring <= SEAL_RINGS; ring++) {
        const nextRing = [];
        for (const { q, r } of currentRing) {
          for (const { dq, dr } of DIRS) {
            const nq = q + dq, nr = r + dr;
            const nk = key(nq, nr);
            if (!seen.has(nk)) {
              seen.add(nk);
              nextRing.push({ q: nq, r: nr });
              frontier.push({ q: nq, r: nr, ring });
            }
          }
        }
        currentRing = nextRing;
      }

      // Alle Ringe gleichzeitig pro Ring einblenden (Ring 1 zuerst, Ring 10 zuletzt)
      sealAnimation = frontier.map(h => ({ ...h, alpha: 0, delay: (h.ring - 1) * 130 }));
      const startTime = performance.now();
      const FADE_DURATION = 350;
      function animate(now) {
        let allDone = true;
        for (const h of sealAnimation) {
          const elapsed = now - startTime - h.delay;
          if (elapsed < 0) { allDone = false; continue; }
          h.alpha = Math.min(1, elapsed / FADE_DURATION);
          if (h.alpha < 1) allDone = false;
          if (h.alpha >= 1 && !hexMap.has(key(h.q, h.r))) {
            hexMap.set(key(h.q, h.r), 'sealed');
            sealRingMap.set(key(h.q, h.r), h.ring);
          }
        }
        render();
        if (!allDone) requestAnimationFrame(animate);
        else {
          sealAnimation = null;
          const preGrid = new Set([...hexMap.keys()].filter(k => hexMap.get(k) !== 'sealed' && hexMap.get(k) !== 'blocked'));
          transitionMPs = players.map(p => { const d = bfsPlayDist(p.q, p.r, 0, 0, preGrid); return Math.min(5, d === Infinity ? 0 : d); });
          runPhaseTransition(startSpielphase);
        }
      }
      requestAnimationFrame(animate);
    }

    function flashBlocked(q, r) {
      let count = 0;
      blockFlash = { q, r, visible: true };
      render();
      const iv = setInterval(() => {
        count++;
        blockFlash.visible = !blockFlash.visible;
        render();
        if (count >= 4) { clearInterval(iv); blockFlash = null; render(); }
      }, 220);
    }

    // ── Popup ────────────────────────────────────────────────────────────────
    function showPopup(message) {
      popup = { message, alpha: 0, scale: 0.3, phase: 'in', startTime: performance.now() };
      const IN_DUR   = 350;
      const HOLD_DUR = 5000;
      const OUT_DUR  = 350;

      function animatePopup(now) {
        const elapsed = now - popup.startTime;
        if (popup.phase === 'in') {
          const t = Math.min(1, elapsed / IN_DUR);
          popup.alpha = t;
          popup.scale = 0.3 + 0.7 * t;
          if (t >= 1) { popup.phase = 'hold'; popup.startTime = now; }
        } else if (popup.phase === 'hold') {
          popup.alpha = 1; popup.scale = 1;
          if (elapsed >= HOLD_DUR) { popup.phase = 'out'; popup.startTime = now; }
        } else {
          const t = Math.min(1, elapsed / OUT_DUR);
          popup.alpha = 1 - t;
          if (t >= 1) { popup = null; render(); return; }
        }
        render();
        requestAnimationFrame(animatePopup);
      }
      requestAnimationFrame(animatePopup);
    }

    function drawPopup() {
      if (!popup) return;
      const w   = 420, h = 160;
      const cx  = canvas.width  / 2;
      const cy  = canvas.height / 2;

      ctx.save();
      ctx.globalAlpha = popup.alpha;
      ctx.translate(cx, cy);
      ctx.scale(popup.scale, popup.scale);
      ctx.translate(-cx, -cy);

      // Schatten
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur  = 30;

      // Box
      ctx.fillStyle   = 'rgba(12,12,32,0.96)';
      ctx.strokeStyle = '#9b5de5';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.roundRect(cx - w / 2, cy - h / 2, w, h, 10);
      ctx.fill();
      ctx.stroke();

      ctx.shadowBlur = 0;

      // Titel
      ctx.fillStyle    = '#a0c4ff';

    // ── Geschichte zeichnen ──────────────────────────────────────────────────
    function drawGeschichte() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      bg.addColorStop(0, '#0c1020'); bg.addColorStop(1, '#040408');

      const BW = 900, BH = 880;

      ctx.fillStyle = dg; ctx.fillRect(BX+1, BY+1, BW-2, 2);

          case 'sub':     font='13px "Exo 2",sans-serif';                color='#6688aa'; lineH=28; center=true;  lines=[item.s]; break;
          case 'chapter': font='bold 14px "Exo 2",sans-serif';           color='#3a9de5'; lineH=30; lines=[item.s]; break;
          case 'heading': font='bold italic 19px "Exo 2",sans-serif'; color='#90c8e8'; lineH=26; lines=wrapText(item.s,TW,font); break;

    // ── Charaktere zeichnen ──────────────────────────────────────────────────
    function drawCharaktere() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const bg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, 900);
      bg.addColorStop(0, '#100820'); bg.addColorStop(1, '#040408');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

      const BW = 1680, BH = 920;
      const BX = (canvas.width - BW) / 2, BY = (canvas.height - BH) / 2;

      // Haupt-Box
      ctx.fillStyle = 'rgba(6,4,16,0.97)';
      ctx.strokeStyle = '#6a3a9a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(BX, BY, BW, BH, 12); ctx.fill(); ctx.stroke();
      const dg = ctx.createLinearGradient(BX, 0, BX+BW, 0);
      dg.addColorStop(0,'transparent'); dg.addColorStop(.5,'#9b5de5'); dg.addColorStop(1,'transparent');
      ctx.fillStyle = dg; ctx.fillRect(BX+1, BY+1, BW-2, 2);

      // Titel
      ctx.save();
      ctx.fillStyle = '#d8c8ff'; ctx.font = 'bold 26px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.shadowColor = '#9b5de5'; ctx.shadowBlur = 16;
      ctx.fillText('Charaktere', canvas.width / 2, BY + 20);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#5a4890'; ctx.font = '13px "Exo 2",sans-serif';
      ctx.fillText('Scharkana – Erbe der Zeitenwächterin  ·  Sechs Schicksale, eine Welt', canvas.width / 2, BY + 56);
      ctx.restore();

      // Raster 2×3
      const PAD  = 28;
      const TITLEH = 80;
      const GAP  = 14;
      const COLS = 2, ROWS = 3;
      const gridW  = BW - PAD * 2;
      const gridH  = BH - TITLEH - PAD;
      const cardW  = (gridW - GAP) / COLS;          // ≈ 807
      const cardH  = (gridH - GAP * 2) / ROWS;      // ≈ 269
      const gridX  = BX + PAD;
      const gridY  = BY + TITLEH;

      const IMG_SIZE = Math.min(cardH - 24, 118);

      CHARACTERS.forEach((ch, i) => {
        const col  = i % 2;
        const row  = Math.floor(i / 2);
        const cx   = gridX + col * (cardW + GAP);
        const cy   = gridY + row * (cardH + GAP);

        // Karten-Hintergrund
        ctx.save();
        ctx.fillStyle = 'rgba(14,8,30,0.92)';
        ctx.strokeStyle = ch.color + '55';
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 8);
        ctx.fill(); ctx.stroke();
        ctx.restore();

        // Farbstreifen oben (Charakter-Farbe)
        const accentG = ctx.createLinearGradient(cx, 0, cx + cardW * 0.6, 0);
        accentG.addColorStop(0, ch.color);
        accentG.addColorStop(1, 'transparent');
        ctx.fillStyle = accentG;
        ctx.fillRect(cx + 1, cy + 1, cardW - 2, 3);

        // Profilbild
        const imgX = cx + 14;
        const imgY = cy + (cardH - IMG_SIZE) / 2;
        const img  = charImages[i];
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(imgX, imgY, IMG_SIZE, IMG_SIZE, 6);
        ctx.clip();
        if (img && img.complete && img.naturalWidth > 0) {
          // Contain: proportional skalieren, in Box zentrieren
          const iw = img.naturalWidth, ih = img.naturalHeight;
          const scale = Math.min(IMG_SIZE / iw, IMG_SIZE / ih);
          const dw = iw * scale, dh = ih * scale;
          const dx = imgX + (IMG_SIZE - dw) / 2, dy = imgY + (IMG_SIZE - dh) / 2;
          ctx.drawImage(img, dx, dy, dw, dh);
        } else {
          ctx.fillStyle = ch.colorDark;
          ctx.fillRect(imgX, imgY, IMG_SIZE, IMG_SIZE);
          ctx.fillStyle = ch.colorLight;
          ctx.font = `bold ${Math.round(IMG_SIZE * 0.45)}px "Exo 2",sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(ch.name[0], imgX + IMG_SIZE / 2, imgY + IMG_SIZE / 2);
        }
        ctx.restore();
        // Bild-Rahmen
        ctx.save();
        ctx.strokeStyle = ch.colorLight + '99';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(imgX, imgY, IMG_SIZE, IMG_SIZE, 6); ctx.stroke();
        ctx.restore();

        // Textbereich
        const TX = imgX + IMG_SIZE + 14;
        const TW = cardW - IMG_SIZE - 42;
        let ty = cy + 13;

        // Nummer + Name
        ctx.save();
        ctx.fillStyle = ch.colorLight;
        ctx.font = 'bold italic 19px "Exo 2",sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.shadowColor = ch.color; ctx.shadowBlur = 10;
        ctx.fillText(`${i + 1}.  ${ch.name}`, TX, ty);
        ctx.shadowBlur = 0;
        ty += 24;

        // Rasse · Element
        ctx.fillStyle = '#c8c0e0';
        ctx.font = 'bold 13px "Exo 2",sans-serif';
        ctx.fillText(`${ch.race}  ·  ${ch.element}`, TX, ty);
        ty += 19;

        // Herkunft
        ctx.fillStyle = '#9890b8';
        ctx.font = 'italic 13px "Exo 2",sans-serif';
        ctx.fillText(ch.origin, TX, ty);
        ty += 18;

        // Trenner
        ctx.fillStyle = ch.color + '66';
        ctx.fillRect(TX, ty + 3, TW * 0.65, 1);
        ty += 13;
        ctx.restore();

        // Beschreibungstext (aus CHAR_DESCS)
        const desc = CHAR_DESCS[i] || '';
        ctx.save();
        ctx.fillStyle = '#c0b8d4';
        ctx.font = '14px "Exo 2",sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        const descLines = wrapText(desc, TW, '14px "Exo 2",sans-serif');
        const maxDescLines = 4;
        for (let l = 0; l < Math.min(descLines.length, maxDescLines); l++) {
          ctx.fillText(descLines[l], TX, ty);
          ty += 18;
        }
        ctx.restore();

        // Zitat (unten in der Karte)
        const quoteLines = wrapText(`„${ch.quote}"`, TW, 'italic 13px "Exo 2",sans-serif');
        const quoteH = quoteLines.length * 17;
        let qy = cy + cardH - 13 - quoteH;
        ctx.save();
        ctx.fillStyle = ch.colorLight;
        ctx.font = 'italic 13px "Exo 2",sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        for (const ql of quoteLines) {
          ctx.fillText(ql, TX, qy);
          qy += 17;
        }
        ctx.restore();
      });

      // Hinweis unten
      ctx.save();
      ctx.fillStyle = '#8899bb'; ctx.font = '13px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText('[ Esc ]  Zurück', canvas.width / 2, BY + BH - 10);
      ctx.restore();
    }

    // ── Menü Hex-Hintergrund-Animation ──────────────────────────────────────
    function initMenuHex() {
      const HS = 42;
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;
      const hexW = Math.sqrt(3) * HS;
      const rowH = HS * 1.5;
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      menuHexData = [];
      const rows = Math.ceil(h / rowH) + 3;
      const cols = Math.ceil(w / hexW) + 3;
      for (let r = -rows; r <= rows; r++) {
        for (let q = -cols; q <= cols; q++) {
          const px = cx + hexW * q + (r & 1) * hexW / 2;
          const py = cy + rowH * r;
          if (px < -HS * 2 || px > w + HS * 2 || py < -HS * 2 || py > h + HS * 2) continue;
          const dx = px - cx, dy = py - cy;
          const nd = Math.min(1, Math.sqrt(dx * dx + dy * dy) / (maxDist * 0.88));
          // Äußere Hexe erscheinen früh (nd≈1 → activationT≈0), innere zuletzt (nd≈0 → activationT≈0.78)
          const jitter = (Math.random() - 0.5) * 0.18;
          const activationT = Math.max(0, Math.min(0.8, (1 - nd) * 0.78 + jitter));
          // Alpha: außen dunkel, innen heller
          const fillAlpha = 0.22 + nd * 0.65;
          menuHexData.push({ px, py, nd, activationT, fillAlpha, HS });
        }
      }
    }

    function startMenuAnim() {
      if (!menuHexData) initMenuHex();
      const CYCLE = 13000;
      const t0 = performance.now() - menuAnimP * CYCLE;
      function step(now) {
        if (screen !== 'menu') { menuAnimId = null; return; }
        menuAnimP = ((now - t0) / CYCLE) % 1;
        render();
        menuAnimId = requestAnimationFrame(step);
      }
      menuAnimId = requestAnimationFrame(step);
    }

    // ── Menü zeichnen ────────────────────────────────────────────────────────
    function drawMenu() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;

      // Hintergrund-Gradient
      const grad = ctx.createRadialGradient(cx, cy, 100, cx, cy, 700);
      grad.addColorStop(0, '#1e1040');
      grad.addColorStop(1, '#0a0a1a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // ── Hex-Schatten-Animation ─────────────────────────────────────────────
      if (menuHexData) {
        const SPREAD_END = 0.78;
        const FADE_START = 0.87;
        for (const h of menuHexData) {
          if (menuAnimP < h.activationT) continue;
          const fadeIn  = Math.min(1, (menuAnimP - h.activationT) / 0.045);
          const fadeOut = menuAnimP > FADE_START
            ? Math.max(0, 1 - (menuAnimP - FADE_START) / (1 - FADE_START))
            : 1;
          const alpha = h.fillAlpha * fadeIn * fadeOut;
          if (alpha <= 0.01) continue;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a  = Math.PI / 3 * i - Math.PI / 6;
            const hx = h.px + (h.HS - 1.5) * Math.cos(a);
            const hy = h.py + (h.HS - 1.5) * Math.sin(a);
            i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
          }
          ctx.closePath();
          // Farbe: außen fast schwarz, innen dunkelviolett
          const l = Math.round(3 + h.nd * 9);
          ctx.fillStyle = `hsl(265, 45%, ${l}%)`;
          ctx.fill();
          ctx.strokeStyle = `rgba(110,55,200,${0.25 * h.nd})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
          ctx.restore();
        }
      }

      // Titel
      ctx.save();
      ctx.fillStyle    = '#dff0ff';
      ctx.font         = 'bold 44px "Exo 2",sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = '#6040c0';
      ctx.shadowBlur   = 28;
      ctx.fillText('Scharkana', cx, cy - 260);
      ctx.shadowBlur   = 0;
      ctx.fillStyle    = '#b8ccee';
      ctx.font         = 'italic 19px "Exo 2",sans-serif';
      ctx.fillText('Das Erbe der Zeitenwächterin', cx, cy - 210);
      ctx.restore();

      // Trennlinie
      ctx.save();
      ctx.strokeStyle = '#5a3a9a';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(cx - 200, cy - 178); ctx.lineTo(cx + 200, cy - 178);
      ctx.stroke();
      ctx.restore();

      // Menüpunkte
      const itemH    = 64;
      const startY   = cy - 120;

      MENU_ITEMS.forEach((label, i) => {
        const iy      = startY + i * itemH;
        const selected = i === menuIndex;

        if (selected) {
          // Auswahlbalken
          ctx.save();
          ctx.fillStyle   = 'rgba(90,50,180,0.35)';
          ctx.strokeStyle = '#7b4fd4';
          ctx.lineWidth   = 1;
          ctx.beginPath();
          ctx.roundRect(cx - 160, iy - 22, 320, 44, 6);
          ctx.fill();
          ctx.stroke();
          ctx.restore();

          // Pfeil links
          ctx.save();
          ctx.fillStyle    = '#a070ff';
          ctx.font         = '22px "Exo 2",sans-serif';
          ctx.textAlign    = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText('▶', cx - 170, iy);
          ctx.restore();
        }

        ctx.save();
        ctx.fillStyle    = selected ? '#f0e8ff' : '#a0b4cc';
        ctx.font         = selected ? 'bold italic 22px "Exo 2",sans-serif' : 'italic 20px "Exo 2",sans-serif';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';

    // ── Spielphase: Einheiten-Logik ──────────────────────────────────────────
    function getSpielUnitAt(q, r)    { return spielUnits.find(u => u.q === q && u.r === r) ?? null; }
    function getSpielUnitIdxAt(q, r) { return spielUnits.findIndex(u => u.q === q && u.r === r); }
    function getSpielBuildingAt(q, r){ return spielBuildings.find(b => b.q === q && b.r === r) ?? null; }

    function countSpielObjectsAt(q, r) {
      const hasCamp = players.some(p => p.campQ === q && p.campR === r) ? 1 : 0;
      return hasCamp + spielUnits.filter(u => u.q === q && u.r === r).length
                     + spielBuildings.filter(b => b.q === q && b.r === r).length;
    }

    function hasAdjacentBlocked(q, r) {
      return DIRS.some(({ dq, dr }) => hexMap.get(key(q + dq, r + dr)) === 'blocked');
    }
    function getAdjacentBlockedHex(q, r) {
      for (const { dq, dr } of DIRS) {
        const nq = q + dq, nr = r + dr;
        if (hexMap.get(key(nq, nr)) === 'blocked') return { q: nq, r: nr };
      }
      return null;
    }
    function hasAdjacentUnexplored(q, r) {
      return DIRS.some(({ dq, dr }) => {
        const t = hexMap.get(key(q + dq, r + dr));
        return !t || t === 'sealed';
      });
    }
    // Minenstapel: Reihenfolge von oben nach unten (G = Gold, E = Edelstein)
    // Ändere die Anzahl der 'G'-Einträge, um mehr/weniger Gold vor dem Edelstein zu haben
    // Beispiel: ['G','G','E'] → Edelstein erscheint nach 2 Abbaurunden statt 4
    function makeMineStack() { return ['G', 'G', 'G', 'G', 'E']; }

    // Prüft ob ein Nachbarfeld (Gebirge oder Rand) bereits von einer Mine/Brunnen belegt ist
    function isAdjFieldUsed(adjQ, adjR, buildingType) {
      return spielBuildings.some(b => b.type === buildingType && b.adjBQ === adjQ && b.adjBR === adjR);
    }

    function findSpielChain(unit, startQ, startR) {
      const chain = new Set(), q2 = [[startQ, startR]];
      chain.add(key(startQ, startR));
      while (q2.length) {
        const [cq, cr] = q2.shift();
        for (const { dq, dr } of DIRS) {
          const nq = cq + dq, nr = cr + dr, nk = key(nq, nr);
          if (nq === unit.q && nr === unit.r) continue;
          if (!spielPlayGrid.has(nk) || chain.has(nk)) continue;
          const occ = getSpielUnitAt(nq, nr);
          if (occ && occ.ownerIdx === unit.ownerIdx) { chain.add(nk); q2.push([nq, nr]); }
        }
      }
      return chain;
    }

    function computeSpielReachable(unit, budget) {
      const dist  = new Map();
      dist.set(key(unit.q, unit.r), 0);
      const queue = [{ q: unit.q, r: unit.r, cost: 0 }];
      while (queue.length) {
        const { q, r, cost } = queue.shift();
        if (cost >= budget) continue;
        const seenChains = new Set();
        for (const { dq, dr } of DIRS) {
          const nq = q + dq, nr = r + dr, nk = key(nq, nr);
          if (!spielPlayGrid.has(nk)) continue;
          const occ = getSpielUnitAt(nq, nr);
          if (occ === null) {
            const c = cost + 1;
            if (c <= budget && (!dist.has(nk) || dist.get(nk) > c)) { dist.set(nk, c); queue.push({ q: nq, r: nr, cost: c }); }
          } else if (occ.ownerIdx === unit.ownerIdx) {
            // Kette bereits von diesem Knoten aus verarbeitet → überspringen
            if (seenChains.has(nk)) continue;
            const chain = findSpielChain(unit, nq, nr);
            for (const ck of chain) seenChains.add(ck);
            const c = cost + 1;
            if (c > budget) continue;
            // Alle Kettenfelder kosten gleich viel (1 Hop) – Kette = einzelner Sprung
            for (const ck of chain) {
              const [cq, cr] = ck.split(',').map(Number);
              // Im Kettenfeld landen, wenn Platz vorhanden
              if (countSpielObjectsAt(cq, cr) < 3) {
                if (!dist.has(ck) || dist.get(ck) > c) {
                  dist.set(ck, c);
                  queue.push({ q: cq, r: cr, cost: c });
                }
              }
              // Felder direkt hinter der Kette (außerhalb)
              for (const { dq: d2, dr: r2 } of DIRS) {
                const lq = cq + d2, lr = cr + r2, lk = key(lq, lr);
                if (!spielPlayGrid.has(lk) || lk === key(q, r) || chain.has(lk)) continue;
                const lOcc = getSpielUnitAt(lq, lr);
                if (lOcc && lOcc.ownerIdx === unit.ownerIdx) continue;
                if (!dist.has(lk) || dist.get(lk) > c) {
                  dist.set(lk, c);
                  if (!lOcc) queue.push({ q: lq, r: lr, cost: c });
                }
              }
            }
          } else {
            const c = cost + 1;
            if (c <= budget && (!dist.has(nk) || dist.get(nk) > c)) dist.set(nk, c);
          }
        }
      }
      dist.delete(key(unit.q, unit.r));
      return dist;
    }

    function resolveSpielCombat(attacker, defender) {
      // Einheitenstärke: Wächter (W) = 2, Schleicher (S) = 1
      // Ändere die 2er-Werte, um Wächter stärker/schwächer zu machen
      const atk = attacker.type === 'W' ? 2 : 1, def = defender.type === 'W' ? 2 : 1;  // Angriffskraft
      const aHp = attacker.type === 'W' ? 2 : 1, dHp = defender.type === 'W' ? 2 : 1;  // Lebenspunkte
      return {
        attackerSurvives:   aHp - def > 0,
        defenderSurvives:   dHp - atk > 0,
        attackerDowngraded: attacker.type === 'W' && aHp - def > 0,
        defenderDowngraded: defender.type === 'W' && dHp - atk > 0,
      };
    }

    // ── Spielphase: Layout-Helfer ─────────────────────────────────────────────
    function getOffsets(count) {
      if (count === 1) return [[0, 0]];
      if (count === 2) return [[-13, 0], [13, 0]];
      return [[0, -12], [-13, 10], [13, 10]];
    }
    function scaleFor(count) { return count === 1 ? 1.0 : count === 2 ? 0.68 : 0.58; }

    function drawSpielUnit(cx, cy, unit, selected, scale) {
      const isNeutral = unit.ownerIdx === -1;
      const ch = isNeutral ? { color: '#1a1a1a', colorLight: '#444444' } : CHARACTERS[players[unit.ownerIdx].charIdx];
      const r  = (unit.type === 'W' ? SIZE * 0.38 : SIZE * 0.28) * scale;
      ctx.save();
      if (selected) { ctx.shadowColor = '#ffff44'; ctx.shadowBlur = 16; }

      if (unit.type === 'W') {
        // Franzosenschild-Form
        const sw = r * 2, sh = r * 2.5;
        const sx = cx - sw / 2, sy = cy - sh / 2;
        const cr4 = sw * 0.12; // Eckabrundung oben
        ctx.beginPath();
        ctx.moveTo(sx + cr4, sy);
        ctx.lineTo(sx + sw - cr4, sy);
        ctx.quadraticCurveTo(sx + sw, sy, sx + sw, sy + cr4);
        ctx.lineTo(sx + sw, sy + sh * 0.55);
        ctx.quadraticCurveTo(sx + sw, sy + sh * 0.82, cx, sy + sh);
        ctx.quadraticCurveTo(sx, sy + sh * 0.82, sx, sy + sh * 0.55);
        ctx.lineTo(sx, sy + cr4);
        ctx.quadraticCurveTo(sx, sy, sx + cr4, sy);
        ctx.closePath();
        ctx.fillStyle   = ch.color;
        ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 2;
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        // Markierungsring wenn ausgewählt
        if (selected) {
          ctx.save();
          ctx.strokeStyle = '#ffff44'; ctx.lineWidth = 2.5;
          ctx.shadowColor = '#ffff44'; ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(sx + cr4 - 4, sy - 4);
          ctx.lineTo(sx + sw - cr4 + 4, sy - 4);
          ctx.quadraticCurveTo(sx + sw + 4, sy - 4, sx + sw + 4, sy + cr4);
          ctx.lineTo(sx + sw + 4, sy + sh * 0.55);
          ctx.quadraticCurveTo(sx + sw + 4, sy + sh * 0.82 + 4, cx, sy + sh + 5);
          ctx.quadraticCurveTo(sx - 4, sy + sh * 0.82 + 4, sx - 4, sy + sh * 0.55);
          ctx.lineTo(sx - 4, sy + cr4);
          ctx.quadraticCurveTo(sx - 4, sy - 4, sx + cr4 - 4, sy - 4);
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }
        // W-Label
        ctx.fillStyle    = '#ffffff';
        ctx.font         = `bold ${Math.round(13 * scale)}px "Exo 2",sans-serif`;
        ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('W', cx, cy - sh * 0.05);
      } else {
        // Schleicher: Kreis wie bisher
        ctx.fillStyle   = ch.colorLight;
        ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur  = 0;
        ctx.fillStyle    = '#ffffff';
        ctx.font         = `bold ${Math.round(11 * scale)}px "Exo 2",sans-serif`;
        ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('S', cx, cy);
        if (selected) {
          ctx.strokeStyle = '#ffff44'; ctx.lineWidth = 2.5;
          ctx.beginPath(); ctx.arc(cx, cy, r + 5 * scale, 0, Math.PI * 2); ctx.stroke();
        }
      }
      // Edelstein-Symbol oben
      if (unit.hasGem) {
        const gr = r * 0.38;
        const gx = cx, gy = cy - r - gr * 0.6;
        ctx.fillStyle = '#00ee66'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
        ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffffff'; ctx.font = `bold ${Math.round(gr * 1.3)}px "Exo 2",sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('◆', gx, gy);
      }
      ctx.restore();
    }

    function drawSpielBuilding(cx, cy, building, scale) {
      ctx.save();

        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    function drawMineStackOnHex(hx, hy, stack) {
      // Stack auf dem dunkelroten (Gebirge-)Feld — Index 0 oben, letzter Index unten
      const barW    = SIZE * 0.38, barH = SIZE * 0.11, gap = SIZE * 0.025;
      const topBarW = SIZE * 0.52, topBarH = SIZE * 0.16; // oberster Stein größer
      const totalH  = topBarH + (stack.length - 1) * (barH + gap) + (stack.length > 1 ? gap : 0);
      const topY    = hy - totalH / 2;
      ctx.save();
      stack.forEach((item, i) => {
        const isTop = i === 0;
        const w = isTop ? topBarW : barW;
        const h = isTop ? topBarH : barH;
        const by = isTop ? topY : topY + topBarH + gap + (i - 1) * (barH + gap);
        const bx = hx - w / 2;
        if (item === 'G') {
          ctx.fillStyle = '#ddaa22'; ctx.strokeStyle = '#ffee88';
        } else {
          ctx.fillStyle = '#00cc55'; ctx.strokeStyle = '#88ffaa';
        }
        ctx.lineWidth = isTop ? 1.5 : 0.8;
        if (isTop) {
          ctx.shadowColor = item === 'G' ? '#ffee88' : '#88ffaa';
          ctx.shadowBlur  = 4;
        }
        ctx.beginPath(); ctx.roundRect(bx, by, w, h, 2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
      });
      ctx.restore();
    }

    function drawMineInfoPopup() {
      if (!mineInfoPopup) return;
      const { stack, isPreview } = mineInfoPopup;
      const pw = 300, pad = 20;
      const itemH = 28, itemGap = 6;
      const stackH = stack.length * (itemH + itemGap) - itemGap;
      const ph = pad + 28 + 12 + stackH + 14 + 40 + pad;
      const px = canvas.width  / 2 - pw / 2;
      const py = canvas.height / 2 - ph / 2;

      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';

      // Panel
      ctx.fillStyle   = 'rgba(8,6,20,0.97)';
      ctx.strokeStyle = '#ffcc44'; ctx.lineWidth = 2;
      ctx.shadowColor = '#ffcc44'; ctx.shadowBlur = 20;
      ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 10); ctx.fill(); ctx.stroke();
      ctx.shadowBlur  = 0;

      // Titel
      ctx.fillStyle    = '#ffdd88';
      ctx.font         = 'bold 14px "Exo 2",sans-serif';
      ctx.textAlign    = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(isPreview ? '⛏  Mine – nach Abbau (Vorschau)' : '⛏  Mine – Abbaustapel', px + pw / 2, py + pad);

      // Trennlinie
      ctx.strokeStyle = '#ffcc4444'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px + pad, py + pad + 22);
      ctx.lineTo(px + pw - pad, py + pad + 22);
      ctx.stroke();

      // Stapel (oben = als nächstes abgebaut)
      let iy = py + pad + 34;
      stack.forEach((item, i) => {
        const isTop  = i === 0;
        const isGold = item === 'G';
        const iw = isTop ? pw - pad * 2 : pw - pad * 2 - 20;
        const ix = px + pad + (isTop ? 0 : 10);

        // Hintergrund
        ctx.fillStyle   = isGold ? (isTop ? '#ddaa22' : '#7a5c0e') : (isTop ? '#00cc55' : '#065c26');
        ctx.strokeStyle = isGold ? '#ffee88' : '#88ffaa';
        ctx.lineWidth   = isTop ? 1.8 : 0.8;
        if (isTop) { ctx.shadowColor = isGold ? '#ffee88' : '#88ffaa'; ctx.shadowBlur = 6; }
        ctx.beginPath(); ctx.roundRect(ix, iy, iw, itemH, 4); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        // Label
        const label  = isGold ? '⬡  Gold' : '◆  Edelstein';
        const suffix = isTop  ? '  ← nächstes' : (i === stack.length - 1 ? '  (unten)' : '');
        ctx.fillStyle    = isTop ? '#ffffff' : (isGold ? '#ccaa44' : '#66cc88');
        ctx.font         = isTop ? 'bold 12px "Exo 2",sans-serif' : '11px "Exo 2",sans-serif';
        ctx.textAlign    = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(label + suffix, ix + 10, iy + itemH / 2);

        // Position rechts
        ctx.fillStyle = isTop ? '#ffee88aa' : '#ffffff33';
        ctx.font      = '10px "Exo 2",sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`#${i + 1}`, ix + iw - 8, iy + itemH / 2);

        iy += itemH + itemGap;
      });

      // Erklärungstext
      ctx.fillStyle    = '#667788';
      ctx.font         = '10px "Exo 2",sans-serif';
      ctx.textAlign    = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('Nach dem Abbau rotiert der Stapel – Gold kehrt zurück.', px + pw / 2, iy + 6);
      ctx.fillText('Ein Edelstein setzt den Stapel komplett zurück.', px + pw / 2, iy + 19);

      // Schließen-Hinweis
      ctx.fillStyle = '#445566';
      ctx.font      = '10px "Exo 2",sans-serif';
      ctx.fillText('[Klick oder Esc] schließen', px + pw / 2, py + ph - pad + 2);

      ctx.restore();
    }

    function drawSpielActionPanel() {
