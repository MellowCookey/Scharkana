      const PRIGHT = canvas.width - 10;
      const BTN_Y  = 12, BTN_H = 32;
      const MB_W   = 130, MB_X = PRIGHT - MB_W;

      ctx.save();
      ctx.fillStyle   = inGameMenuOpen ? 'rgba(40,80,140,0.95)' : 'rgba(25,25,40,0.80)';
      ctx.strokeStyle = inGameMenuOpen ? '#6aaaff' : '#445588';
      ctx.lineWidth   = 1.5;
      ctx.beginPath(); ctx.roundRect(MB_X, BTN_Y, MB_W, BTN_H, 6); ctx.fill(); ctx.stroke();
      ctx.fillStyle    = inGameMenuOpen ? '#aaddff' : '#8899bb';
      ctx.font         = 'bold 12px "Exo 2",sans-serif';
      ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('📖  Spielanleitung', MB_X + MB_W / 2, BTN_Y + BTN_H / 2);
      ctx.restore();
      spielActionBtns.push({ x: MB_X, y: BTN_Y, w: MB_W, h: BTN_H, action: 'openInGameMenu' });

      // ── Rückgängig-Button über der Charakterkarte (unten links) ──────────
      {
        const UB_CARD_W = 250, UB_CARD_H = 248, UB_PEEK_H = 50;
        const UB_STACK_H = UB_CARD_H + Math.max(0, players.length - 1) * UB_PEEK_H;
        const UB_BASE_Y  = canvas.height - UB_STACK_H - 10;
        const UB_H       = 28, UB_GAP = 6;
        const UB_X       = 10, UB_Y = UB_BASE_Y - UB_H - UB_GAP, UB_W = UB_CARD_W;
        const hasHistory = spielHistory.length > 0;
        ctx.save();
        ctx.fillStyle   = hasHistory ? 'rgba(60,30,0,0.88)' : 'rgba(25,25,40,0.80)';
        ctx.strokeStyle = hasHistory ? '#ee8822' : '#445588';
        ctx.lineWidth   = 1.5;
        ctx.beginPath(); ctx.roundRect(UB_X, UB_Y, UB_W, UB_H, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle    = hasHistory ? '#ffbb55' : '#6677aa';
        ctx.font         = 'bold 12px "Exo 2",sans-serif';
        ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`↩ Rückgängig  [B]${hasHistory ? '  (' + spielHistory.length + ')' : ''}`, UB_X + UB_W / 2, UB_Y + UB_H / 2);
        ctx.restore();
        spielActionBtns.push({ x: UB_X, y: UB_Y, w: UB_W, h: UB_H, action: 'undo' });
      }

      // ── Aufteilen / Zusammenführen (nur wenn Einheit ausgewählt) ────────────
      if (spielSelectedIdx === null || spielSelectedIdx >= spielUnits.length) return;
      const su = spielUnits[spielSelectedIdx];
      if (su.ownerIdx !== currentPlayerIdx) return;

      const campOnField  = players.some(pp => pp.campQ === su.q && pp.campR === su.r);
      const unitsOnField = spielUnits.filter(u => u.q === su.q && u.r === su.r).length;
      const totalObjs    = (campOnField ? 1 : 0) + unitsOnField;

      // Aufteilen: W → 2×S, braucht 1 freien Slot (totalObjs + 1 ≤ 3)
      const canSplit = su.type === 'W' && totalObjs <= 2 && p.nachtrank >= 1;

      // Zusammenführen: 2 eigene S auf selb. Feld → W (gesperrt wenn Edelstein)
      const otherSIdx = su.type === 'S' && !su.hasGem
        ? spielUnits.findIndex((u, i) =>
            i !== spielSelectedIdx && u.type === 'S' && !u.hasGem &&
            u.ownerIdx === currentPlayerIdx && u.q === su.q && u.r === su.r)
        : -1;
      const canMerge = otherSIdx !== -1 && p.nachtrank >= 1;

      // ── Gebäudebau-Panel (nur für Schleicher) ──────────────────────────────
      // Gesamthöhe aller Panels vorberechnen → vertikal zentrieren (wie Shop-Panel)
      {
        const _G = 8;
        let _h = 0;
        if (su.type === 'S') {
          const _ownB    = spielBuildings.find(b => b.q === su.q && b.r === su.r && b.ownerIdx === currentPlayerIdx) ?? null;
          const _nRows   = 2 + (_ownB !== null ? 1 : 0);
          _h += 22 + _nRows * 40 + 8;
          if (getSpielBuildingAt(su.q, su.r)) _h += _G + 18 + 40 + 6;
        }
        if (canSplit || canMerge) {
          const _ac = (canSplit ? 1 : 0) + (canMerge ? 1 : 0);
          _h += (su.type === 'S' ? _G : 0) + 22 + _ac * 48 + 8;
        }
        var nextPanelTopY = Math.round(canvas.height / 2 + _h / 2);
      }
      if (su.type === 'S') {
        const ownBuildingHere = spielBuildings.find(b => b.q === su.q && b.r === su.r && b.ownerIdx === currentPlayerIdx) ?? null;
        const alreadyBuilding = getSpielBuildingAt(su.q, su.r) !== null;
        const fieldFull       = countSpielObjectsAt(su.q, su.r) >= 3;
        const adjBlockedFree  = DIRS.some(({dq,dr}) => hexMap.get(key(su.q+dq, su.r+dr)) === 'blocked' && !isAdjFieldUsed(su.q+dq, su.r+dr, 'mine'));
        const adjUnexplFree   = DIRS.some(({dq,dr}) => { const t = hexMap.get(key(su.q+dq, su.r+dr)); return (!t || t === 'sealed') && !isAdjFieldUsed(su.q+dq, su.r+dr, 'well'); });
        const adjBlocked  = hasAdjacentBlocked(su.q, su.r);
        const adjUnexpl   = hasAdjacentUnexplored(su.q, su.r);
        // Gebäudekosten → ändere p.gold >= 2 auf einen anderen Wert (und passe den Label-Text an)
        const canMine     = !alreadyBuilding && !fieldFull && adjBlockedFree && p.gold >= 2;  // Mine: 2 Gold
        const canWell     = !alreadyBuilding && !fieldFull && adjUnexplFree  && p.gold >= 2;  // Brunnen: 2 Gold
        const canSell     = ownBuildingHere !== null;
        const sellLabel   = ownBuildingHere ? (ownBuildingHere.type === 'mine' ? '⛏  Mine verkaufen  (+1 Gold)' : '◎  Brunnen verkaufen  (+1 Gold)') : '';
        const numRows     = 2 + (canSell ? 1 : 0);
        const bpw = 290, bph = 22 + numRows * (32 + 8) + 8;
        const bpx = canvas.width - bpw - 10;
        const bpy = nextPanelTopY - bph;
        nextPanelTopY = bpy;
        ctx.save();
        ctx.fillStyle   = 'rgba(6,10,24,0.94)';
        ctx.strokeStyle = '#aa8822'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(bpx, bpy, bpw, bph, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#ffdd88'; ctx.font = 'bold 11px "Exo 2",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('Gebäude bauen  (2 Gold)', bpx + bpw / 2, bpy + 7);
        const buildOpts = [
          { label: '⛏  Mine bauen', action: 'buildMine', ok: canMine, color: '#ffcc44',
            reason: fieldFull ? 'Feld voll (max. 3)' : alreadyBuilding ? 'Feld belegt' : !adjBlocked ? 'kein Gebirge' : !adjBlockedFree ? 'Gebirge belegt' : 'zu wenig Gold' },
          { label: '◎  Brunnen bauen', action: 'buildWell', ok: canWell, color: '#ffcc44',
            reason: fieldFull ? 'Feld voll (max. 3)' : alreadyBuilding ? 'Feld belegt' : !adjUnexpl ? 'kein Rand' : !adjUnexplFree ? 'Rand belegt' : 'zu wenig Gold' },
        ];
        if (canSell) buildOpts.push({ label: sellLabel, action: 'sellBuilding', ok: true, color: '#ff6644' });
        buildOpts.forEach((a, i) => {
          const bx = bpx + 12, by = bpy + 22 + i * 40, bw = bpw - 24, bh = 32;
          ctx.fillStyle   = a.ok ? (a.action === 'sellBuilding' ? 'rgba(120,40,20,0.35)' : 'rgba(180,130,20,0.22)') : 'rgba(50,50,50,0.22)';
          ctx.strokeStyle = a.ok ? a.color : '#444'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill(); ctx.stroke();
          ctx.fillStyle = a.ok ? (a.action === 'sellBuilding' ? '#ff9977' : '#ffee99') : '#666';
          ctx.font = '12px "Exo 2",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(a.label, bx + bw / 2, by + bh / 2 - (a.ok ? 0 : 7));
          if (!a.ok) {
            ctx.fillStyle = '#554433'; ctx.font = '12px "Exo 2",sans-serif';
            ctx.fillText(`[${a.reason}]`, bx + bw / 2, by + bh / 2 + 8);
          }
          if (a.ok) spielActionBtns.push({ x: bx, y: by, w: bw, h: bh, action: a.action });
        });
        ctx.restore();

        // ── Sonderaktion: Schleicher auf Gebäude ─────────────────────────────
        const bOnField = getSpielBuildingAt(su.q, su.r);
        if (bOnField) {
          const spw = bpw, spx = bpx;
          const specialOpts = [];
          if (bOnField.type === 'mine') {
            const top = bOnField.stack ? bOnField.stack[0] : 'G';
            const reward = top === 'G' ? '+1 Gold' : '+1 Edelstein';
            const ok = p.nachtrank >= 2;
            specialOpts.push({ label: `⛏ Sofortabbau  →  ${reward}`, detail: '−2 Tränke', action: 'instantMine', ok, reason: 'zu wenig Tränke' });
          } else if (bOnField.type === 'well') {
            const ok = p.nachtrank >= 2 && !!su.hasGem;
            specialOpts.push({ label: '◎ Edelstein sofort wandeln  →  +5 MP', detail: '−2 Tränke', action: 'instantWell', ok, reason: !su.hasGem ? 'kein Edelstein' : 'zu wenig Tränke' });
          }
          if (specialOpts.length > 0) {
            const sph = 18 + specialOpts.length * 40 + 6;
            const spy = nextPanelTopY - sph - 8;
            nextPanelTopY = spy;
            ctx.save();
            ctx.fillStyle   = 'rgba(6,12,28,0.94)';
            ctx.strokeStyle = '#3388aa'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(spx, spy, spw, sph, 6); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#66bbdd'; ctx.font = 'bold 11px "Exo 2",sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText('Sonderaktion  (2 Tränke)', spx + spw / 2, spy + 5);
            specialOpts.forEach((a, i) => {
              const bx = spx + 12, by = spy + 18 + i * 40, bw = spw - 24, bh = 32;
              ctx.fillStyle   = a.ok ? 'rgba(20,80,120,0.40)' : 'rgba(40,40,40,0.22)';
              ctx.strokeStyle = a.ok ? '#44aacc' : '#444'; ctx.lineWidth = 1;
              ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill(); ctx.stroke();
              ctx.fillStyle = a.ok ? '#88ddff' : '#666'; ctx.font = '12px "Exo 2",sans-serif';
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText(a.label, bx + bw / 2, by + bh / 2 - 7);
              ctx.fillStyle = a.ok ? '#4488aa' : '#554433'; ctx.font = '12px "Exo 2",sans-serif';
              ctx.fillText(a.ok ? a.detail : `[${a.reason}]`, bx + bw / 2, by + bh / 2 + 8);
              if (a.ok) spielActionBtns.push({ x: bx, y: by, w: bw, h: bh, action: a.action });
            });
            ctx.restore();
          }
        }
      }

      if (!canSplit && !canMerge) return;

      const actions = [];
      // Aufteilen/Zusammenführen kostet je 1 Trank → den Trank-Abzug findest du bei den 'split'/'merge'-Aktionen weiter unten
      if (canSplit) actions.push({ line1: 'Schattenwächter  →  2 × Nebelschleicher', line2: 'Kosten: 1 Trank', action: 'split' });
      if (canMerge) actions.push({ line1: '2 × Nebelschleicher  →  Schattenwächter', line2: 'Kosten: 1 Trank', action: 'merge', otherIdx: otherSIdx });

      const bh = 40, pw = 290, ph = 22 + actions.length * (bh + 8) + 8;
      const px = canvas.width - pw - 10;
      const py = su.type === 'S' ? nextPanelTopY - ph - 8 : nextPanelTopY - ph;

      ctx.save();
      ctx.fillStyle   = 'rgba(6,10,24,0.94)';
      ctx.strokeStyle = '#44ddcc'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 6); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#44ddcc'; ctx.font = 'bold 11px "Exo 2",sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('Einheitenaktion', px + pw / 2, py + 7);

      actions.forEach((a, i) => {
        const bx = px + 12, by = py + 22 + i * (bh + 8), bw = pw - 24;
        ctx.fillStyle   = 'rgba(50,180,160,0.22)';
        ctx.strokeStyle = '#44ddcc'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#aaddff'; ctx.font = '12px "Exo 2",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(a.line1, bx + bw / 2, by + bh / 2 - 8);
        ctx.fillStyle = '#669988'; ctx.font = '11px "Exo 2",sans-serif';
        ctx.fillText(a.line2, bx + bw / 2, by + bh / 2 + 10);
        spielActionBtns.push({ x: bx, y: by, w: bw, h: bh, action: a.action, otherIdx: a.otherIdx });
      });
      ctx.restore();
    }

    // ── Spielphase: alle Spieler-Panels ──────────────────────────────────────
    function drawSpielphaseContextPanels() {
      const n      = players.length;
      const cardW  = 250;
      const cardH  = 248;  // inkl. Platz für "Zug beenden"-Button (38px)
      const peekH  = 50;   // sichtbarer Streifen für nicht-aktive Karten
      const cardX  = 10;

      // Stapel-Basisposition: unten links verankert
      const stackTotalH = cardH + Math.max(0, n - 1) * peekH;
      const stackBaseY  = canvas.height - stackTotalH - 10;

      // ── Hilfsfunktionen ──────────────────────────────────────────────────
      function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
      // Farbe für Einheitenanzahl: 0–3 grün (max. Einkommen), 4–5 gelb, 6+ rot
      function unitCountColor(count) {
        if (count <= 3) return '#44ee88';
        if (count <= 5) return '#ddcc00';
        return '#ff5555';
      }

      // ── Vollständige Karte zeichnen ──────────────────────────────────────
      function drawFullCard(pIdx, cx, cy, isActive) {
        const p   = players[pIdx];
        const ch  = CHARACTERS[p.charIdx];
        const img = charImages[p.charIdx];
        const isElim = !!p.eliminated;

        ctx.save();
        if (isElim) ctx.globalAlpha = 0.35;

        // Hintergrund
        ctx.fillStyle   = isElim ? 'rgba(20,20,20,0.94)' : 'rgba(6,6,20,0.94)';
        ctx.strokeStyle = isElim ? '#444444' : isActive ? ch.colorLight : ch.color + '88';
        ctx.lineWidth   = isActive ? 2.5 : 1.5;
        if (isActive && !isElim) { ctx.shadowColor = ch.color; ctx.shadowBlur = 16; }
        ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 8); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        // Farbstreifen links
        const sg = ctx.createLinearGradient(cx, cy, cx, cy + cardH);
        sg.addColorStop(0, ch.colorLight + '88');
        sg.addColorStop(1, ch.colorDark  + '44');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.roundRect(cx, cy, 4, cardH, [8, 0, 0, 8]); ctx.fill();

        // Portrait
        const pImgW = 52, pImgH = cardH - 8;
        const pImgX = cx + 7,  pImgY = cy + 4;
        if (img.complete && img.naturalWidth > 0) {
          ctx.save();
          ctx.beginPath(); ctx.roundRect(pImgX, pImgY, pImgW, pImgH, 4); ctx.clip();
          const ia = img.naturalWidth / img.naturalHeight;
          const dh = pImgH, dw = dh * ia;
          ctx.drawImage(img, pImgX + pImgW / 2 - dw / 2, pImgY, dw, dh);
          const fg = ctx.createLinearGradient(0, pImgY + pImgH - 26, 0, pImgY + pImgH);
          fg.addColorStop(0, 'rgba(6,6,20,0)');
          fg.addColorStop(1, 'rgba(6,6,20,1)');
          ctx.fillStyle = fg;
          ctx.fillRect(pImgX, pImgY + pImgH - 26, pImgW, 26);
          ctx.restore();
        }

        // Textbereich
        const tx = cx + pImgW + 14;
        const tw = cardW - pImgW - 20;

        // Spieler-Badge
        ctx.fillStyle   = isActive ? ch.color + '55' : ch.color + '22';
        ctx.strokeStyle = isActive ? ch.color + 'cc' : ch.color + '44';
        ctx.lineWidth   = 1;
        ctx.beginPath(); ctx.roundRect(tx, cy + 7, tw, 18, 3); ctx.fill(); ctx.stroke();
        ctx.fillStyle    = isActive ? ch.colorLight : ch.colorLight + 'aa';
        ctx.font         = 'bold 10px "Exo 2",sans-serif';
        ctx.textAlign    = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText((isActive ? '▶ ' : '') + 'Spieler ' + (pIdx + 1), tx + 5, cy + 16);

        // Charaktername
        ctx.fillStyle    = '#cccce0'; ctx.font = 'bold 11px "Exo 2",sans-serif'; ctx.textBaseline = 'top';
        const nameLines  = wrapText(ch.name, tw, 'bold 11px "Exo 2",sans-serif');
        ctx.fillText(nameLines[0], tx, cy + 29);

        // Trennlinie
        const divY = cy + 46;
        ctx.strokeStyle = ch.color + '44'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(tx, divY); ctx.lineTo(tx + tw, divY); ctx.stroke();

        // Machtpunkte-Leiste
        const mp = p.machtsteine, mpMax = 30, mpRatio = Math.min(mp / mpMax, 1);
        let mpColor, mpGlowCol;
        if      (mp >= 30) { mpColor = '#ccf4ff'; mpGlowCol = '#88eeff'; }
        else if (mp >= 25) { mpColor = '#88ddff'; mpGlowCol = '#aaeeff'; }
        else if (mp >= 20) { mpColor = '#bb66ff'; mpGlowCol = '#dd99ff'; }
        else if (mp >= 10) { mpColor = '#33cc66'; mpGlowCol = null; }
        else if (mp >= 5)  { mpColor = '#ddcc00'; mpGlowCol = null; }
        else               { mpColor = '#cc3333'; mpGlowCol = null; }

        let ry = divY + 10;
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#cc88ff'; ctx.font = '12px "Exo 2",sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('🔮', tx, ry);
        ctx.fillStyle = '#aaaacc'; ctx.font = 'bold 11px "Exo 2",sans-serif';
        ctx.fillText('Machtpunkte', tx + 16, ry);
        if (mpGlowCol) { ctx.shadowColor = mpGlowCol; ctx.shadowBlur = 12; }
        ctx.fillStyle = mpGlowCol ?? mpColor;
        ctx.font = 'bold 14px "Exo 2",sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(String(mp), tx + tw, ry);
        ctx.shadowBlur = 0;

        const bY = ry + 9, bH = 7;
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.beginPath(); ctx.roundRect(tx, bY, tw, bH, 3); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1;
        [4, 9, 19, 24, 29].forEach(v => {
          const mx2 = tx + (v / mpMax) * tw;
          ctx.beginPath(); ctx.moveTo(mx2, bY); ctx.lineTo(mx2, bY + bH); ctx.stroke();
        });
        if (mpRatio > 0) {
          if (mpGlowCol) {
            ctx.shadowColor = mpGlowCol; ctx.shadowBlur = 14;
            ctx.fillStyle = mpColor + '55';
            ctx.beginPath(); ctx.roundRect(tx, bY, tw * mpRatio, bH, 3); ctx.fill();
            ctx.shadowBlur = 6;
          }
          const grad = ctx.createLinearGradient(tx, bY, tx + tw * mpRatio, bY);
          grad.addColorStop(0, mpColor + 'aa'); grad.addColorStop(1, mpColor);
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.roundRect(tx, bY, tw * mpRatio, bH, 3); ctx.fill();
          ctx.shadowBlur = 0;
        }
        ry += 36;

        // Stats
        const rowH = 20;
        const sCount = spielUnits.filter(u => u.ownerIdx === pIdx && u.type === 'S').length;
        const wCount = spielUnits.filter(u => u.ownerIdx === pIdx && u.type === 'W').length;
        [
          { icon: '◆', iconCol: '#ffcc00', label: 'Gold',   value: p.gold,      valCol: '#ffee66' },
          { icon: '✦', iconCol: '#22ccbb', label: 'Tränke', value: p.nachtrank, valCol: '#55eedd' },
        ].forEach(s => {
          ctx.textBaseline = 'middle';
          ctx.fillStyle = s.iconCol; ctx.font = '12px "Exo 2",sans-serif'; ctx.textAlign = 'left';
          ctx.fillText(s.icon, tx, ry);
          ctx.fillStyle = '#aaaacc'; ctx.font = 'bold 11px "Exo 2",sans-serif';
          ctx.fillText(s.label, tx + 16, ry);
          ctx.fillStyle = s.valCol; ctx.font = 'bold 14px "Exo 2",sans-serif'; ctx.textAlign = 'right';
          ctx.fillText(String(s.value), tx + tw, ry);
          ry += rowH;
        });

        // Einheiten
        const unitTotal = sCount + wCount;
        const uCol = unitCountColor(unitTotal);
        ctx.textBaseline = 'middle';
        ctx.fillStyle = uCol; ctx.font = '12px "Exo 2",sans-serif'; ctx.textAlign = 'left';
        ctx.fillText('⚔', tx, ry);
        ctx.fillStyle = '#aaaacc'; ctx.font = 'bold 11px "Exo 2",sans-serif';
        ctx.fillText('Einheiten', tx + 16, ry);
        ctx.fillStyle = uCol; ctx.font = 'bold 14px "Exo 2",sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(String(unitTotal), tx + tw, ry);
        ry += rowH;
        [
          { label: 'Nebelschleicher', short: 'S', count: sCount, col: '#aaccff' },
          { label: 'Schattenwächter', short: 'W', count: wCount, col: '#ffaa66' },
        ].forEach(u => {
          ctx.textBaseline = 'middle';
          ctx.fillStyle = u.col + '33'; ctx.strokeStyle = u.col + '66'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.roundRect(tx + 6, ry - 7, tw - 6, 14, 3); ctx.fill(); ctx.stroke();
          ctx.fillStyle = u.col; ctx.font = 'bold 11px "Exo 2",sans-serif'; ctx.textAlign = 'left';
          ctx.fillText(u.short, tx + 10, ry);
          ctx.fillStyle = '#9999bb'; ctx.font = '11px "Exo 2",sans-serif';
          ctx.fillText(u.label, tx + 22, ry);
          ctx.fillStyle = u.count > 0 ? u.col : '#444455';
          ctx.font = 'bold 12px "Exo 2",sans-serif'; ctx.textAlign = 'right';
          ctx.fillText(String(u.count), tx + tw - 4, ry);
          ry += 16;
        });

        // ── "Zug beenden"-Button (nur aktive Karte, Phase 3 oder 4) ──────────
        if (isActive && !isElim && (spielPhaseStep === 3 || spielPhaseStep === 4)) {
          const disabled = !!phase3TimeoutId; // bereits geklickt – Timer läuft
          const action   = spielPhaseStep === 3 ? 'endTurn' : 'confirmRecovery';
          const btnX     = cx + 8, btnY = cy + cardH - 36, btnW = cardW - 16, btnH2 = 28;
          ctx.fillStyle   = disabled ? 'rgba(30,30,30,0.7)'   : 'rgba(15,50,25,0.95)';
          ctx.strokeStyle = disabled ? '#445544'               : '#44bb66';
          ctx.lineWidth   = 1.5;
          if (!disabled) { ctx.shadowColor = '#22aa44'; ctx.shadowBlur = 8; }
          ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH2, 6); ctx.fill(); ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.fillStyle = disabled ? '#556655' : '#88ee99';
          ctx.font = 'bold 12px "Exo 2",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(disabled ? '⏳  Zug beenden …' : '✓  Zug beenden', btnX + btnW / 2, btnY + btnH2 / 2);
          if (!disabled) spielActionBtns.push({ x: btnX, y: btnY, w: btnW, h: btnH2, action });
        }

        // Ausgeschieden-Overlay
        if (isElim) {
          ctx.globalAlpha = 1;
          ctx.fillStyle   = 'rgba(0,0,0,0.55)';
          ctx.beginPath(); ctx.roundRect(cx, cy, cardW, cardH, 8); ctx.fill();
          ctx.fillStyle    = '#ff4444'; ctx.font = 'bold 13px "Exo 2",sans-serif';
          ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('✕  Ausgeschieden', cx + cardW / 2, cy + cardH / 2);
        }
        ctx.restore();
      }

      // ── Peek-Streifen zeichnen (kompakte Ressourcen-Anzeige) ────────────
      function drawPeekCard(pIdx, cx, cy) {
        const p      = players[pIdx];
        const ch     = CHARACTERS[p.charIdx];
        const isElim = !!p.eliminated;
        const sCount = spielUnits.filter(u => u.ownerIdx === pIdx && u.type === 'S').length;
        const wCount = spielUnits.filter(u => u.ownerIdx === pIdx && u.type === 'W').length;

        ctx.save();
        if (isElim) ctx.globalAlpha = 0.4;

        // Hintergrund
        ctx.fillStyle   = isElim ? 'rgba(16,16,16,0.92)' : 'rgba(6,6,28,0.92)';
        ctx.strokeStyle = isElim ? '#444' : ch.color + '77';
        ctx.lineWidth   = 1.5;
        ctx.beginPath(); ctx.roundRect(cx, cy, cardW, peekH, [0, 0, 8, 8]); ctx.fill(); ctx.stroke();

        // Farbstreifen links (untere Ecken gerundet)
        const sg = ctx.createLinearGradient(cx, cy, cx, cy + peekH);
        sg.addColorStop(0, ch.colorLight + '66');
        sg.addColorStop(1, ch.colorDark  + '33');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.roundRect(cx, cy, 4, peekH, [0, 0, 0, 8]); ctx.fill();

        // Spieler-Label (links)
        ctx.fillStyle = ch.colorLight + 'cc'; ctx.font = 'bold 10px "Exo 2",sans-serif';
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText('Sp.' + (pIdx + 1), cx + 10, cy + 15);
        ctx.fillStyle = '#666688'; ctx.font = '9px "Exo 2",sans-serif';
        const shortName = CHARACTERS[p.charIdx].name.split(' ')[0];
        ctx.fillText(shortName, cx + 10, cy + 32);

        // Ressourcen-Icons (rechts vom Label)
        const unitTotalPeek = sCount + wCount;
        const cols = [
          { icon: '◆', col: '#ffcc00', val: p.gold },
          { icon: '✦', col: '#22ccbb', val: p.nachtrank },
          { icon: '🔮', col: '#cc88ff', val: p.machtsteine },
          { icon: '⚔', col: unitCountColor(unitTotalPeek), val: unitTotalPeek },
        ];
        const rx0  = cx + 50;
        const colW = (cardW - 60) / cols.length;
        cols.forEach((c, ci) => {
          const rx = rx0 + ci * colW;
          ctx.fillStyle = c.col; ctx.font = '12px "Exo 2",sans-serif'; ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(c.icon, rx, cy + 15);
          ctx.fillStyle = '#ddeeff'; ctx.font = 'bold 12px "Exo 2",sans-serif';
          ctx.fillText(String(c.val), rx + 14, cy + 15);
          // Kleines Label
          ctx.fillStyle = '#556677'; ctx.font = '8px "Exo 2",sans-serif';
          const labels = ['Gold', 'Tränke', 'MP', 'Einh.'];
          ctx.fillText(labels[ci], rx + 14, cy + 33);
        });

        if (isElim) {
          ctx.globalAlpha = 1;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.beginPath(); ctx.roundRect(cx, cy, cardW, peekH, [0, 0, 8, 8]); ctx.fill();
          ctx.fillStyle = '#ff4444'; ctx.font = 'bold 10px "Exo 2",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('✕ Ausgeschieden', cx + cardW / 2, cy + peekH / 2);
        }
        ctx.restore();
      }

      // ── Animation ────────────────────────────────────────────────────────
      if (cardAnim) {
        const rawT      = Math.min(1, (performance.now() - cardAnim.startTime) / cardAnim.duration);
        const ease      = easeInOut(rawT);
        const prevOrder = cardAnim.prevOrder;

        // Zeichenreihenfolge: hinten nach vorne (prevOrder[n-1] zuerst)
        for (let si = n - 1; si >= 0; si--) {
          const pIdx = prevOrder[si];

          if (si === 0) {
            // Aktive Karte verlässt den Bildschirm nach links
            const cx = cardX - ease * (cardW + cardX + 20);
            drawFullCard(pIdx, cx, stackBaseY, true);

            // Dieselbe Karte kehrt als Peek-Streifen von unten zurück
            if (rawT > 0.35) {
              const t2    = Math.min(1, (rawT - 0.35) / 0.65);
              const ease2 = easeInOut(t2);
              const targetY = stackBaseY + cardH + (n - 2) * peekH;
              const startY2 = canvas.height + peekH + 20;
              const cy = startY2 + (targetY - startY2) * ease2;
              drawPeekCard(pIdx, cardX, cy);
            }
          } else {
            // Peek-Karten rücken nach oben
            const fromY = stackBaseY + cardH + (si - 1) * peekH;
            const toY   = si === 1 ? stackBaseY : stackBaseY + cardH + (si - 2) * peekH;
            const animY = fromY + (toY - fromY) * ease;

            if (si === 1) {
              // Wird zur neuen aktiven Karte: von stackBaseY+cardH nach stackBaseY hochschieben
              drawFullCard(pIdx, cardX, animY, false);
            } else {
              drawPeekCard(pIdx, cardX, animY);
            }
          }
        }
        return;
      }

      // ── Statisches Layout: hinten nach vorne ────────────────────────────
      const order = spielCardOrder();
      for (let si = n - 1; si >= 0; si--) {
        const pIdx = order[si];
        if (si === 0) {
          drawFullCard(pIdx, cardX, stackBaseY, true);
        } else {
          const peekY = stackBaseY + cardH + (si - 1) * peekH;
          drawPeekCard(pIdx, cardX, peekY);
        }
      }
    }

    // ── Spiel zeichnen ───────────────────────────────────────────────────────
    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const cp = curPlayer();
      const ch = CHARACTERS[cp.charIdx];

      // 0. Nebel-Vorbereitung: BFS von allen besuchten Feldern (max 6 Schritte)
      const fogDist = new Map();
      if (gamePhase === 'bauphase') {
        const bfsQ = [];
        for (const [k, t] of hexMap) {
          if (t === 'visited' || t === 'start') {
            fogDist.set(k, 0);
            const [q, r] = k.split(',').map(Number);
            bfsQ.push([q, r, 0]);
          }
        }
        for (let i = 0; i < bfsQ.length; i++) {
          const [q, r, d] = bfsQ[i];
          if (d >= 6) continue;
          for (const { dq, dr } of DIRS) {
            const nk = `${q + dq},${r + dr}`;
            if (!fogDist.has(nk)) {
              fogDist.set(nk, d + 1);
              bfsQ.push([q + dq, r + dr, d + 1]);
            }
          }
        }

        // Violetter Grenzring (Abstand 11 vom Ursprung) – unter dem Nebel
        const MAX_R = 50;
        for (let q = -MAX_R; q <= MAX_R; q++) {
          for (let r = Math.max(-MAX_R, -q - MAX_R); r <= Math.min(MAX_R, -q + MAX_R); r++) {
            if (hexDist(q, r) !== 11) continue;
            const { x, y } = hexToPixel(q, r);
            if (x < -SIZE * 2 || x > canvas.width + SIZE * 2 || y < -SIZE * 2 || y > canvas.height + SIZE * 2) continue;
            drawHex(x, y, 'rgba(60,0,100,0.7)', 'rgba(160,0,255,0.9)');
          }
        }
      }

      // 1. Hexfelder
      for (const [k, type] of hexMap) {
        const [q, r] = k.split(',').map(Number);
        const { x, y } = hexToPixel(q, r);
        if (type === 'start')        drawHex(x, y, '#5b2d8e', '#9b5de5');
        else if (type === 'visited') drawHex(x, y, '#1a3d2b', '#2d7a4f');
        else if (type === 'blocked') {
          drawHex(x, y, '#5a1a1a', '#8b2020');
          if (gamePhase === 'spielphase') {
            // Mine-Stapel auf Gebirge zeichnen wenn eine Mine direkt anliegend ist
            const adjMine = spielBuildings.find(b => b.type === 'mine' && b.adjBQ === q && b.adjBR === r);
            if (adjMine) drawMineStackOnHex(x, y, adjMine.stack);
          }
        }
        else if (type === 'sealed') {
          const ring      = sealRingMap.get(k) ?? 1;
          const ringAlpha = Math.max(0, 1 - Math.max(0, ring - 3) * 0.2);
          if (ringAlpha > 0) drawHex(x, y, `rgba(10,10,10,${ringAlpha})`, `rgba(30,30,30,${ringAlpha})`);
        }
      }

      // 1b. Nebelschleier + schwarze Außenwand (Bauphase)
      if (gamePhase === 'bauphase') {
        const MAX_R = 50;
        for (let q = -MAX_R; q <= MAX_R; q++) {
          for (let r = Math.max(-MAX_R, -q - MAX_R); r <= Math.min(MAX_R, -q + MAX_R); r++) {
            const od = hexDist(q, r);
            // Außerhalb Ring 11: immer 100% schwarz
            if (od > 11) {
              const { x, y } = hexToPixel(q, r);
              if (x < -SIZE * 2 || x > canvas.width + SIZE * 2 || y < -SIZE * 2 || y > canvas.height + SIZE * 2) continue;
              drawHex(x, y, 'rgba(0,0,0,1)', 'rgba(0,0,0,1)');
              continue;
            }
            // Innerhalb Ring 11: Nebelschleier über unerkundeten Feldern
            if (hexMap.has(`${q},${r}`)) continue;
            const d = fogDist.get(`${q},${r}`) ?? 99;
            const alpha = d <= 1 ? 0 : d === 2 ? 0.2 : d === 3 ? 0.4 : d === 4 ? 0.6 : d === 5 ? 0.8 : 1.0;
            if (alpha === 0) continue;
            const { x, y } = hexToPixel(q, r);
            if (x < -SIZE * 2 || x > canvas.width + SIZE * 2 || y < -SIZE * 2 || y > canvas.height + SIZE * 2) continue;
            drawHex(x, y, `rgba(0,0,0,${alpha})`, `rgba(10,10,10,${alpha})`);
          }
        }
      }

      // 1c. Bauphase: MP-Indikator → wird nach Seal-Animation gezeichnet (Vordergrund)

      // 1c. Verbindungslinien Mine↔Gebirge und Brunnen↔Rand
      if (gamePhase === 'spielphase') {
        ctx.save();
        ctx.lineWidth = 3.5; ctx.lineCap = 'round';
        for (const b of spielBuildings) {
          if (b.adjBQ === undefined) continue;
          const { x: bx, y: by } = hexToPixel(b.q, b.r);
          const { x: ax, y: ay } = hexToPixel(b.adjBQ, b.adjBR);
          ctx.strokeStyle = b.type === 'mine' ? '#ffcc44' : '#44ccff';
          // Kurze Linie: nur das mittlere Drittel zwischen den Hex-Zentren
          const mx = (bx + ax) / 2, my = (by + ay) / 2;
          const dx = ax - bx, dy = ay - by;
          ctx.beginPath();
          ctx.moveTo(mx - dx * 0.18, my - dy * 0.18);
          ctx.lineTo(mx + dx * 0.18, my + dy * 0.18);
          ctx.stroke();
        }

        // Auswahlmodus: Kandidaten hervorheben
        if (spielBuildingMode) {
          const isMine = spielBuildingMode.type === 'mine';
          const hlFill   = isMine ? 'rgba(255,200,50,0.22)' : 'rgba(50,200,255,0.18)';
          const hlStroke = isMine ? '#ffcc44' : '#44ccff';
          const hlText   = isMine ? '#ffee88' : '#aaeeff';
          let freeNum = 0;
          spielBuildingMode.candidates.forEach(({ q, r, used }) => {
            const { x, y } = hexToPixel(q, r);
            if (used) {
              ctx.fillStyle = 'rgba(80,80,80,0.35)'; ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5;
            } else {
              ctx.fillStyle = hlFill; ctx.strokeStyle = hlStroke; ctx.lineWidth = 2.5;
            }
            ctx.beginPath();
            for (let a = 0; a < 6; a++) {
              const angle = Math.PI / 180 * (60 * a - 30);
              const hx = x + SIZE * Math.cos(angle), hy = y + SIZE * Math.sin(angle);
              a === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke();
            if (used) {
              ctx.fillStyle = '#888'; ctx.font = `bold ${Math.round(SIZE * 0.22)}px "Exo 2",sans-serif`;
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText('Wird schon', x, y - SIZE * 0.14);
              ctx.fillText('verwendet', x, y + SIZE * 0.14);
            } else {
              freeNum++;
              ctx.fillStyle = hlText; ctx.font = `bold ${Math.round(SIZE * 0.38)}px "Exo 2",sans-serif`;
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.fillText(String(freeNum), x, y);
            }
          });
        }
        ctx.restore();
      }

      // 2. Nachbarfelder (Bauphase) / Erreichbare Felder (Spielphase)
      if (gamePhase === 'spielphase') {
        spielObjPositions = [];
        for (const [k, cost] of spielReachable) {
          const [hq, hr] = k.split(',').map(Number);
          const { x, y } = hexToPixel(hq, hr);
          const occ = getSpielUnitAt(hq, hr);
          const isAtk = occ && occ.ownerIdx !== currentPlayerIdx;
          drawHex(x, y,
            isAtk ? 'rgba(220,50,50,0.28)' : 'rgba(50,160,255,0.20)',
            isAtk ? '#ff5555' : '#55aaff', 2);
          ctx.fillStyle    = isAtk ? '#ff8888' : '#aaddff';
          ctx.font         = `bold ${Math.round(SIZE * 0.28)}px "Exo 2",sans-serif`;
          ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(cost, x, y);
        }
      }
      if (gamePhase !== 'spielphase' && cp.moves > 0) {
        const fallback = cp.moves > 2 && bauAllNeighborsBlocked();
        DIRS.forEach(({ dq, dr }, i) => {
          const nq = cp.q + dq, nr = cp.r + dr;
          const { x, y } = hexToPixel(nq, nr);
          const nk             = key(nq, nr);
          const hexBlocked     = hexMap.get(nk) === 'blocked';
          const sealBlocked    = hexMap.get(nk) === 'sealed';
          const playerBlocked  = isBlockedByPlayer(nq, nr);
          const physBlocked    = hexBlocked || sealBlocked || playerBlocked;
          const distSt         = !physBlocked ? bauDistanzStatus(nq, nr) : 'ok';
          const distBlocked    = !fallback && distSt === 'blocked';
          const distWarn       = !fallback && distSt === 'warn';
          const grayed         = physBlocked || distBlocked;
          if (!hexMap.has(nk)) drawHex(x, y, 'rgba(255,160,180,0.25)', '#ff9aaa');
          if (distBlocked) drawHex(x, y, 'rgba(220,50,50,0.32)', '#ff4444');
          else if (distWarn) drawHex(x, y, 'rgba(200,160,0,0.28)', '#ffcc00');
          ctx.save();
          ctx.fillStyle   = grayed ? '#555555' : (distWarn ? '#ffee66' : '#ffffff');
          ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
          ctx.font        = `bold ${Math.round(SIZE * 0.42)}px "Exo 2",sans-serif`;
          ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(String(i + 1), x, y);
          ctx.restore();
        });
      }

      // 3. Figuren/Lager + Einheiten
      if (gamePhase === 'spielphase') {
        // ── Spielphase: Lager + Einheiten + Gebäude pro Feld ────────────────
        const occupied = new Map(); // hexKey → { campOwner, entries:[{unit,idx}], buildings:[] }
        const ensureOcc = k => { if (!occupied.has(k)) occupied.set(k, { campOwner: null, entries: [], buildings: [] }); };
        players.forEach((p, pIdx) => {
          if (p.eliminated) return; // Lager eliminierter Spieler nicht anzeigen
          const k = key(p.campQ, p.campR); ensureOcc(k);
          occupied.get(k).campOwner = pIdx;
        });
        spielUnits.forEach((u, i) => {
          const k = key(u.q, u.r); ensureOcc(k);
          occupied.get(k).entries.push({ unit: u, idx: i });
        });
        spielBuildings.forEach(b => {
          const k = key(b.q, b.r); ensureOcc(k);
          occupied.get(k).buildings.push(b);
        });

        for (const [k, data] of occupied) {
          const [hq, hr] = k.split(',').map(Number);
          const { x: hx, y: hy } = hexToPixel(hq, hr);
          const objects = [];
          if (data.campOwner !== null) objects.push({ type: 'camp', ownerIdx: data.campOwner });
          for (const e of data.entries) objects.push({ type: 'unit', unit: e.unit, idx: e.idx });
          for (const b of data.buildings) objects.push({ type: 'building', building: b });

          const count   = objects.length;
          const offsets = getOffsets(count);
          const scale   = scaleFor(count);

          objects.forEach((obj, i) => {
            const [ex, ey] = offsets[i];
            if (obj.type === 'camp') {
              drawSpielCampHex(hx, hy, hx + ex, hy + ey,
                obj.ownerIdx,
                spielCampMenuOpen && obj.ownerIdx === currentPlayerIdx,
                scale);
              spielObjPositions.push({ x: hx + ex, y: hy + ey, type: 'camp', ownerIdx: obj.ownerIdx });
            } else if (obj.type === 'unit') {
              drawSpielUnit(hx + ex, hy + ey, obj.unit, obj.idx === spielSelectedIdx, scale);
              spielObjPositions.push({ x: hx + ex, y: hy + ey, type: 'unit', idx: obj.idx });
            } else {
              drawSpielBuilding(hx + ex, hy + ey, obj.building, scale);
            }
          });
        }
        // ── Liegende Edelsteine zeichnen ─────────────────────────────────────
        for (const gem of droppedGems) {
          const { x: gx, y: gy } = hexToPixel(gem.q, gem.r);
          const gr = SIZE * 0.18;
          ctx.save();
          ctx.fillStyle   = '#00ee66'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
          ctx.shadowColor = '#00ff88'; ctx.shadowBlur  = 10;
          ctx.beginPath(); ctx.arc(gx, gy + SIZE * 0.25, gr, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          ctx.shadowBlur  = 0;
          ctx.fillStyle   = '#ffffff'; ctx.font = `bold ${Math.round(gr * 1.3)}px "Exo 2",sans-serif`;
          ctx.textAlign   = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('◆', gx, gy + SIZE * 0.25);
          ctx.restore();
        }
      } else {
        // ── Bauphase: Spielerfiguren + Zelt ──────────────────────────────────
        const drawOrder = players.map((_, i) => i).filter(i => i !== currentPlayerIdx);
        drawOrder.push(currentPlayerIdx);
        drawOrder.forEach(i => {
          const p  = players[i];
          const pc = CHARACTERS[p.charIdx];
          const { x, y } = hexToPixel(p.q, p.r);
          if (p.moves === 0) {
            drawSpriteOnBoard(x - SIZE * 0.30, y + SIZE * 0.08, p.charIdx, 0.54);
            drawTent(         x + SIZE * 0.24, y + SIZE * 0.06, pc.color, 0.60);
          } else {
            const sameHex = players.filter((pp, ii) => ii < i && pp.q === p.q && pp.r === p.r).length;
            drawSpriteOnBoard(x + sameHex * 8, y, p.charIdx, 1.0);
          }
        });
      }

      // 4. Flash-X
      if (blockFlash && blockFlash.visible) {
        const { x, y } = hexToPixel(blockFlash.q, blockFlash.r);
        const r = SIZE * 0.45;
        ctx.save();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x - r, y - r); ctx.lineTo(x + r, y + r); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + r, y - r); ctx.lineTo(x - r, y + r); ctx.stroke();
        ctx.restore();
      }
      if (blockFlash) {
        ctx.save();
        ctx.fillStyle = 'rgba(180,60,60,0.95)'; ctx.font = 'bold 14px "Exo 2",sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Feld kann nicht ausgewählt werden', canvas.width / 2, canvas.height - 18);
        ctx.restore();
      }

      // 5. Seal-Animation
      if (sealAnimation) {
        for (const h of sealAnimation) {
          if (h.alpha <= 0) continue;
          const ringAlpha = Math.max(0, 1 - Math.max(0, h.ring - 3) * 0.2);
          if (ringAlpha <= 0) continue;
          const { x, y } = hexToPixel(h.q, h.r);
          const a = h.alpha * ringAlpha;
          drawHex(x, y, `rgba(10,10,10,${a})`, `rgba(30,30,30,${a})`);
        }
      }

      // 5b. Bauphase: MP-Badge + Außenfeld-Hinweis (Vordergrund, nach allen Overlays)
      if (gamePhase === 'bauphase' && bauHoverQ !== null) {
        const hk = `${bauHoverQ},${bauHoverR}`;
        const inField = hexMap.has(hk) && hexMap.get(hk) !== 'blocked' && hexMap.get(hk) !== 'sealed';
        const bfsGrid = new Set([...hexMap.keys()].filter(k2 => hexMap.get(k2) !== 'sealed' && hexMap.get(k2) !== 'blocked'));
        if (!inField) bfsGrid.add(`${bauHoverQ},${bauHoverR}`); // simuliere das Feld als erkundet
        const dist = bfsPlayDist(bauHoverQ, bauHoverR, 0, 0, bfsGrid);
        const mp = dist === Infinity ? 0 : Math.min(5, dist);
        const mpCol = mp >= 5 ? '#44dd88' : mp >= 4 ? '#ffcc00' : mp >= 2 ? '#ff9900' : '#ff4444';
        const { x: hx2, y: hy2 } = hexToPixel(bauHoverQ, bauHoverR);

        if (inField) {
          // On-Hex-Badge über dem Feld (jetzt im Vordergrund)
          ctx.save();
          ctx.fillStyle   = 'rgba(6,6,18,0.92)';
          ctx.strokeStyle = mpCol; ctx.lineWidth = 1.5;
          ctx.shadowColor = mpCol; ctx.shadowBlur = 10;
          const bw = 80, bh = 26;
          ctx.beginPath(); ctx.roundRect(hx2 - bw / 2, hy2 - SIZE * 1.18 - bh / 2, bw, bh, 5);
          ctx.fill(); ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.fillStyle = mpCol; ctx.font = 'bold 13px "Exo 2",sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(`🔮 ${mp} MP`, hx2, hy2 - SIZE * 1.18);
          ctx.restore();
        } else {
          // Tooltip außerhalb des Spielfeldes (unerkundetes Feld)
          const tipW = 272, tipH = 54;
          let tipX = hx2 + 28;
          let tipY = hy2 - tipH - 14;
          if (tipX + tipW > canvas.width - 8) tipX = hx2 - tipW - 28;
          if (tipX < 8) tipX = 8;

        // "Hier bleiben"-Button: volle Panelbreite am unteren Rand des Charakterpanels
        if (cp.moves > 0) {

          ctx.fillStyle    = ch.colorLight; ctx.font = 'bold 12px "Exo 2",sans-serif';

          ctx.restore();
          spielActionBtns.push({ x: btnX, y: btnY, w: btnW, h: btnH, action: 'bauSkip' });

        ctx.restore();

      // 7. Spielanleitung-Button oben rechts (Bauphase)

    // ── Spielerauswahl ───────────────────────────────────────────────────────
